body:
  text: 吳興永定寺釋沙門道暹述七目連如來語密者遠聽如近故云語密也疏云師子父者吉占是父子是子也二土音者勿伽羅目伽路號度二音也仿佯者上步光反仿偟也下似羊反也存本俗業者雖復出家不捨本算法也文豪謂豪使即雄攀也言其雄攀之狀明著也有殊者以得神通為藝得韋陀為智也六藝者禮樂書算射御也通因定生者由佛具足定慧悲智等故用具智定弟子以為左右侍者也成破法輪者俱舍頌云初後皰雙前佛滅末結界於如是六位無破法輪僧釋曰初者佛初成道轉法輪未久以一切人皆欲親近於佛故無破心後者佛臨涅槃時一切衆生皆生戀慕以初後二時僧一味故不可破壞皰者瘡疣生時於正戒上邪戒為皰於正見上邪見為皰皰未起時名皰前要二皰生方可破故又若未有調達亦無人破雙者目連止第一也舍利子觀第一也名第一雙未有止觀第一雙時名為雙前要彼和僧法爾由彼速還合故佛滅者佛滅度後無真大師為敵對故但名破羯磨僧不名破轉法輪僧未結界者無一界中僧分二分夫破法輪要依大結界未結大界不名破僧於如是六位無破法輪僧離此六時則成破也言前者二人未出之前不成破若有二人則成於破雖要以二人能合陽候者海神也疏云目連變砂者是匿王宮上事疏中闕略與記文共成一意也固心勿亂者誡令勿離定心以羅漢出定則同凡夫故四生龍中無出家者者龍得通智能知也為優婆塞者以受五戒八戒竟故得此名也三白佛者初令千釋出家時心意識輕重者心意識向上則輕向下則重知四大亦爾自在三昧者令來往廣狹長短等勇猛三昧者威伏一切超過物表故心意三昧者能知他心故自識三昧者自識宿命等事也舍羅等如止觀記者彼止觀第一引大論釋教王殺父而為新王我當害佛以為新佛為誘王故化為小兒坐王膝上王因以唾飴其口從佛索衆世尊呵之我尚不以衆付身子及目連等況汝癡人因茲結恨構五法以誘佛衆五法者正理論云一不受五味二斷肉三斷鹽四不受割截衣五不居聚落邊等又婆娑云一糞掃衣二常乞食三一坐食四常露坐五不受鹽及五味佛在王舍有因緣集僧調達從坐起行五法舍羅云忍此五事者是毗尼時有五百新學無智投籌調達便將往伽耶山共作羯磨身子目連為此事故乃往伽耶調達慰曰善來弟子先雖不忍今者忍耶雖後亦善如詑引五法是邪戒也八聖非道邪見也上太子膝上者阿闍世是頻婆娑羅王太子調達化小兒坐太子膝上太子以唾飴其口等遂入阿鼻者僧傳有三處陷入地獄云云八十年七六四者此三皆加十年字即是七十六十四十年疏云固活者堅固不死是目連弟子帝釋與修羅戰具如止觀第五記者長阿含云天帝與修羅戰勝更造一堂名為最勝東西百由旬南北六十由旬堂有百間間有七支露臺一一臺上有七玉女一一王女有七使人皆是帝釋優給衣食莊嚴之具千世界中此堂無比故名最勝佛梵聲深遠如止觀第一記者彼明報身相好梵天不見其頂目連不窮其聲大論云佛在靈鷲目連自念欲知佛聲所至遠近即從座起住須彌頂聞如來聲如在目前自以神力往大千邊大鐵圍頂故聞無異承佛神力去至西方九十九恆河沙佛土國名光明幡佛號光明王故聞佛聲猶如對面彼佛身長四十里菩薩身長二十里鉢高一里目連於彼鉢緣上行彼菩薩見而白佛言此是何蟲著沙門服佛言莫輕此賢名大目連釋尊第一神通弟子乃告目連此土菩薩及聲聞衆見卿身小生輕慢心當現神力目連便即踊身虗空高百億仞化床而坐種種光明珍寶瓔珞以自莊嚴彼菩薩等怪未曾有佛告目連卿大誤也假使過於恆沙劫行亦不能知佛聲遠近目連投彼佛足悔過佛告之曰汝到此者乃是釋尊之力若欲還彼假使卿身一劫亦不至目連白佛我令迷惑不知所向佛言在於東方目連叉手説偈自歸唯願天人尊冀垂力愍念願顯其國土令我得回還爾時如來於光照之目連乘光還到本國佛求侍者如止觀第二記者大經云佛於一時在王舍城告諸比丘誰能為我受持十二部經供養給便左右所須之事亦使不失自身利益憍陳如白佛我能為之佛言汝已衰邁當須使人云何方欲為我給使乃至五百比丘皆悉如是時大目連即便入定觀見如來心在阿難如日初出光照西壁語阿難言我入定觀見如來意欲令汝作阿難聞已長跪合掌作如是言若有是事如來世尊與我三願我當給事如來左右一者如來設以故衣施我聽我不受二者如來設受別請聽我不往三者聽出入無有時節五百比丘具白世尊佛言善哉阿難比丘具足智慧預見譏嫌何以故當有人言汝為衣食奉給如來是故先求不受故衣不隨別請若哀出入有時則不能得廣利四部之衆是故先求出入無時我為阿難聞是三事隨其意願即其相也疏云依四禪十四變化者初禪二變化謂初禪初禪化初禪欲界化二禪三變化三禪四變化四禪五變化皆如初禪而數先約自地次兼下地故後後增前觀禪者十二門禪六妙門通明禪十六特勝九想十想八背捨八勝處十一切處等修假實觀名為觀禪並是世間禪故名事禪也九次第定智慧深利善能次第入於諸禪乃至滅受想定無復異念而相間雜練前觀禪令調柔純熟名為練禪師子奮迅三昧奮諸塵土能除障定微細無知又能以無漏心入出諸禪捷疾無間資董前法益令熟淨故名薰禪超越三昧能超過諸地自在出入雖經散心不妨諸定於諸禪中最得自在故名修禪此四是出世間方名無漏十一切處者謂青黃赤白四大空識觀青等十皆悉普遍而復相入不相妨礙是故此十皆名一切此即重釋前事禪也十八變化者一右脅出水二左脅出火三左出水四右出火身上下互出水火為四並前為八九履水如地十履地如水十一從空中沒而復現地十二地沒而現空中十三十四十五十六行住坐臥十七或現大身滿虗空中而復現小十八小復現大又十八變者如瑜伽四十七云佛菩薩神境智通有二一能變通二能他通化云何能變謂十八變振動者乃至無量無數三千大千世界皆能動熾然者從其身上散猛𦦨火於其身下注清冷水身下及上入火界定舉身洞然出種種色𦦨青黃赤白乃至頗胝迦色流布者流布光明無數世界無不充滿示現者悉令現見諸惡趣上諸人天諸餘佛土及彼土中佛名如來等轉變者地令成水火風亦爾好色有情令成惡色惡色變如此往來者墻壁山石縱身往來或遠令近等卷舒者能卷雪山王等如一極微等衆像身者一切色像內己身中令諸大衆各各自知入其身內往同趣者或能往趣剎帝利同其色類如彼形量似彼言音彼以召如是義亦即以此召如是義然後為其演説正法隱顯者於大衆前隱沒自身復令顯現自在者普於一切諸有情界自在轉令去即去令住即住令來即來令語制他者普能制伏一切具神通者施辨者若諸有情辨才窮盡能與辨才憶念者於法失念能與憶念施安者令聽法時身心輕安令離諸蓋專心聽法故放光者或有一光往十方面令惡趣等息彼衆苦能作無量利益之事又瓔珞經云神名天心通名慧性天然定慧徹照無礙故名神通通屬智性者應云因定發通今云通屬智性者約果滿用智簡擇以現於通故屬智性疏云不以二相者前三教皆名二相何者如藏依事禪發真等是也別地前助者別地前修空假觀助於登地即是緣修顯真修也圓任運者一教始終俱任運故前二名通名化者即變化也後二名密者密即三密也前二可破壞者以未得中為後教所破故前二身通者如意身通也前二聖位方修者專語無漏通也凡位非不得五後二凡位俱修通者謂常觀涅槃行道故前二隨依者依事禪及無漏故後二者有勝依者依相故八迦旃延疏云迦旃延者什公云姓也如折闕緣之木者闕於鑽繩人工等終不得緣既闕已者如貝聲欲絶時反轉求於貝聲終不可得此約欲絶時為答也普義堂者論義堂也更引喻汝者更立難云汝也不如實知者謂不審實知今世後世善惡因果故不見得也手障形者什云以形觸故若手障者不堪投食故不許也兩臂中間者二人兩臂中間也二人中間者二人前後為中間也二餐一咽者不許一餐再咽故疏答不依五陰法者外人計五陰為實佛法則觀五陰無常生滅名不依也不以不行者便斥失者於佛教中不用不行為德也四辨者一義謂顯了諸法之義法謂能説法之名字辭謂能説名之語言樂謂説前三也於一法中説一切法於一字中説一切字於一語中説一切語皆入實相別教先破界內斷常者先破凡夫外道時所計也次破空有者有即緣生之假空即所證之真破緣生時真為能破非空出假俗智為能破空為所破也後破空假中為能破也疏云本住福德等者大經云佛告師子吼菩薩善男子若有人能為法咨啓當知是則具二莊嚴何等為二一者福德二者智慧汝以具足二莊嚴故前能問甚深之義我亦具足二莊嚴故是以能答九阿䨲樓馱疏云劫初大水等者成劫之初下有微風之起漸漸增盛堅如金剛形如槃緣闊等大千厚六十億由旬此名風輪光音天下金藏雲而遍覆之降大雨於其中滴如車軸其水下成水輪厚八億由旬上凝為金剛輪厚三億六萬由旬注雨於輪上其水高至欲界之頂次有大風吹擊此水清者從上次第結成天宮及妙高山等濁者作餘山地器界既成二禪福盡而來生此光音即二禪天具如律中者若準四分律至伽䨲友識是輪王爾前有三十三王皆是粟散伽䨲友後復隔五粟散王有一輪王名多樓毗復隔五王有一輪王名阿濕卑復隔七王有一輪王名乾陀羅復隔八王有一輪王名伽陵迦復隔九王有一輪王名瞻羅復隔十四王有一輪王名物羅婆復隔三十一王有一輪王名般闍羅復隔三十二王有一輪王名彌悉梨又隔八萬四千王有一輪王名懿師摩懿師摩復至悅頭檀王凡七代皆粟散王都合八萬四千一十八王悅頭檀王即今文中淨飯王是懿師摩王今文中懿摩王是也準佛譜云始從民主迄至善思父子想繼三十二主自爾之後有十族轉輪第一伽䨲乃至第十懿摩總有八萬四千二百一十聖王並是十族兄弟子胤聖賢遞興懿摩之子烏頭羅烏頭羅有子名跋婆羅跋婆羅有子名尼休羅尼休羅即生師子頰師子頰有子名淨飯淨飯有子名悉達悉達名子名羅睺羅悉達若不出家當為轉輪聖王今言四世是鐵輪者淨飯王已前鳥頭羅等四王是也金輪相繼迄至善思者謂從懿摩已前金輪相繼至于善思既八萬四千二百一十王是然今疏文專依佛譜列數也疏云木貫者貫木剎頭以箭射之疏云此瞿曇若誠心者若實不盜他物血當變也疏云舍夷者平也靜也體性寂靜也疏云當寶如來者然準俱舍論文此賢劫中至第九減六萬歲時拘留孫佛最初興世也今云劫初當寶如來出世者謂賢劫之初留孫佛出即拘留孫是也四子被猜者五分律云佛在王舍告諸比丘過去有王名曰摩即今文懿摩是有四子一名照目二名聰目三名調伏家四名尼樓聰明神武有大威德準佛本行經是第二夫人之子第一夫人子名長生頑薄醜陋衆人所賤夫人念言我子雖長才不及物而彼四子並有威德當沒何方固子基業即便白王王之四子並有威德我子雖長才不及物承孫大業必為陵奪若王擯斥我清乃安四子孝友於國無德今云何擯夫人及又言王白此四子並有威德必相彌滅大國之祚王即呼子勑令出國四子奉命而去猜疑也恨也王被才或疑之恨之其母及同生姊妹咸求同去一切人民多樂隨從王悉聽之到雪山北營建城邑數年之間父王思之問子何許答言在雪山北近舍夷林是釋迦樹異名築城管邑人民熾盛地沃野豐衣食無乏王聞三歎我子有能從此遂號釋迦種疏云從懿摩下面光等四為橫烏頭等三為竪三飯又是橫也疏云故周公歎者昔周公封魯而身相成王令子伯禽歸魯而誡之曰汝無以魯國之富公候之貴而輕於人吾為文王之子武王之弟成王之叔父尚一沐三握髮一飯三吐哺祗敬於人猶恐天下之人謂苦有憍據矣文現史記文云昔周公一沐三握一飯三吐哺以樓白屈之士一日所見七十餘人門不停賓古之貴也失教之家閽寺無禮或以主君𮄊食嗔怒拒客矣疏云賢愚經云弗沙佛下此段文應移向前故名無貧文下疏云九十一劫者人中天上也眠是眼食者增一云佛在給孤獨為多人説法那律獨睡佛以偈呵咄咄何為睡螺螄蚌蛤類問曰汝畏王賊而出家耶答曰不也厭生老病死故求出家佛言既信心賢固而出家者佛躬説法而眠睡耶即起白佛自今已後形融體爛終不於佛前眠睡因達曉不睡眼根便失佛言眼以眠為食乃至意以法為食涅槃以不放逸為食勸令𮄊息那律云不敢違願所以佛令修於天眼發得半頭良有以也繫念在緣者緣謂明相也謂緣星月日火等光明漸漸大初禪淨色入欲界色半頭而發等迦絺那衣廣如律中修成雖少不等者此即與而為言故前二教修成與發得大體亦復無別也疏云無漏發諸行者即事禪正是天眼因疏云依空修肉眼天眼者以依空故肉眼遍見粗色如瓶衣柱地等又唯見障內天眼則遍見大千細色如微塵等又能見障外慧眼見粗細色空法佛二眼如大品云隨信隨法三空五眼此業此果受其力生其處其菩薩退不退得記不得記等皆名法眼入金剛三昧得一切種智成熟力無所畏十八不共知一切法名佛眼也然彼止觀中引大論通釋五眼修證之相者若至今經皆佛五眼故云開顯等云云望後故論次第者將藏通望後別圓別圓復論次不次也疏觀因緣生善心者修戒善及多聞皆是肉眼因也以修肉眼令見不到凡夫報得所見皆到十劫賓那宿復不定者此方宿者總二十八西方有七奎婁胃昴畢觜參南方七者井鬼柳星張翼軫東方七者角亢氐房心尾箕北方七者斗牛女虗危室壁若西方者經中所列後昴至柳乃至從虗至胃如是遞遷一方各七應是地異故星移三座疏云分別十法界至悉得見佛者別人期心果頭真如為佛法界為惑所覆故先却六界次破後三界方得見佛故云悉也十一憍梵波提疏云昔五百鴈者四分律云佛與五百比丘遊蘇羅婆國至毗蘭若曼陀羅樹下宿時毗蘭若婆羅門即今文阿耆達王是往世尊所佛為説法得歡喜已即白佛言唯願哀愍當受我請佛及比丘僧三月安居爾時世尊及比丘僧默然受請時毗蘭若婆羅門為魔所惑雖請佛僧都不供養時有婆羅國販馬人驅吾返馬住毗蘭若夏九十日時諸比丘從毗蘭若乞食不得往販馬人所乞食時販馬人曰施比丘馬麥五升世尊一斗阿難使人磨作乾飯奉佛佛食乾飯比丘各各得煮麥而食又百緣經云如來過去作五百婆羅門主見迦葉佛衆人供養發如是言好食運供養我此沙門等應與馬麥故致斯報呵者書之反牛喉也疏云四無所畏者一切智無畏者備知四種苦諦為他分別明示過患決定師子吼無微畏相無能難言是法非法障道無畏者四種集諦障四道滅決定師子吼無微畏相無能難言此非障道盡苦道無畏者四種道諦能行是道得盡苦出間決定師子吼無微畏相無漏無畏者四種滅諦各有所證各有所滅決定師子吼無微畏相十二離婆多疏云或室宿者往昔曾證他人偷牛來因染袈裟他人失牛尋迹至此見染汁為血等被投送官置獄中經十二年如僧自鏡録中説故云有口失緣二鬼爭尸緣在止觀第七記者大論云如人適遠獨宿空亭有鬼擔尸來著其前復有一鬼隨後而來嗔罵前鬼云是我尸前鬼復云本是我物我自擔來二鬼各以一手中爭之前鬼語云可問此人後鬼即問是誰死人誰擔將來其人思惟此之二鬼悉有大力設依理等如疏乃至答言前鬼將來後鬼大嗔拔其手足著於地上小鬼等如疏又非已有至前兩者前二教佛為當教之有別教等覺已下皆名他有俱屬緣修成故十三畢陵伽疏云咄小婢者大論云其以宿命智力知彼河神曾為己家之婢故爾廣明慢緣者彼此大同疏云實無高心下佛問河神汝見畢陵合掌懺未答曰具見佛言懺竟無慢而有此言者是人於五百世中作婆羅門性多慢故懺悔具二悉者懺悔治他嗔令他善心生故云也三觀總別者一心三觀為總次第三觀為別此二咸至於極故云俱歸第一義十四薄拘羅疏云後母置熬盤者就母索餅母即投拘羅擲置熬上釜中煮肉就索內置沸釜中等付法藏經云毗婆尸佛入涅槃後有一比丘其患頭痛拘羅爾時作一貧人見病比丘便持一呵梨勒歡喜奉施比丘眼病即除愈云云五大染色者青黃赤紫黑又更四大色紅黃紫也十五拘絺羅初舍利子問者既是舍利弗母與弟論只應云舍利子姊問是以子顯母耳貪等者等取嗔癡謂三不善根也十六難陀為説十一事者一解色二相應三摩刷四覆瘡五放煙火六簡茂草七令牛群安穩八知度處九知時宜十留𤛓餘十一將護於大牛彼乃合云比丘亦如是一知四大造色二善別愚智相三摩刷六情根四善覆十善相五傳所誦為煙六四意止茂草七七十二分安處八八聖支度處九莫受輕賤請名知時宜十知足為留餘十一敬護是將護佛説偈云牧牛無放逸其主獲其福六牛經六年展轉六十牛比丘戒成就於禪得自在六根而寂靜六年成六通聞皆得果成第一義十七孫陀羅難陀地獄天堂者佛喚還已却將出城鹿母園佛問汝曾見香醉山不答未見佛令投衣角飛須見山山有果樹樹下有獼猴無一目被燒竟佛問何如孫陀利答何得比此又問汝曾見天不答未見又令捉衣角尋至三十三天佛令遊觀至歡喜園及交合園見諸天女種種音聲有一處天女無夫問天天答佛弟難陀持戒生此當為我夫佛問難陀天女何如孫陀利答天比孫陀利如以孫陀利比瞎獼猴佛言汝今持戒當生此天時佛共還逝多林難陀慕天宮而修梵行佛又同汝見捺落迦未答未見又令投衣角尋便見諸獄皆悉治人有一處無人因問獄率獄答言佛弟難陀為生天故修行暫在天上不久還來此中受苦難陀懼之淚下如雨佛與還遊多林廣説胎相難陀因而發心為解脫故修持禁戒得羅漢廣如入胎經中疏云俗諦有法喜者以受為俗諦故云俗有十八富樓那疏云欲還本國者增一云其成道已欲還本國利益村人中間如疏乃至佛言若能如是乃得利益可還本國疏云正直江滿者亦云滿江亦云江滿即名也疏云殷勤折法者如上若毀辱我我當自幸等即是殷勤之相也疏云所作已辦者羅漢四智中一智也疏云人行理等善知識觀者大品云佛菩薩羅漢即外護知識人也亦名僧寶六波羅蜜三十七品即同行知識行也亦名佛寶法性實際諸佛所師即教授知識理也亦名法寶又一知識各具三義一如佛威神覆護即外護二諸佛聖人亦脫瓔珞著蔽垢衣執除糞器和光利物同行三諸菩薩一音演説法開發化導各令得解教授也六度道品三者助道名護助助道發正道即外護正助合行即同行也依此正助不失規矩通入三解脫門即教授義法性三者境是所師冥薰密益即外護義境智相應即同行義未見理時如盲諦法顯時如智智用無僻即教授義並約四悉合有三十六番善知識十七須菩提疏云占者依報之空能表正報當會空理理具一切法故故俱吉疏云善業者此則常修無漏善業疏云嫌行等者大經云須菩提者住虗空地凡欲入城要先觀入若有於己生嫌嫉者則止不行乃至極飢猶不行乞何以故是須菩提常作是念我憶往昔於福田所生一念惡由是因緣入大地獄受諸苦惱復作是念若有衆生嫌我立者我當終日端坐不起嫌我坐者我當終日立不移處行臥亦爾疏云佛忉利下大論云佛在忉利一夏安居畢乃下行閻浮提四衆雲集人天相見衆會莊嚴先未曾有時須菩提端居石室作是思惟佛常説法若以智力觀佛法身名見佛中最又思惟言今此大衆雖復殊特皆歸無常勢不長久一切諸法空無有實作是觀時即得道證于時大會一切皆欲先見如來禮拜供養時有蓮華色比丘尼欲除女名之惡便自化身為輪王七寶千子導從而至衆咸避之因先見佛便復比丘尼形頭面禮足佛告之曰非汝先禮唯須菩提最先禮我所以者何須菩提者觀諸法空先見法身得真供養非獨此中者此必云法身者且從初説但是五分法身若從得記後應云三德法身非獨此爾餘文例然二十阿難疏云宗社者謂宗廟社稷也宗尊也廟貌也謂尊貌所居社謂后土土者吐也土之所生如口吐物物即地神也土地廣不可盡敬故對之為社稷謂五穀總名即五穀神也故天子所居左宗廟右社稷布列四時五行故云霸其等疏云阿夷等者瑞應經云王語夫人國有道人年百餘歲耆舊多識可相子乎夫人曰善乃令相之阿夷既相尋白王言敢賀大王生此神人如我相法太子在家當為轉輪聖王主四天下若不樂居家當為自然佛度脫萬姓疏瑞相等者經又云四月八日交明星出時從母右脅而生天降大瑞三十有二謂地大動伏藏顯明月神珠懸於空中梵天寶蓋彌覆空上等言相者經又云太子身有三十二相謂身金色頂肉髻眉間毫相頂出光等今既云死則阿夷之言瑞相之表有何微哉疏云有一女人者女人説偈云欲云何所欲貪視不知足染欲貪愛心誤我兒遭來又云欲云何所欲皆從思覺生貪欲若不起欲心則不生將兒置井中竟即説此偈疏云住恐離車等者阿難將欲入則滅往別闍王會王晝寢乃留言於門者竪而便往毗舍離王尋夢蓋莖折而自驚悟門人即以上事白王王嚴四兵至恆河側而請阿難住其國界以入涅槃離車又請是以去留俱有怨也疏云能接持法身者能持佛法身以法為身故云也法燈下歎能化也二十一羅睺羅疏云塞鼠穴者耶輸宿世使兒塞穴六日鼠死此罪餘報六年妊娠云云多是為人等者此八種障不純能障不純所障及除後二障故云多也疏云真諦至本名修羅者此釋不當從佛言我法下今家附彼文釋障義非全用彼意也寶女者瞿夷也法顯傳者高僧傳中法顯比丘別傳中説此緣法顯是神意僧疏云冀神寶至者大經云若剎王於十五日處在高樓沐浴愛受齊即於是日七寶相次而來應者即當得作轉輪聖王主四天下一金輪寶千輻不滅穀輞具足不由工匠自然成就二象寶狀貌端美如白蓮華一日之中周行八萬盡大海際三馬寶其色紺艷毛尾金色亦於一日周行八萬四女寶形容端正身諸毛孔出栴檀香目能遠視見一由旬耳鼻亦爾舌能覆面形色細薄如赤銅鍱有大智慧常以軟語手觸王衣即知王身安樂病患亦知王心所緣之處五摩尼珠寶純青琉璃大如車穀能於暗中照一由旬若天雨時是珠勢力能為大蓋覆一由旬六主藏臣寶無量庫藏皆悉盈溢能見地中所有伏藏隨王所念皆能辦之七主兵臣寶勇健猛略榮謀第一善知四兵若任鬪者則現聖王若不任者退不令現未摧伏者能令摧伏已摧伏者力能令守護云云觀於彼淨等者不淨謂妄語淨即不妄語善不亦爾當作者謂未作者更不可作準寶雲經者是大乘經亦敕十六令持佛法不得入滅況小乘耶所障之惑至思議者異心中破一心中破不同列少知識疏云亦不分別多識等者意云不以凡能分別聖之多少良由聖應多小凡致有多識少識不等耳而別有理本者約體用本迹也疏云十八學人等者中阿含云長者問佛福田有幾佛言學人有十八無學有九學人十八者謂信行法行信解見得身證家家一種子向初果初果向二果二果向三果三果無及五種那含謂中生行不行上流九無學者謂思進退不退不動住護慧俱又俱舍云謂退護住思死不退慧俱不壞法人後約獨菩薩位者此專約十地邊始終別為菩薩立忍位以釋則是彼別圓接菩薩也初入無功用者初住為無學住前名為學學人得二句無學得二句五品為非學句成五句義屬前句者屬學句也闕第三句者無學學句也別圓準通佛住於善法善法者十力四無畏十八不共法等以化衆生則成有於第三句故云準通可知則後三教並有兩節者通教七八地為無功用亦以九十為具足別圓如記即第二節者此專約具足句判也大經中舉因六人者迦葉以頭陀莊嚴阿難以多聞莊嚴此即學入阿那律以天眼莊嚴舍利弗須菩提目揵連廣如彼經二而不二者此迷諸聲聞今日垂迹示為枯榮名之為二亦證中道名為不二故云同於如來也又如來本實久已不二慈悲垂迹示於而二中間入般涅槃是則聲聞二而不二如來即是不二而二也疏云不緣至中間者中間俱不可得也不緣而緣者三德涅槃理不當於緣故云不緣雖不當緣而常緣之此即於本文初句上加而緣二字矣常如是觀者只此一句義兼前兩句若漸進邊名為學當分住邊名學無學所以不云緣而不緣名學無學者為須本文第二句具於兩句義故不侯著也三觀各為五句者空稱藏通五句假稱別教五句中觀稱圓五句矣若百如中等者則百界如亦萬如也又應知千如從理通具故千界從義數義齊故故前二文者因緣約教二文也若欲下略辨前二文相也釋妨如前者如前令欲功用四義文是數無約教者如少知識觀心文末説家云若欲義立聞數歡喜乃至對數解異即其相也義通初後者初謂觀行六根後謂登住已上耶輸陀羅疏云溫良恭儉者敦美潤澤謂之溫行不犯物謂之良和從不逆謂之恭去奢從約謂之儉推人後己謂之讓文中闕讓一德初二句總明者從上當分至總論也疏云顯善權者別述二句也約教理應互通者只是約教通於主伴耳無始終故者以菩薩形無定準法不常規來忽往雜衆則存沒無恆故始終親疏者始從外道已來終法華也主伴者或時佛為伴弟子為主如須達家老婢佛化不得阿難化得等云云顯密者從初至後為聲聞像者為顯示同餘身者為密又權示者為密事理等者如來化事也如來所證理也人法則諸弟子所行法也善惡者善如諸弟子惡則調達也且捨中間等者且不論中間之迹及以華嚴寂場直論伽耶故云近也疏云法身菩薩者已捨生身生實報土得無生忍為法身如華嚴中乘栴檀樓與大菩薩共詑摩耶此乃法界為胎胎外無別法也疏云棄國捐王者太子本起經云太子年至十四請出遊觀王令左右百官道從出城東門天帝化為病人身小腹大倚門啼息太子問曰此為何人其僕答曰病人也何謂為病對曰四大互乖或熱或冷飲食不節臥起無恆故得斯病太子曰一何苦哉吾當有之與此何異乃回車而還憂不能食王問其故從者對曰道見病人以此不悅王乃增之五百妓女晝夜娛樂數年小差復請出遊王敕國中無令病人在於道側太子駕乘出城南門天帝化為老人杖柱羸步太子問曰此為何人其僕答曰老人也何謂為老對曰年耆根熟形變色衰氣力虗劣餘命無幾故謂之老太子曰日月流邁時變歲移有何樂哉回車而還又憂不食王又增五百妓女而娛樂之既而小差復請出遊王敕國中無令老病在於道側太子駕乘出城西門天帝化為死人家室男女啼號送之太子問曰此為何人其僕從答曰死人也何謂為死對曰氣絶魂逝無所復知永棄親戚長埋曠野謂之為死太子曰痛矣劇矣往來五道勞我精神回車而還憂不能食王又增五百伎女娛樂之久而小差又請出遊王敕國中無令老病並及死人至其道側太子駕乘出城北門天帝化為作沙門法執持應器祖地而行太子問曰此為何人其僕答曰沙門也何為沙門對曰捨棄妻子守戒無為聲色不能汙勞位不能屈難動如地存亡自在謂之沙門太子曰善哉唯此為彼回車而還見諸伎女猶如枯骨所有宮殿冢墓無異厭惡在家念清淨道至年十九四月八日夜天於空中叉手白言時可去矣太子曰礙其守者天厭其妻及諸伎女皆令睡臥太子即呼車匿徐令彼馬天使鬼神捧馬足並接車匿踰出宮城遠至貝多樹下念欲剃髮天奉剃刀髮墮天受而去即於樹下捨蒿為座端坐六年日食一麻一米經云天奉美食不肯受之天乃化為自然麻米生其左右者也具修道品及三脫門降魔成佛先與者先與世法故及忘四天下者忘即捨也謂捨四大衆及輪王位也分庭抗禮者謂既內外殊途如主客齊肩分庭上下故云抗禮又若兼解者如人對拜者是亦對也者以師弟未相巨順二彼相拒故曰對也疏云初歷色心等者大品經云菩薩得菩提時為衆生説色趣空乃至其間廣歷衆多法也一切種智等之所空空也色等假也非趣非不趣中也廣如後釋從始至終者專在般若一部自論始終也偏圓者偏通前三圓唯第四故指玄文也疏云會天性者論語云父母之道天性也孤調者灰身故無身滅智故無智唯一解脫故云孤調名為獨滅豈留多人者便破慈恩他云但是定性悉皆入滅並不得度疏云贖命重寶者大經扶律顯常律譬能贖之寶命等常慧命久住世間而無有反故大經云如人七寶不出外用名之為藏善男子是人所以藏積此物為未來事所謂穀貴賊來侵國值遇惡王為用贖命道路澀難知賊難得時乃當出如來祕藏亦復如是為未來世諸惡比丘畜不淨財為四衆説如來畢竟入於涅槃讀誦世典不敬佛經為欲滅除如是諸惡令得遠離邪命利養等云云理同往見者以迦葉佛出其土猶淨同於文殊引燈明佛於法華而入涅槃故云同也月上即維摩詰女無垢施即闍世王女等良恆娥上女賤即車匿等畜者如太子馬馬名揵陟亦如龍女也親謂內眷屬疏即外眷屬慢如畢陵嗔即身子總明觀心疏云似盲執燭者諸聖因緣教相本迹如燭也通至善所者明下文通大地十今文且置通惡邊專從於善所也忍許者只是信順三寶可依故念謂憶持者以憶念故對境能持也猗於宜反吳也大也又猗者倚善離惡聲聞定慧亦深淺者通界內外故乃至未受化者意云若有一分聲聞根性一代已來未受小化者亦為今日行人惡心所攝皆令改惡從善入於法華也次第相生者以心無並慮前心起已後心方生故如色陰居先餘陰次第二起也非王非數者若契理已王不當於王數故云非也須辨同異者謂須辨四教能觀不同其如身子將善心所教化人令惡心成於身子王所傳引至於法華故指餘惡者只是不行諸惡心所故云心心數法不行也因心所盡者塵勞之心是因心所盡之法若至果時皆名常樂我淨故云果心無盡也如五陰因果者為上文舉例也陰名雖同凡聖永異佛陰名為四云德豈同凡下陰耶至王數者令通四教辨於王數能所不同也列菩薩衆能忍成道事者忍謂忍可以菩薩尚能捨身為道況世間違順耶故云也不斷者發心已後中間菩提心更不間斷不破者彼不為小乘所壞菩提心故應約三教以釋答文者釋答一切諸佛法下文也大品通以三教斥小故成四教也答云通雖如此者意云若通而言之有菩薩墮四衆中則菩薩屬四衆接亦有四衆墮菩薩中則四衆屬菩薩接若別而言之如今經菩薩別列也今經列衆之意者唯在圓妙之衆非關至合者或四衆接菩薩別列菩薩或有或無即其相也金光明大小俱無者彼經初文不列衆直以慧眼菩薩問起為別序耳言通意別者通於四教菩薩皆求作佛俱得名菩薩衆今唯在於開顯之衆故云意別大等三者謂大多勝三約於四教則使教教皆具道智用三也又玄文止觀中廣約四教辨四弘誓願上求下化四相不同是故指彼第一卷釋疏云六度等者大論廣説其相今略敘之初檀滿相者釋迦菩薩本作國王名曰尸毗得歸命救護陀羅尼視諸衆生如母愛子是時天帝知命將終求佛問疑遍求不得却還天宮愁憂苦惱時天巧師名毗首羯磨問天主言何以愁惱答言我求一切智人而不能得毗首羯磨言有大菩薩滿足六度不久成佛天主偈答菩薩發大心魚子庵羅華三事因時多成果時甚少毗首答言優尸那種六度滿足不久成佛帝釋言當往試之是菩薩不汝作鴿我作鷹汝便作怖入王腋下毗首言是大菩薩云何以是事惱之釋云我亦無惡心如真金須試即如所説變入王腋舉身戰懼動目促聲衆人皆言是王大仁慈一切宜救護如是鴿小鳥歸之如入舍菩薩相如是作佛必不久是時鷹在近樹而語王言還我鴿來王言我前受之我昔願若有衆生來歸我者我皆救護鷹曰我亦衆生何見奪我食王問汝須何食鷹云我食新肉及以熱血王云無不由殺得之云何殺一與一思惟心定而説偈言是我此肉身恆受老病死不久當臰爛彼須我當與持刀自割股肉而授與之鷹言須遂道理令輕重等勿見欺也王言持稱來稱鴿如言稱之鴿身轉重王身轉輕乃至身盡云云王以血塗手攀稱欲上盡對於鴿鷹言何用如此以鴿還我王言喪身無量今是求易佛道時肉盡筋斷故上而墮乃自責言汝須堅固勿得迷悶衆生墮憂海鷹須救護之何為懈怠尚不及地獄之苦十六分一我持戒精進猶患此苦況地獄中無有智慧者時諸天讚言為小鳥能爾時天地六動海水揚波枯木生華天雨香水諸佛來讚必成佛也鷹語鴿言是真菩薩云云帝釋語王言心不惱耶王言我心歡喜不惱不沒釋云誰當信汝王言若一心不惱以求佛道者我平復如故語已平復人天見之皆大悲喜歎未曾有必當作佛我當供養尸滿相者如須陀摩王是王精進常依實語欲入園遊戲始出城門有一婆羅門來從我乞云王是福德人愍我貧窮王言須待我還適至園中鹿足鳥王從空飛來捉將王去須陀摩王淚零如雨鹿足問言人生有死如何啼泣猶如小兒王言我不畏死但恨生來實語如今乖信許婆羅門行施辜負宿心自招欺罪是故啼耳鹿足言還去七日施竟便來就死若不來者我有力取王還恣心布施立太子為王大會人民云云王説偈言實語第一戒實語升天梯實語生人天亡語入地獄我今守實語寧失身壽命於是發去至鹿足所見來歡喜汝實語人不失信要脫竟還來汝是大人王廣讚實語呵責妄語鹿足聞之信心清淨云云忍成相者如羼提仙人在於林間修行忍辱時訶梨王將諸彩女入園遊戲飲食訖已王少睡息諸女採華於其林間見此仙人供敬禮拜在一面立爾時仙人為諸女人讚歎慈忍其言美妙久而忘去王覺不見拔釰遂蹤見女在於仙人前立嫉妬降盛恚目奮釰而擬仙人汝作何事仙言我修慈忍王言我今當以利釰斬汝手足截汝耳鼻若不嗔者乃知修忍仙言任意王即拔釰斬其手足等而問言汝心動不仙言不也王言汝無勢力為我所因雖云不動誰當信汝仙言若我實是修慈忍者血當為乳言訖血便成乳王大驚走將諸彩女而去林中龍神為此仙人雨雷電霹𮦷致王毒害遂不還宮精進滿相者如好施太子求如意珠得珠墜海正使筋骨枯盡不懈廢誓得如意以給衆生齊其身苦諸天問之答曰生生不休諸天見此精進助其杼海海水減半諸龍見海水半恐海乾竭送珠與之禪滿相者如螺髮仙人名尚闍梨得第四禪出入息斷坐一樹下兀然不動鳥見不動謂之為木即於仙人髮中生卵仙人定起覺其頂上有於鳥卵即自思惟我若起行鳥母永不復來鳥卵必壞即入禪至鳥子飛去爾乃起行般若滿相者如劬嬪大臣分閻浮提地以為七分城邑聚落皆使均者為息諍故此明事度約世俗智云云四三必殊者四教皆有四弘及道知用三不同是故皆云一一也善法體相者心性內外體相也義當於酪者此明四教接於五味菩薩既以別接二蘇圓接醍醐即三藏菩薩當乳酪若在乳時由居內外凡位轉成酪時仍在方等前鹿苑之末若據觀轉即當通教進退者進即俱在般若退則生在方等盈在般若也借本迹中意者凡約教中只應判出四教不應約五味以論調熟調熟之言皆在本迹中説今約教中用者但是借此助成約教耳今皆相指者為明今經菩薩故約五味四教及以開等簡之所以文中在於四種菩薩今經唯一圓妙豈有四耶故云疑網皆除也疏云如善財入法界者有人云準華嚴經見文殊時無如此事應是誤今謂此引舊經未可云誤若復於菩提場中見普賢菩薩於如來前坐蓮華上智慧境界無量無邊難測難量一一毛孔出一切世界微塵光明雲香焰雲雜華雲等是一一雲悉遍法界虗空一切世界又見一一身分一一毛孔悉有一切佛剎一切衆生一切如來出現所轉法輪一切菩薩所成諸行疏云本鄰諸佛者中間迹耳五住對三者三觀觀三惑惑即五住也於一心異心中破故有次不次也不涉權下者三教俱名為權下之一字專在三藏菩薩此明數至因緣者如聞數解異即世界聞數生善破惡入真即具四悉各有八萬者以能從所亦具八萬良由能所不二故六境初四菩提者以十如文略且十二因緣境為初也謂觀十二因緣有四種觀謂上中下上上也必治無明者無明之言通於界內外俱名無明故橫得三不退者至第三祇一時俱得故名為橫故離五障者大論云遠離五事得五功德五事者一三惡趣二貧賤家三根缺四女身五喜忘五功德者一常得人天身二生富貴家三諸根完具四恆為男子五常識宿命位義不彰者具如淨名經中云雖成佛道轉法輪而入涅槃不捨菩薩之道是菩薩行則是入住之文亦不始末彰灼明於地位之相故諸經不彰其例亦爾地前伏惑者伏於別惑正當別義唯識宗地前伏於通惑耳初後不二者法華隨喜第五十人為初華嚴初住為後後由於初圓體本一故云不二迹居諸經之首者意云地亦不知諸菩薩迹居何經之首矣只此一謬者只是但作一權教歎耳疏云今取至兩意者若不得三不退下十三句皆不成要由得三不退方能具三陀羅尼等是故今師此句兩向釋之疏云而德居於初者只此分文已成不當何者既云諸句皆悉歎德如何下諸句云歎行等耶為初為後者以別圓皆有初後故用二教初後責之本即是體者體即三德宗即諸位始終悉具因果一者寄本者以諸菩薩從漸中來至今經故且寄別十地以歎即指別地為本三者順論者論依次第故七地恐起二乘心者大品中明菩薩至七地時若起二乘心則墮二乘地恐墮此地名為起二乘心此是別教教道者若依瓔珞初地念念入法流心心趣解脫正當別位若言十地始入無功用則成教道之上復更教道圓發三智圓明者此二句對第三地圓轉等已下八句對八地配之可見疏云𦦨地者此具燒照二義𦦨如照炷如燒也疏云正智不動等者明此菩薩正智之體常冥寂光無有出動不曾出三界但以慈薰身不動真際遍入五道耳疏云而今出沒者若地地皆具十三句名出但一句對一地為沒又依圓為出依別為沒疏云初發心住者華嚴舊譯云初發心菩薩即是佛悉與三世諸如來等亦與三世佛境界等又與三世佛正法等得如來一身無量身三世諸佛平等智慧所化衆生皆悉同等悉能嚴淨一切世界悉能一切界示現成佛等疏云論其實處者初住分證三德名為實處三德體遍故云無量無邊也疏云初阿字門者南嶽大師有兩卷釋一一相接故表用圓四十二位其理不二言字等者謂菩薩摩衍所謂字等語等諸字入門云何名字等如法慧菩薩説十住十方一切諸佛皆字法慧名字等云何名語等十方一切諸佛説十住與法慧菩薩説等無差名語等功德亦無差名功德等復次如功德林菩薩説十行十方一切諸佛皆字功德林名字等十方一切諸佛説十行與功德林菩薩説無二名語等復次如金剛幢菩薩説十回向十方一切諸佛皆字金剛幢名字等十方一切諸佛説十回向與金剛幢菩薩説無二名語等復次如金剛藏菩薩説十地十方一切諸佛皆字云金剛藏名字等十方一切諸佛説十地與金剛藏菩薩説無二名語等復字平等如無垢地諸菩薩以金剛慧於重玄門平等三昧覺了四十二地四十二地中住一切地從夫至妙覺地等無二止是一如來藏一切字皆是無字能入一字能作一切字是名字等發言無二是名語等云何名諸字入門謂菩薩善解一切諸法從初不曾生何者是諸無明諸行諸結煩惱無初念不曾生無後念不曾滅無中念不曾有住故經説一切法不生云云初住具足四十二地為衆生差別説如言不退曰住利物曰行悲曰回向堪忍曰地等照曰覺本淨曰妙廣如彼釋云云故亡迹者亡昔權教今唯在圓故云本也去初而取後者初即昔三後即今圓也一者接取妙法者並初總句故成四句今家將四種方便偏於十三句上今橫竪二釋地地悉具方便故下三方便如記中具録論文次第配諸句竟論中復有接取事門者文相同前故云非要論示現諸地接取勝明功德不同二乘功德故八地無功用智不同下上故不同下者下功用行不能動故不同上者上無功用行不動自然而行故於九地中得精進陀羅尼得具足四無礙自在故於十地中不退轉法輪得受佛位如轉輪子故以得接功德成就者示現依何處依何心依何智依何境界依何等能辨故依何處者依善知識故依何心者我依衆生心教化畢竟利益一切衆生故依何智者依三種智一授記密智二者諸通智三者真實智依何等境界依何等能辨者即三種智接應知即諸地功用者為八相九界身化物故言八地者更重釋前七地恐起二乘心文及八地始入無功用者名此為更一重教道通且依一家承用者今家專依瓔珞經以判地位不依論文今文二釋至觀者橫竪義當約教觀心自當約觀言義當者今唯在圓復寄於別觀亦如是今正在圓復寄次第故云義當也百句只是一句者論中十種示現一一皆十即成百句今觀亦爾一一具十旋轉無窮疏云三諦理和至僧者應更云智與諦和名供養僧疏云空觀入通佛慧等者圓心具三佛慧故應約諸句自在説之者句句互通圓融旋轉而復偏通四教偏圓相顯施開廢會橫竪無窮故或隱者隱在小等或真即出家菩薩或俗即在家菩薩如跋陀婆和等或主或伴者為主導為伴隨也不同聲聞顯著者從漸至頓經歷諸味事迹次第復不改身故云顯著也疏濡音軟疏云不起法至相者不起二邊而行中道之行也疏云願取妙土者亦可云寂光為妙土也釜物事廣者所化衆生皆於十方先成正覺故云廣也所化位高者我之國土皆一生菩薩觀音中思益即為人者生善中最莫過菩提也例前擬後者依前聲聞擬雜衆也疏云一切見愛者動即破也見愛通界內外外即同體也無間趣入者合字釋也若分字釋者無間曰精趣入為進長時無廢者先合字釋次分字釋者長時名不休無廢名不息疏云寶掌者堪能掌護世出世寶故爼敗者爼也有本作𭁎字非疏云令釋大乘者是佛令菩薩為人説大乘法也不志二乘者以二乘人不能説於大乘所以夢中亦不令至於珍寶心等者以世寶顯出世寶出世寶者即三德為珍寶也以自證故還將此寶以利於他故云無所貪惜出世尚爾況世寶耶故此兩寶必具四悉者兩寶異即世界為人講説即為人心無惜即對治掌即法身第一義云云簡法寶濫者二乘亦證五分法寶德恐濫大乘三德法寶故藥王中三緣者供養起塔為一劫盡至救為二大醫王為三世尊往昔者應云世尊慈氏往昔云何發此慈心更撿未濟跛䨲者大論二十六云因地為鹿所居之處被野火燒避火而走值於水溝有多少獸不能得度鹿以身為橋度諸獸置於彼岸衆獸踐脊皮穿餘命無幾跛䨲最在後至跛䨲終過鹿身自陷水而終云云具名之外者釋六如是下結文也唯除一人者經中亦不云千人中除其佛等但云除一人耳應是除觀世音菩薩以觀音是補處故列雜衆疏云方等經亦列地獄者如婆藪外道示生殺羊示報墮獄領地獄衆聽方等經為引乘急戒緩實人聞法得道戒緩故墮獄乘急故值佛聞經云云故可見有對如前者如前聲聞菩薩二乘及欲色二界是有對可見故臰毛鬼者即釋上有對中不可見句也疏云果報與形服雜者後二教界外形服也疏云漚和者出假智也宗本論云適化衆生謂衆生謂之漚和傍出十六千等者下竪首級廣十六由旬餘八四二次第持鬘等三級謂下濶上漸漸狹也四角有四峯者山頂四峯也疏云高廣三百三十六萬里者依阿叉末經由阿叉末菩薩問佛有此答疏云三十三觀門者以三觀觀三十故成三十三觀以中觀為主也三光天子疏云或云是三光者日月星也星以水精為城七寶為宮懸在空中天風持之猶如浮雲隨日運行其城大者一百二十里中者八十里小者四十里修下下品十善施燈明等而生其中月去地八十四萬里其城縱廣二千里白銀琉璃二寶合成從初一日白銀面轉漸漸向人至十五日正向故見圓滿從十六日已去琉璃面漸轉向人至三十日正向故名黑月宮中亦有男女一日一夜當人間五十年壽二百五十歲身長十里修中品十善並施燈明等淨物故生其中日去地八十四萬里以火精為內城黃金外城縱廣二千四十里亦有男女壽命身量與月同也唯日天主自知遊行行有三道秋從中向南正當於氷山之上故秋溫而冬寒春從中向北正北當於三百三十六萬里蓮華之上蓮華助日之轉故春溫而夏熱大北見近則長南見遠則短秋春正中故等修上品十善施燈明等則生其中境別智別者次不次不同也言生子者境發智智是子也疏云增長者能令衆生增長諸善滅離諸惡故云勉離也疏云四王護持佛法者大經云善男子東方雙者破於無常獲得於常乃至北方雙者破於不淨而得於淨此中衆生為雙樹故護沙羅林不令外人取其枝葉斫截破壞我亦如是為四法故令諸弟子護持佛法云云不許偏取者謂二乘菩薩皆不得中各自偏取須知常即無常無常即常等若偏取者則同外人故云成邪若全取者須知枯榮皆非枯非榮若雙執者不會不二之理故云須知其理又復須知一一皆具四德云云疏云枝幹者堅實可喻於常其華柔軟卷舒自在喻於我樂中之最不過極果故以果喻樂以大小葉互相間鋪無有汙染故喻於淨若從後説者從圓説也各破愛見者後二教除同體愛見疏云自在即第五者自化自用而得自在第六大自在他化自用而得自在對上二天故自在云云三肘半四肘者肘長尺八準姬同尺為定東天丈六西三丈二北六丈四故云倍倍增如次南壽一百二十持下品五戒得從人至天東壽二百五十持中品五戒得生其中西壽五百持上品五戒得生於彼北壽千歲持上上品五戒得生於彼欲天俱盧舍四分一一增者依論中二里俱盧舍分四一分半里第一為四天王天身長半里壽五百歲一日一夜當人中五十年去地四萬踰繕那去忉利天亦爾下去倍倍不委書之謂修中下品十善而生其中第二忉利天此云三十三天身長一里居須彌頂壽命千歲一日一夜當人中百年修中中品十善得生於彼第三夜摩天處於空中身長一里半以寶為地壽二千歲一日一夜當人中二百年修中上品十善得生於彼第四兜率陀天名為知足心無放逸常有一生菩薩於中説法身長二里壽四千歲一日一夜當人中四百歲修上下品十善得生於彼第五化樂天身長二里半壽八千歲一日一夜當人中八百年修上中品十善得生於彼第六他化自在天身長三里壽一萬六千歲一日一夜當人中一千六百年修上上品十善得生於彼色天踰繕那等者從此向上無女形身要修禪定兼於十善不同欲六但修十善故此去色名為淨色身長半由旬即半踰繕那也壽命半劫修下品初禪得生於彼次梵輔天身長一由旬壽命一劫修中品初禪得生於彼次大梵天身長一由旬半壽命一劫半修上品初禪得生於彼第二禪有三天初少光天身長二由旬壽命二劫修下品二禪得生其中次無量光天身長四由旬壽命四劫修中品二禪得生於彼三光音天身長八由旬壽命八劫修上品二禪得生於彼第三禪有三天初少淨天身長十六由旬壽命十六劫修下品三禪得生於彼二無量淨天身長三十二由旬壽命三十二劫修中品三禪得生彼三遍淨天身長六十四由旬壽命六十四劫修上品三禪得生於彼第四禪有九天初無雲亦名無罣礙身長一百二十五由旬壽一百二十五劫望前遍淨天壽一倍增之合一百二十八今但云一百二十五即是減三劫壽也是故記云唯無雲減三減三者婆娑中有二解初解云三禪已下名變易受四禪名不變易受亦名捨受從變易受入無變易受難故減三劫之壽又一解云火水風災壞一二三禪已後世界成時無雲福生廣果三天即下生彼若不減三則世界已成無人生於下界云云次福愛亦名福密身長二百五十由旬壽二百五十劫三廣果身長五百由旬壽五百劫四無想修無心定亦身長五百由旬壽五百劫此是凡夫外道天自此之後名五淨居天並修薰禪得生於彼即那含人依處初無煩身長一千由旬壽一千劫二無熱身長二千由旬壽二千劫三善見身長四千由旬壽四千劫四善現身長八千由旬壽八千劫五色究竟身長一萬六千由旬壽一萬六千劫無色有四天一空處雖無形色而有四心壽二萬劫二識處壽四萬劫三不用處壽六萬劫四非非想處壽八萬劫上來並約壞劫火水風時如一火一水以為一劫是故經八七火一七水一箇風災何故爾耶火至初禪水至二禪風至三禪二禪壞時初禪必壞三禪時初二必壞是故劫劫皆壞初禪為順初禪一劫壽故又經七火次一水災方壞二禪為順二禪八劫壽故又經八七火一七水則成六十三劫方風災始到三禪為順三禪六十四劫壽故此等諸天若下聽法化為人像四空處天名為難天不得聞法色無晝夜殊者彼無日月但用身光故故無明暗則以華開華合表於晝夜龍眠龍起以表春秋少光上下天者初禪三天在少光下天也大梵一全一半梵輔一全梵臣一半若少光已上諸天如前已列劫數等可見次更重明經論所出色界諸天多少不同及釋諸天之相依薩婆多宗列一十六天若經部宗色界有十七天大梵與梵輔雖同居而其形量壽命不等故別立也依上座部立十八天開四禪中別出無想謂與廣果因果別故若經部師宗以無想天與廣果天身壽一等所以無想接入廣果故但十七天處後五天名淨居天唯聖人居無生異生雜故名淨居也疏云九道者九為所化境佛為能化主也疏云梵者者雜阿含説百億梵王又云尸棄是初禪梵王大論云梵王是千世界主十地經云八地菩薩化千世界九地二千十地三千仁王經云七地初禪王八地二禪九地三禪十地四禪華嚴云八地菩薩毗曇云四禪無語法也疏云初禪梵衆者大梵之衆也梵輔者輔侍梵王大梵者廣善所生故名為梵此梵天即大故名大梵得中間定最初而生最後而沒威德等勝等勝故名大梵少光者於二禪中光最少故無量光者光明增故光音者亦云極光淨光明勝前偏照自他也少淨者意地受樂故名為淨於三禪中淨最少故無量淨者此淨轉勝遍淨者淨周普故第四禪八天一無雲地無密雲二福生異生勝福方可往生三廣果色界異生中最勝故四無煩煩謂煩雜於無雜中最初故五無熱已得雜修上中品善能伏上中品障意樂調柔離諸熱惱六善現已得上品雜修禪定果位易彰故名善現七善見已得上勝雜修靜慮定障至微見理清徹故名善見八色究竟於色天中無有處過於此者故疏云免二死之熱沙者勝鬘經云何謂二死一分段生死二不思議變易生死分段死者為衆生變易死者謂阿羅漢及辟支佛大力菩薩即通指方便實報二土菩薩如舞戲者被動不安名為舞戲非本心者迦葉本在於小而不測本故十寶山者廣如華嚴一雪山王二香山王三軻梨羅山王四仙聖山王五由乾陀山王六馬耳山王七尼民山王八斫迦羅山王九宿慧山王十須彌山王云云理應法身記者即授妙覺佛記也八相記在於初住已上由屬於權故云在迹疏云採華者西國不用但用恆已華為酵耳疏云質諒者道行般若經云此神諂曲為立此名令其歸信疏云五處被縛者臰爛死狗穿腹破胸裹魔王頭以死狗頭蓋魔頂上狗口蟲膿流出隨魔額汗流下入鼻口死狗前腳抱魔額死狗後腳抱魔頸臰蛇繞頸編胸以為瓔珞繞臂至手似如環釧死人繞腰死豬繫腳以喻被外道愛惑縛疏云五惡物者如上以喻為見惑縛破二縛死離二惑也五性宗者一人天種性設勤行精進但以人天果報而成熟之由無本無漏種子及煩惱所知二障俱不可害二定性聲聞三定性緣覺此二有生空慧種子煩惱障可害四不定種性從漸至大五菩薩種性煩惱所知二俱可害也五住為二死作因者出正法念或是非情者有情詫非情而入胎故疏云觀天女天園林等者羅睺身醜常樂來著天女及園林等人中有供養沙門及孝養父母有福資於天是故天女等能上空而雨刀等兼胎藏者昔全濕生無有胎藏今濕氣入身成胎故云兼也疏云勝群輩者屬藏教也次大身下通教也次大滿下別也次如意下圓教即當約教也睒失冉反暫視也懾之涉反伏亦服疏云不可動者有大力故不可動有大福故不可動疏云肉裂火起者嗔盛火起疏云普超經云阿闍世從文殊懺悔者涅槃經云從佛懺悔是則普超從伴涅槃從主也令住法界者分住空觀耳故云聞已得柔順忍也家兄耆婆者是頻婆娑羅王庶妻子耆域是無畏太子即頻婆娑羅王孫母名大示女引楞伽者楞伽第三云殺無明父害貪愛母斷隨眠怨壞陰和合斷七識身此逆即順圓觀心也疏云見佛有權實者藏權衍實又權實不同也疏云依涅槃一句者戒緩乘急一也疏云加修禪定者欲界四空天亦須著加修禪定之言如粗細住等即其事也大小至漸頓者謂漸中密得頓益頓中密得漸益故值佛時處者部會之處也現在得道為促未來當得為奢揣心者誡勸行人當自揣度揣量心行於三品戒乘為與何品相應若上品相應只於序中已獲證信之分若不爾者於經何益壞慚正宗者意云於序有分至正宗時於三品乘戒為從何品開悟而獲記莂此意專令戒乘俱急故以人身見佛聞法而取開悟借使八部身聞終不如人天之身受道從此第三卷別序釋此別序應知無量義與法華前經及以法華有同有異何者先經亦是從一出多昔未顯説至無量義佛自彰灼云從一出多故此不同與法華異者無量但云從一出多未語收多歸一此異復同何者即一家之無量無量家之一法無別途故復一也初云望通得名者自望今經通序得別名也若前通序即以教相對而辨通別故前文云通序通諸教別序別一經又若從如來最後下述如來遺屬意則令一切經初皆安五義故云唯通別序唯別者經經皆爾各自表報事殊云唯別從若如來滅後下明結集之家順於化儀先小後大今昔相對以明二序故云來至今經也若直就下傍就昔經以論通別也通序文通等者此即文義俱通五時及以部內教多少也亦有義通等者其義雖通意別在別別在彈斥淘汰等故別序文別等準通可見亦有義別下其義雖別而意則通通諸部諸教何者如方等中正明不思議解脫文中意在以大斥小故以圓斥偏通説四教專明彈斥故餘味例然又亦可通序下約文通義別以釋別序文別下約文別義通以釋入定至合者無量為開義處者合也疑念乃雙緣者過謂無量義經座席現即餘五瑞謂緣過疑今而異於昔緣今疑昔而異於今又於昔復曾都此瑞與今大異故猶預於當者不知如來定起為作何事衆初圍繞者謂指圍繞已欲説無量義前名為爾時斥其消文者斥其翻覆生起消文也表四一當同者序中表報如來定起四一四皆一故故云同也理一是第一義者以利人聞名即得體故居第二鈍人至四方能見理故至第四良有以也答問不引三同者借使昔日是妙德答問亦無三同可引由是聞法表一乘人者此指聞無量義經表成今經一乘人也況復能知定理者時衆雖見如來入定不測如來入定緣義處之理言等者等取雨華等尚未名一者三即是一方名為一三外之一故未名一預辨能開者開權之圓以為能為開非帶偏之圓矣五味四味者第五為能開四味為所開又四名施權第五名開權故云也以皆表一者謂空假中皆一故簡餘三儀者此明住義又今意明圍繞只是前後故不須第二釋天龍等四者更加人鬼為四也梵魔等四者加婆羅門沙門為四也梵即色衆魔即欲衆也不判凡聖者引入凡位名為凡入聖位名為聖即四衆義足也逆者嚴王調達等順者即諸弟子等權實者示同權同實亦四衆義足故此十雙一一皆對昔教與今辨異以問古人昔教凡聖與今凡聖何別説即發起默即影響又説即三周得記如身子領解默即默念領解如樓那等今昔者今四衆異昔四衆微著者結緣為微當機得記為著又鹿苑為微法華為著又法華中微謂彈指合掌等無非佛因爾前未開故不同也共別者藏通大小共別圓獨菩薩法為別又別唯在法華前三教皆名共也兼獨者獨即三藏又獨即法華獨顯一圓故此十雙九屬迹後一屬本也故外小等四對內等四則外等四俱有其名而無其義何者外人亦有常樂等名而無其義小即三藏等亦有真如實相常住涅槃之名而無其體權即三教雖當時被物而不至極故名為權也人王者即闍王衆導機既發者當機衆也影響扶疏者影響釋迦扶疏當機應物施設者應更云施已後開來至今經權巧方極可生等者已生者令成成即入住未生者發起令生也用以釋名者擊揚之言正是發起之體依體立名故先四字正釋者擊揚發動四也次四字者成辦利益四也又割之令開下四又約四悉重釋發起衆也義兼能所者只發起二字兼於能所何者發起於他俱屬於能所發所起俱屬於所故云割之等化功歸已為進自行即自也令他至極即化他也發時衆之一善者今時衆當獲一乘之妙善也動稟益者如身子三業領解即其相也至起應地者樹不至地象子不飽機亦如之若非法身大士扣如來法身之地從法起應焉能令機至於極耶中機可發者中機二字釋當可發二字釋機俱屬於所則是契中機情故擊動事遂者成於當機方名遂耳疏云隱其圓極者古佛隱極法身菩薩隱圓也顯德者為顯法王尊高令衆欽渴故冥扶者雖無為作而亦以同體大悲冥助法王密通化道故影響之儀者儀謂儀式未有影響之用故但云儀也俱有權實者權者引實也助理者一句圓常之法內薰三德之理也助當者助於當來修得三因開發之緣也通取六根五品者此即克體簡於當機猶未具足真位三德是故住前通名結緣耳又亦可五品為結緣六根為當機又隨喜已上為當機五千及一句一偈為結緣故得度至通別者別則初住通則通於隨喜已上結緣位別者別在一句一偈及五千也若新入者者專取破一品無明人為當機若超斷二三品等則名影響也人以為揩者治其無揩之惡故云也增進至為動者前三教人須破權執方名為動但不別而別者圓理本融但隨入者不等得四門名以觀轉至增者以初轉故名增又始終漸進為增也寄觀以論本迹者觀色身迹也見法身本也疏云皆是供養者恐人但云一身業供養故云皆是疏云説七言偈者謂大哉大悟大聖主無垢無染無所著天人象馬調御師道風得香薰一切等數紙偈科簡諸位不同者初住已上諸位供養不同言通事別者通於無量義別在今經故意具斯二者若以始終專注則意業未休若以意隨身口則無量中三業俱畢也疏云為諸菩薩説大乘經等者無量義經云大莊嚴菩薩與八萬菩薩同聲白佛言世尊菩薩摩訶薩欲得疾成阿耨多羅三藐三菩提當修何行何等法門佛告諸菩薩言善男子有一法門名無量義能令菩薩疾得菩提從此為説無量義經云云太淺者亦無表報故成淺也非唯覩光者六瑞皆令衆喜豈獨光耶一多相即者開權顯實即多而一故又能即一而多始終相即故共顯一致者顯於不二因果故云正在因果華表真因者約位位斷惑邊名為真因地兼分果者名唯在究竟初住分得故云兼也説且顯露從多者專從無量義以為所表故云指一説多為今經序若從密意與定不殊故疏云瑞只是相者既云瑞只是相亦應云今瑞如本瑞今相如本相也定時乃密意從處者時機未堪祕而不説故云密也疏云密報為端者冥在佛壞以表於正故云密也義同幽者玄亦深遠也亦妙也而擡掣者昔日偏小大機未發猶如淪墮故令以瑞而擡掣之令欽渴等者四悉結成也廣則無量者若論皆妙則一色一香無非是妙若心若境無非經王故云也乃成處中者只是六瑞皆表妙表中矣入定表行者入定是行以依理故地動表神通妙者神通即果上勝用感應專約稱機故有多分之別況香風至開合者合則在雨華瑞中多番釋之者下偈中三行經對般若等五番解釋也是則大事等者此下諸大但是通途結束出六瑞表報奇特不須別去以配十妙經云説大乘經等者問此唱異名與下文殊引燈明佛現相序亦云無量義有何別耶答彼顯此密何者今雖唱於異名即入此定時機未測故成密也彼即彰灼引同釋疑故不同也又大乘經者十二門論以六義釋大一出二乘之上故二諸佛最大是乘能至故三諸佛大人之所乘故四能滅大苦與大樂故五觀音彌勒等之所乘故六能盡諸法邊底故三明菩薩所依者亦云三明因人所依四明果人所護淨嚴行者定慧莊嚴故云行也數有大小者但單三祇由約少數屬於藏也大乘無量阿僧祇為一阿僧祇等故須別釋至序文者將於善戒經為開顯釋以為序表也疏云指者不來秦地者嘉祥云今以五義證此無量義經證是法華前無量義經説一處同王城鷲山所説二衆數同萬二千聲聞八萬菩薩三時節同二經皆云我成道來四十餘年説此法四義同雖未彰言明開三顯一而指趣密開一乘五翻經人中天竺沙門云是法華前説三者妄破古師者古人實無云大品是法華經序何故防他伏難即引大品非法華序耶則成妄破也每臨講肆者名僧傳云基公欽竺道生講善於法華雖有二判無以取決餘如記云注無量義已上文是武當山均州屬南山道略從子者慧表是略從子也國破之日為晉軍河淡之所得數歲聰點淡之字曰螟蛉養為假子俄放出家後勤苦求道南北遊尋以齊建元三年放寄藪遠去嶺南於廣州如記表乃致請淹經一句僅句一經僅得一本仍還均北齊入武當以永明三年頂戴出山見投弘通奉覿真文欣敬兼誠詠歌不足遂後注解正以空為無量義基覽經便謂解與經校合矣疏宋者家總六十年宋者惠表至齊年可七十已下耳疏云破三與一者破三車與一大車也可成此二者法華無二無三及破三與一序耳為無二三等序者等取破三與一也先破初句者無二無三句破其次句者破三與一為異句也前破語存略者前立中但云破三與一即其文也雙牒兩難者疏云破二破三即第二難無二無三即初難既其破二破三則無二無三但成於正而無其序失又前從若言萬善下難云序正不異則成但有於序而無其正次從若言破二下但有於正而無於序若以低頭舉手者此防光宅伏難云我今萬善者但是低頭舉手等善名為萬善非二三等善耶故今難云二三勝善尚無況低頭等劣善而不破矣殊又表同者無量是即一實家之無量方得為序一即無量家之一作序故云也此二既然者此二之外更有解者亦不出此疏云法華論列十七等者論消經中説大乘經名無量義教菩薩法佛所護念之如來欲説法時至成就為諸菩薩説大乘經名無量義乃至法門等此大乘修多羅有十七種名顯示甚深功德一名無量義二名最勝三名方廣四名教菩薩法五名佛所護念乃至十六名妙法蓮華十七名法門如玄文第七廣釋十七名重牒其名者只是異名由序中唱故得序名此之異名當體屬正故云義兼於正也兩兼者亦此異名無量具兩兼義在序中唱則得序名只此異名全屬於正故云雙得無量至意耳者但是重敘出無量意耳疏云三道即三乘者若準玄文所釋三乘唯在因位故與四果義別云云菩薩名通者通四教菩薩也生於兼一者生於華嚴兼帶之圓也雖舉能生者即能生為所生專從所生為序即所生為能生專指能生為正故故云也何殊生等者等取觀師及昔一圓者方等般若中圓也還成雙失者單存所生與昔三教不別單存能生與昔一圓不別若為今序正必須能所相即是故各存序正不顯故成雙失今家能所相從者明今家能生從所生則指所生為序若所生從於能生則取能生為正是故相即二義俱成矣因無量義序異者正為明於無量義為法華作序須異諸經故也絶四至深淺者通於四教若望圓極前三展轉以後破前故云比之是則前未離非故云深淺也所接成處者一一身皆具四土四德能照之智屬報所照之境屬法身為能依常寂為所以德成故其土必成故云所接成也所安立者所依極故名為安立爾前理合身常等者將普賢觀望法華無量義俱名爾前也悉皆有結者菩薩戒結華嚴仁王結般若像法決疑結方等遺教結涅槃故云如玄文也序中能生已明常者他難意者所生容有當與無常能生一向是常與正何別是故專以能生為難淨名宗體者不思議佛國因果為宗真性解脫為體也以空假顯中者謂觀衆生品明一空一切空空即中也佛道品明一假一切假假即中也復宗明常者如常擎大衆還詣華羅園至如來所印定成經等從極理説者部中圓極無非是常部中兼帶有常無常故玄文云華嚴兼等今經則以圓常極理名常故云五時自分也常外無餘者序中未會則成能外有法正中會所歸能故知能外無法故也俱序並正者明説定二文俱加義處處即屬正無量屬序二文咸爾故云並也今從經所表邊者今從以序表正而説故云今從經所表邊復以義處歎之者兼於異名也約法者約能生法也一護念言者若護念無量義則成於序若護念義處則成正故云也以未説故護者猶機未堪故且護也未暢故念者出世本意唯説一乘則暢佛懷時機未堪但念欲説故云未暢也彼如出水者無量義也此即法華也理則可見者只是説無量義經已入無量義定為今經序其理可見耳各有力用者説時有定用定時有智用故云也且覆別從通者別則法華三昧通謂無量義處雖云義處亦不明故云也問今佛何不準大通者問意者彼亦説法華此亦説法華彼有王子此佛亦爾二處説法有子既齊此佛何不説後入定與羅云結緣耶答意者結緣與通化儀同但佛在世與滅後雖殊而云通化理亦無妨亦為結緣通化時異故此説後而不入定矣二定並得為序者入無量義定為義處定作序入義處定為説法華作序又入無量義定已説無量義經入義處定已即説法華經所以二定俱得為序先以色心至表之者此即義處色心不動為説法作序相同時異者今經入定與大通入定其相不殊此在説前彼在説後故云時異也如雲母者出高僧傳而無理顯之者只但云比丘等四有何道理能顯得發起等名體相別耶四果不實者須陀洹等四也具引瓔珞者彼經六輪譬別教六位初之四輪與今文同五以摩尼輪譬等覺六以水精輪譬妙覺今用彼譬譬固位也今明因位不論等妙三十三天者開十住十行十向為三十十地合為一等覺為一此三十二以譬臣妙覺譬君若臣若君同服第一義天無生甘露故云三十三天也如十四般若者亦云十四忍忍因智果若從果立名應沒等覺存於妙覺居極果故但高下不同者別聖位在初地為高圓在初住為下賢亦準此住是賢位者別十住是賢於圓為聖稱故名賢聖句圓行向是聖於別是賢故云聖賢句別十地是聖於圓又聖故云聖聖句又別十信是賢圓信又賢故云賢賢句又若不相望立句者圓十信為賢五品為賢賢四十一位為聖妙覺為聖聖別教三十心為賢十地為聖妙覺為聖聖十信為賢賢若作兩句圓教住前為賢登住已上為聖別教地前為賢登地已上為聖故云當教名定疏云破三藏三乘者破藏成通故今非之悉不當也疏云通教約法三人因果同者初觀般若後證般若也疏云別教至因時等者別教初心即知一切衆生悉本有法身後有般若解脫之性在法身上而不相融故名為橫先修空次修假向後方中故名縱也疏果時者至初地時三德分證得不相冥故成橫矣先得法身次得般若後證解脫是名縱又自行竪化他橫以順物機隨宜而説耳初文似約教等者一者文不次第二者約教因緣文不彰顯故云皆似也菩薩生時上天下人所見異名世界餘三可知未破大無明者對小明大且以破見思為小無明也又無明盤者一以三惑俱破為盤二以無明微細為盤後六者欠上生都率及下閻浮提成道轉法輪者今文是轉法華輪也位之功用者由入地住方能八相故知八相是此位之功用勸行釋中初句者文云觀行動者動六根是也次約六根為表者從東涌下也疏云餘方涌沒者南涌北沒南方赤主心心主舌北方黑主腎腎主耳表舌根功德生而耳煩惱互滅翻對可知中央涌四邊沒中黃主脾脾主身四邊主識識遍諸根表身根功德生意根煩惱互滅翻對可知六根亦似三形者鼻舌身三實三聲者眼耳意虗也故俱舍云三根離中品知謂眼耳意根境不至三相違知鼻舌身三與眼等相違至境方知故一根各有根識境三者以一根各具等遍等三動但不得離於三動以對根識境三品只是通表淨十八界耳並闕心境等者只是闕於思議及不思議境及十乘觀法耳具如止觀不思議十乘觀法觀陰界入文也只一地而已者一無明地也疏云感於勝應者中道妙應名為勝應何者以法妙應妙亦由機妙故感妙不同通教勝應及以舍那此之感應顯露彰灼由在正宗今仍屬密也經云優婆塞此翻近事男優婆夷此翻近事女夜叉此翻捷疾鬼亦云勇健摩睺羅伽此云腹行神何疑不釋者如來定起機感始成大疑方釋也疏豪中表俱空者其豪內空毫表清淨不受塵垢為外空耳四皆此經者通序文通諸教是故四悉多分三悉屬昔今別序不通於昔是故四悉唯在今經表意者望於涅槃猶屬現在等準諸文説者以放光不同諸部文説也一者不制者他云佛常光但能照大千若作意制則得過此也別在初住者通具六即別在分真也故其文勢亦含長短者若就此土應作三節明其長短一極短從爾時佛放眉間白豪相光次長從照東方萬八千土靡不周遍次更長從下至阿鼻地獄上至阿迦尼吒天記中云終至周偏者從更長説也疏中從照東方下屬他土文他土準此又他土若進此土須退也被物未顯者來至法華方名顯耳始末由之者明六道蒙光之時雖未得其顯益還由諸佛之始得至於終而獲開悟故得與聖同對又應知他土六瑞人之與法俱通始自華嚴終至般若須兼無量義以無量義是六瑞之始六瑞即是今同也當同之義起塔表涅槃之終經文自顯所以説法一瑞須通至已今二同故也七識住者一身異想異四州六欲天是二身異想一初禪梵王住六十劫王身長天子一倍想一者梵王先作念思惟言何處有情衆生來生我此同分中即自念言二禪諸天應生此中彼天亦念我應生初禪梵王云由我念故天子生我同分天子亦念云由梵王念我生彼同分三身一想異者二禪身量等想異者新生天子始從初禪來而作生此見火燒初禪怖念云火來火來舊住天子云火仙火仙勿苦惱但至梵天盡其火即滅四身想俱一三禪同一樂故無色下三皆依空識無所有處等住雖無粗色以定果為色也不取非想者以識昧劣故不取四禪者以凡聖共居故不取無想者純外道居故疏云若此土六瑞至自覺等者表覩瑞之後方聞正説已自破惑名為自覺覺他者表諸菩薩聞法華已能於他土流通益物是故光照他土而預表之當同仍隱者前四味為己無量義為今法華涅槃俱為當以法華相未彰故云隱也都無所作者非謂全不成於化儀但以化儀理合先密後顯若光中已見則衆疑不生疑念不生如來定起亦無所説被物須教若無教者化儀不成故云也其壽若何者意云若於光中亦見他土地涌菩薩之悉釋迦所化此土時衆亦疑不知釋迦壽命幾何故云也略知定後之相者雖知説法華未知記小故云略也而釋契別理者只是契中道理耳疏云非頓而頓者實相之理不當頓漸頓漸約化儀也疏云五百比丘各説身因者大經云五百比丘問舍利弗大德佛説身因何者是耶舍利弗言汝等亦名得正解脫自應知之何緣方乃作如是問有比丘言大德我未獲得正解脫時謂無明即是身因作是觀時得阿羅漢復有説言我未獲得正解脫時謂行或云識或云名色或云六入觸受愛取有飲食五欲即是身因作是觀時得阿羅漢爾時五百比丘各各自説己所解已共往佛所各以所解向佛説之舍利弗白佛言世尊如是諸人誰是正説誰不正説佛言一一比丘無且非正説然其自是藏教有門之人今且從顯者從鹿苑顯露未轉邊耳仍舊乃成種種者仍初三藏有門故得種種之名通中幻化是一更無種種之別問行一者此問意者經文但云種種想貌行菩薩道即行一與經種種信解復何別耶答如記覩外識內故名不同者謂三教弘願不同也大術在於世尊者以神力故令於大衆一時於橫見竪事殊理絶者者純説小者名為事殊純説大者為理絶既大小不同則非光照之限今光照皆為表同施化不同是故不照也遠近者見萬八千為遠此土為近也過未亦何隔者遠近俱見則知一土之中皆見三世則法華前為過法華為現涅槃為末始則華嚴末則涅槃也加今見者有由佛加也凡聖一等者謂凡聖所見無二耳
