body:
  text: 吳興永定寺釋沙門道暹述釋法師品疏云宣傳者依文宣傳未能廣解義理若多若少者經論五六不同故又從咸數下約四法乃至一法明法師即是多少之相未有一文者無有經論次第具列五種名為法師在於一處也多少者只是五六不同耳三流傳者令他書寫受持讀誦故七廣説者若流通其文不名為廣敷義弘理乃名為廣單云憶持者意云先受後方慞持不得單云慞持應云受持也元是別義此是大經中次第之義即當別教大經九品者從第四恆已上俱能化他以證今文五法師也疏前四人無解者彼經云佛告迦葉若有衆生於熙連河沙佛所發菩提心乃能於惡世中受於是經不生誹謗次於一恆沙佛所發心加能愛樂餘與上同次於二恆沙佛所發心又加能正信解及讀誦次於三恆佛所發心又加書寫經卷雖為他説未解深義是故四人俱為弟子之位疏束五為四者以五法師對三業安樂行加誓願安樂行三業皆具慈悲所以通名化他也疏身意是自行者其身若正不令而行其身不正雖令不從今以身正故故是身業法師也意業能善籌量契當實境界不勵而正即意業法師也已有前後者前則指五法師今從通義故名法師品文是後者則東西為三文是並是後從通以結品名若以四安樂行例結品者若從別論三業安樂行是自行是慈悲誓願是化他又別論身意慈悲即自行口業慈悲即化他又通論自軌四法故通稱弟子即自行之法師四種教詔即化他故通稱法師今從通四故名法師品是故云若欲知者下即示四安樂行相也疏即福德門者五法在昔未名為門今經五法以自薰修即是緣因故名門也餘二品爾疏讀誦書寫是外行者衣能蔽身故屬外由讀誦等外遮諸惡故名外行受持是內行者座為安身以身安故內思空理即內座也疏障己醜者由讀誦等內安寂理能障三惑之醜也疏涉有者但以入惡弘經名為涉有用中道寂忍為本也疏濟他以忘我者不同俱舍等教中忘人忘法為忘我今緣中道畢竟空理十法界我任運自忘通論互通者謂自行之法通堪化他化他之法通堪自行即是化功歸己也疏三界者謂三善道也疏坐蘊一切相者亦是蘊一切生善滅惡等相也所依具二者所依即法身也法身具福慧二嚴也疏所謂六度者度雖有智為對五眼故度屬福疏空座勝折體者彼未能處第一義空座故釋出其意者界內界外各具四魔名同體別界外以細易粗為死魔變易無漏陰名陰魔別惑障於中理名煩惱魔中道赤色三昧未究竟名天子魔界內四魔如前已引明具二嚴者慈悲覆一切故能問空智通達故能答又定心通達故能問慈忍無擁故能答善於問答名二莊嚴疏慈忍故能種下釋慈忍有三用空慧下釋慧有三用此即約譬以明二種莊嚴下種故名種生長故名立橫資法身故名資又由下種故須耘之有立故須破有橫資故須智導令至竪極也大論云一人能耘一人能種種喻於緣耘喻於了此即圓教二嚴之因種佛具二嚴之果約體用者即體起用也體即涅槃一法而具衣座室三三有離於三惑二死之用也疏出三諦者圓融三諦遍攝諸法過於次第三諦故云出也疏包含普接者若分句解者包含故名大普接故名乘忍衣三昧者王三昧一切三昧悉入其中是故此三昧如王即當空座也疏忍辱第一者忍衣也無相最上者空座也圓五行者行雖有五不出三梵行即如來室室亦具三謂淨即空也不淨即假也非淨非不淨即中也謂依於三淨起無緣慈悲修於七善及四無量心並六念法從始至終當以三諦無緣慈悲薰修故名梵行天行即如來座座亦具三依天然三諦之理而遍修也聖行嬰兒及病行即如來衣衣亦具三謂戒定慧此三謂是聖法依而行之故名聖行是故此三即彼止觀一心三觀衣即中室即假座即空十乘十境者以一心三觀修於十乘而為能觀陰入等十境以為所觀一一觀一一境當體遍接諸法為橫優劣相望為竪破遍者如破遍中橫約諸門竪約三觀云云及方便者二十五法悉具橫竪四種三昧者常坐常行半行半坐非行非座等若教若行意在一實正修故云只是一行事理二三者謂事三理三也疏約結業起惑者謂漏無漏非漏非無漏業起惑也即向第三者指前三約諦理起惑文是諦理之言具三諦故多種三法者如玄文中明十種三法謂道識性般若菩提大乘身涅槃三寶三德並與衣座室三義同如苦道即法身可對忍衣煩惱道即般若可對空座業道即解脫解脫故利生對慈悲室餘九例然疏法者軌則者前文釋五種也故今云法也疏皆以妙法為師者謂受持等五法一一皆是開權之法故云妙法也疏法師寶塔至福重者一約現未二約自行化他因果以勸流通故云深重也唯有退沒一分者今家約遠而論近門可是接退流通餘約近等二門及以夢入銅輪等並是始行修觀自益之相何必皆是退耶故不依古也疏見聲聞畏憚者如持品初爾時衆中五百羅漢及八千人乃至此娑婆國中人多蔽惡故云畏憚被衆擯棄者若不依四行入濁弘經涉於聲色為他擯棄如持品末偈即其事也疏初因藥王至得福之人者應云佛世弟子為二初經家敘出所因人次佛世下正示佛世弟子之相然曉其經旨者意云只曉得迹門開權顯實本門開近顯遠久近雖殊不出權實不二之法故玄文序云文心莫過本迹如此緣者與始末不殊也當得同者聞一句一偈之人咸皆與記雖無劫國之別與記四大弟子未來當得作佛道理必同容用別時意趣者雖云容用今經圓乘種強是故稱歎及以與記等不可全同餘經別時意趣內觀具足者謂外加法雨則讀誦妙經內加觀行即是位位十法故知始從初品終至妙覺十法究竟轉名十大具如止觀第五以去至第七廣明也疏見實三昧經者是大乘經彼至兼帶故不及今經遍開顯耳疏我有四句所謂諦者如金剛疏引云一名顯理周圓偈但舉一字詮義無缺者名為顯理周圓也二集法滿足偈通舉一部等皆名集法滿足也彼經云凡所有相皆是虗妄若見諸相非相則見如來為一四句偈也大師誦經觀法者別有一少卷誦經觀法流行於世其文雖略十乘觀法具足觀誦經心性文字聽衆具百界三千為假能誦所誦體不可得為空無非法界為中指一心法名為一念者即指心性實相之體名為一念也疏事理者雙照則權實俱立稱之為事雙亡則權實寂然稱之為理亡時即照照時則亡不二而二而二不二故曰圓融望於餘心者亦不出餘九界心也亦名小解多聞者但是翻倒上句謂解一義應一切能詮音樂如前者如第四卷末引阿含經也經是大菩薩者圓菩薩也望偏為大矣願兼於業者今弘經之人業兼於願故云捨於清淨土而生此國也疏但竪得其意者但能解權解實對不能為他廣説故名竪也圓鏡云今謂此人出處有異竊為一人是所化少唯説一句是所説法少於大衆中是所化人多廣為人説是所説法多約能廣略分為上下不是法師為勝劣可尋經自因見意經説佛在世明上品法師愍衆生故生於惡世廣演此經即接次云若是善男子善女人我滅度後能為一人説法華經乃至一句明知只是佛在世上品為他竊説非謂有慧無聞不能處衆與他廣説為下品也經明滅後自分上下何得佛世釋故今不用四法師者彼評第二法師偈云廣學多聞智慧訥口拙言無巧便不能顯發法寶藏譬如無雷而小雨偈意聞慧譬雨反論至理者反以莊儒仁義自然齊於法界常住故云反也經以不善心等者以三業俱罵而經一劫若以一惡言去只一口業而以經時極但其罪甚多也疏豈能障礙者若毀持經人則障他菩提之路若毀於佛則不能障礙佛菩提何以故佛菩提以滿故疏修非權非實法身體者當冥至理義如在背當照權實義如在肩故云修非權等也須廢事釋者若無理觀不稱此經開顯權實以世人散心多故須簡事專存於理也經捨於清淨土者此上品師位在內凡下品師位在外凡疏亦格量歎者謂已今當最為第一也疏已得會同者古人意云由法華已會同竟是故涅槃易得會同也疏會三之始歸一之初者但是綺文互説其義一矣古人又名涅槃為會三之始如後破疏大品已上漸頓者頓謂華嚴漸即鹿苑等三味須簡漸中有頓頓中有漸於諸部中借使不信於大小亦易信疏論人則師弟本迹者迹門以大通佛所第十六王子為本今日説法華前十四品為迹諸聲聞等於彼初發大心為弟子本于今有住聲聞地者等為迹本門亦爾師弟皆論久成故也嘉祥猶然者彼云法華前教為已説法華經為今説涅槃之流為當説三説之中法華最為難信難解所以者何法華之前大小分流其言易解法華已後三一已會亦非難解此經開方便門示真實相會三之始歸一之初乖於昔執故成難信難解猶然者嘉祥稟大師之教尚然況於近代耶具足四法者謂佛法僧戒四也若不爾者者須如前荷負中約理觀釋不可從事而説故云於理何益也疏又信力修畢竟空下約三法以釋初從又信下先説意次從此人下正對三法信力對忍衣願力解脫善力般若合此三德以為自行而為機感故云權實也疏法輪正體者此法華經總為前經法輪之體方名正也疏大涅槃窟者窟只是祕藏即所依也具如止觀者彼約十二因緣束為三德作大車觀具用今經下文四法生處得道即法身德轉於法輪即般若德入於涅槃即解脫德三德祕藏佛住其中即是塔義故云此經是法身生處等八相者初從兜率天下生二詑胎三出胎四出家五降魔六成道七轉法輪八入涅槃向以人為魚䨲者指前長行偈頌約人歎經功深喻之魚䨲記中引彼文由欠二文結句前文云故曰不論供養佛也結後句云故曰不須復安舍利與舍利等妙者明此長行偈頌約法以歎處只與丈六舍利等妙故今破之令同小教何名妙耶巧拙二度者大論云聲聞化人苦行頭陀初中後夜勤心坐禪觀苦而行道名為拙度菩薩化人觀諸法實相無縛無解心得清淨名為巧度斷釋如記經皆近者上聲呼去聲前通不及於上也疏安樂行中名為近處者彼經云安住一相是名近處一相即是實相也今文明佛知見處為體體是理故引用也約真之緣了者以住前依真如修故云約也即真之緣了者初住一分緣了開發當體即是故云即也又是全性為修故名即也與前小異者此正消文與前諸文稍別也疏初觀實相名因者通於二義發心為因初住為因疏觀竟名果者通於分果及極果也經云譬如有人渴乏須水者生死八苦煩惱災煎如渴乏發心悕果如須水初家棄初及三者棄華嚴及方等故此從今家立五時次第以破也疏未能如聞而解者意云雖復誦持未得聞第一而為未聞疏能解為至泥者具約三慧方名至泥理不全爾者應知三乘是所開故須對權以明乾濕等悉須開顯如何純約法華以判但云三乘於一乘難信由如高厚故未可也皆有小失者不云華嚴及鹿苑般若復不云法華即清水但云如泥故成失也如前判中闕二闕三等是今師二義者約觀教皆約教味以判故也三教為粗者以法華為泥水即相待意也須臾唯約法華中圓釋者即絶待義也應知前三師相待不成何者法華體遍唯一妙乘對昔未説故昔為粗古人但是相對以説故相待不成也注家唯約法華絶待不顯何者不開前三即是圓妙故絶無體絶不成絶也教雖已轉者却明般若中意彼教雖融人行未妙故今法華開彼人行汝等所行及皆吾子為是義故須第五味遠近二釋良由此也五品位修觀為遠六根為近也亦應具問遠近二意者此述上問但問於近也大旨同前者同前答云未開權求佛人未決等疏夫般若實慧方便者實慧是實方便是權故云二慧也新發心菩薩者鈍根菩薩初心與二乘同學無生具煩惱故名病人也疏雨健扶者用前同體二慧密而開之令至極果菩提取佛意説故云扶也經聞解者此二字屬聞思修可見依前以為二釋者如前譬中約觀約教二釋也經今佛教化成就菩薩者開權教菩薩入於真實即是成就也開義不成者凡言開者點權即是方名真實如何廢除以釋開顯若爾今亦云廢與彼何殊答今家意者開已即廢時無異途權稱永絶名之為廢不同光宅以除釋廢也開二種之方便者只是開顯二乘也令開義善成者他意將為開義巧成不意且成會二不免違經之過疏八萬煥然者大小八萬具足故云煥然矣薩婆多論云佛一座説法為一藏如是至八萬名八萬藏有云且舉大數具足應云八萬四千也未有所通者只觀俗法得俗諦三昧未通於中故云也算砂者彼經云善財南行至名聞國於自在主知識所得算砂法門自在主言我已先於文殊師利童子所得此法門常與十千童子在河渚上而共圍繞聚砂為戲因此得知一切法等婆陀羅於城門臥海岸上住百千商人及餘無量大衆圍繞説大海法方便開示佛功德海乃至語善財言善男子我以好船諸商人衆行安穩道復為説法令其歡喜引至寶洲與諸珍寶咸使充足然後將欲還閻浮提若有衆生得見我身聞我法者令其永不悕生死海必得入一切智海此並別教恆沙法門故引證成方便當體門也疏昔不言三是方便者即當體為門也今説三是方便者即能通門也真實亦爾然但説三為方便者意云若説三是方便則是開權故論云一是真實也如赦體遍元者喻當體虗通是門罪無不釋者喻能通方便歸實為門也疏言非三則方便之門得開者會三為一故曰非三方便之門即一實也語三三唯一斯乃點示三之本性故云可示意泛泛隱也第三準例者應云如三一為二非三非一為不二二不二為非二非不二之門由達二不二通至雙非即以二不二為雙非門由雙非故起於二不二故非二非不二為二不二門也但定三通一句者闕於一通三句也次半者以委破前方便為實作門意未破實為方便作門以易破故云不能也更立二句者章安前以方便為實作門及實為方便作門竟從問方便真實下更立二句並前為四句以立今義故云得作餘二句不也後之二句理無別趣者以方便名趣方便義實名義亦爾故也三如名下次引例者只如名之言即是引例也先示非者良由三不能相顯故從破此病下明今昔互相顯相即也言三一既不相異者判其三一本來相即故云不異因緣之義下結也應知開昔一外之三即是今經同體之權故成以三顯三也次以因緣三下自約今經修性相顯即是依教而修由修照理故得更互相顯發也為一施三之一三者約佛意説也何者已開者列諸門者論知從實立名者不論更開若從權立者並須開之仍須體即開無異途方名開相也具如隨文解釋者者如今家隨一部文釋門義是亦應破之者今正明方便須開但列諸門故成不當餘亦準此豈得云為實作門者然今正明權教智如何以同體之智為實作門釋也疏法華論同者論云以阿含言教為門此釋亦未全當今家約行約理俱得為門也不專在教者上文云今取理為教所詮即是理教共為門也但云從限域出者破云限域為大乘為小乘為是理為是教等破亦同前者同限域也並不相應者與前三車在門外及父在門外立二文大同破云此二文所喻永別如何得同也從初説故有門非門者謂約施權及所開邊有於三乘五乘及資生等今皆真實豈更名門疏昔説二為方便者約漸三觀瓔珞經云因是二觀為方便道得入中道第一義觀即其文也無非通途者只是無通入一實也疏藥王若有菩薩下簡非者非類在昔於今定無不信之衆故云也疏身座冥稱者夫解脫者謂內智冥境外則和光利物名為解脫經雖在異國者或寂光或實報或方便土為異國也經欲捨諸懈怠者專依今經三德祕密藏衣座室三方能捨於偏小懈怠也經念佛故應忍者衣座室是三佛也經清淨光明身者即法身也經若人具是德者具衣座室三也疏八部下云云者應廣明在在處處有弘法之處所聽之衆若權若實皆聖所遣如高僧傳中有冥告云一切如法講處自人頭向上並是冥力釋見寶塔品翻名有無者謂有舍利無舍利等不同也僧祇律云無舍利名支提有舍利名塔説菩薩因果者意云彼經中雖説普賢融門因圓果滿亦只是明菩薩因果與遮那等不説遮那遠因果矣道非存亡古今一揆者道謂多寶釋迦所證之道二體無二故云一揆揆則也謂釋迦道非存以現佛入古佛塔故多寶道非亡雖久滅度今出證經故云非存亡也交莚接影者意云分身是釋迦儔輩召集使莚相次而身相接者密顯釋迦遠壽令知丈六非生也實道不生者意明今古同證一顯實之道故以入塔表之乃顯舍那非成者謂今集分身召地涌本為顯壽量而非生故也約譬類者圓鏡云塔是所見大衆是能見此事為是根見為是識見為是塔色發眼使見若根見者根無知故若色發者色不見知故若識見者識無見故二一既無見和合亦無見如一砂無油和合既有見一一亦有見如一麻有油多亦有油又為到故見不到故見若到故見之見水眼應濕見火眼應燒以眼到故又若到故見則眼去眼去故面上應無眼眼既不無明知不到若不到而能見者是亦不然若眼不到塔而能見塔如斧不到柴而能破柴如鹽不到則醎火不到燒杖不到痛雖有此破更無決斷若無通見者謂有通識也若無通途之見名無通識之人意今消經須與觀行有別若不甄簡二途不分有人問者圓鏡云分身數多寶塔唯一答法華論云存略故存謂多身略謂一塔也寶塔不多者如經云我滅度後欲供養我全身者應起一大塔也合多寶願者如經云其有欲以我身示四衆者彼佛分身諸佛在於十方世界乃至盡還集一處等故今經文如四支徵者神力品若經卷所住之處皆應起塔供養所以者何當知是處即是道場即如觀經佛三種身從此經生諸佛於此得三菩提諸佛於此轉于法輪諸佛於此而般涅槃故云如四支徵疏薩雲分陀利者武兵道亮云更有薩雲分陀利本既存方世乃成三存如提婆達多中引薩雲分陀利者古譯法華仍存梵名薩雲此言妙法分陀利此言蓮華疏此塔正為證前等者非但破於他師謬解得對治名又證前故破於執迹之疑起後故破於迷本之疑故屬對治尚非應身者謂多寶但是化身證經若是應身須具八相成道所以只可表於法身非即是法身故云必不可也疏未盡其體者經從所表不從理具正明多寶以表法身及具三身不得云只是法身以現塔處處證經故能表三中各三者一身各具三身故云不一也所表三中皆一者三佛各表一德故云皆一德雖有三而體是一故不異也共成此故不異者共成釋迦化道開三顯一及以起後故明示四相者謂四悉也在空以表二意者塔閇以表證前開塔以表起後也所非必多者八非並是所非中道實相為能非也疏分座共坐示不生者示釋迦不生也何者若是於生不應坐滅佛之座疏入塔示不常者示常釋迦不應入古佛塔也疏現塔示不斷者仍於現塔故云示不斷分身示不一可解疏全身示不異者多寶全身不散故也疏讓座示不來者雖來而讓座以示不來疏示不出者定出不應入塔坐出只是去耳又以生同滅故示不出故止觀中引論釋相大略同此故不重引疏八不顯然者能表之事既且顯然所表之法必實以現未師弟等者現未師弟是法師前長行意因果等是後長行意引達多往等者達多往日弘經釋迦獲益今日釋迦弘經授達多天王佛記也未關地涌者圓鏡云將明遠壽之果故先辨遠壽之因則四行是也種智前已具釋者如前諸文釋也妙法之言一分通智者以妙法不出境智既云真實能所咸然故知約能觀邊與般若無二又妙法則三德具足以般若德與智體同故云一分通智對迹明本者只是對此迹門以明於是本門故也略舉經題者下經云以大音聲普告四衆誰能於此娑婆國土廣説妙法華經以此起彼者謂壽量品也如明起由者如先明所起之由下文是盤桓經思者謂每於觀心之文皆經遊心思使觀道相應矣疏如塔來證經者塔如境經如觀智即是境發智故云來也經五千欄楯下圓鏡云列莊嚴文中七科法門初總持門欄楯有防遮之力故表總持陀羅尼有遮三惑防二死因果之力有持因中萬行萬善果中萬德之力故云總持龕室下明三昧門無數幢下明神通門垂寶下明四接門寶鈴下明四辨門四辨八音詮辨無量四面下明四弘門其諸幡下明無量心門釋相可知疏幢幡是神通者依於不動而動動而不動也疏而且遍者內充而外遍也疏如前高廣義者此是高家之大故用高釋廣也疏中觀橫竪平等者只是不耳疏一如法相是者如法相解內稱理解方有於説攬因成果者謂佛修戒定慧聖行時亦無別法但以大涅槃心導於二乘等法至初地時攬於因行而成果德名聖行滿爾時後轉名梵行慈悲喜三心滿住一子地捨心滿住空平等地若於圓人入於初住等廣如彼釋無説欲辭者經中但云彼某甲佛與欲開此寶塔即是欲辭更無別辭破大憍慢者破諸住權教自謂為極慢也疏華嚴亦説等者如前明字等語等法等已引即是其相大品亦云千佛者彼經無作品中釋提桓因難問須菩提般若義爾時四天王及釋梵諸王乃至諸淨居天佛神力故悉見東方千佛説法亦如是名字説如是般若波羅蜜諸比丘皆字須菩提難問者皆字釋提桓因南西北方四維上下亦爾疏却障機動者若表前者權障已却大機已動意若起後者表執近之情將却須遠之機將動也問凡云本迹至劣者恐人悟解見下壽量釋迦顯本竟依舊猶見丈六之身猶謂釋迦不及華嚴舍那此將舍那亦問釋迦本也自望本時遮那者將華嚴舍那自望彼遮那但是體用本迹也望迹成妙者釋迦開已望舍那迹釋迦成妙也迹妙猶粗者意云舍那雖即巍巍堂堂不顯久本望於釋迦任運成粗也本門十妙者一本因妙二本果妙三本國土妙四本感應妙五本神通妙六本説法妙七本眷屬妙八本涅槃妙九本壽命妙十本利益妙彼判云迹中若待粗妙若開粗妙不異本妙而言始得始得為粗本中先成若粗若妙若開粗妙亦不異迹妙而是先得先得稱妙又云不以廣狹及權實而判粗妙但以久近而判本迹粗妙經我為聽是經故者為獎勸諸菩薩多寶豈用聽經耶經廣説妙法者勸弘通時亦如今佛三周説法等故云廣説也二萬在持品之首者亦應云如爾時世尊視八十萬億那由他諸菩薩今但略指二萬也疏初有三行半頌多寶滅度者上長行有六今但略頌第六佛答上佛答又三今亦略今偈中加入滅久近誡勸持衆及聽法難遇等經雖久滅度者意云雖滅而實不滅故云雖也經以難遇故者多寶何故處處聽法以法華經開權顯實開近顯遠雖值遇故經各捨妙土等者諸分身一佛只各賫一侍者餘皆捨矣經衆生蒙薰者時衆蒙光及香薰也經以是方便者分身遠集以為流通方便故云令法即是久住也經而師子吼者頌上多寶讚言善哉善哉皆是真實決定不虗也疏供養三佛等者親供養自身三佛則見三佛及聞三佛教也疏初一行誡勸者經云諸善男子各諦思惟誡也此為難事下二句勸也經諸餘經典下正舉難勸持文為六初明説經難大力諸天二乘菩薩擲山動地豈得言難具傳説經此為難也諸餘經典者別則唯指三藏為餘通則三教皆名餘也假使有人下明書持難空無像不可執捉假令把得亦不為難如無垢稱接取妙喜不以為難凡夫書持實為難也若以大地下三明暫讀難假使劫燒下四明説法難若持八萬下五明聽受難引俱舍等者俱舍唯少報恩兩兼並是易持對辨難也十二通大小者解九本通大小但廣問記故名不至至不至者大涅槃何義故至永斷貪欲嗔恚愚癡不謗方等不作闡提五逆等故何因緣記三云唯在大今約小理即是方廣如成論中以空為實自唱善哉即無問自説也如阿含經中授記彌勒即授記經也但小乘灰斷無真常理説必假緣非天鼓任鳴記作佛少云無授記等玄文廣説是故指之若人説法下六明奉持難經我為佛道者若約自行應云為若約化他應云我為佛道為訓作作佛道以流通也經行頭陀者者此經既已以圓詮三德故用衣食處三表於三德為持經人所依斗藪三惑是真行頭陀人也疏賢劫者劫有千佛謂之為賢而具五濁八苦又稱恐畏也釋提婆品逆順定故者前三教破逆會真故云定也同於如來者此經尚為如來師何況同耶全似什公文體者只是真諦重譯達多品文言體勢與妙經前後文體全同驗知此是先有也百論之流者百論梵文有二十品此土但傳十品後十品與此無緣故故略不傳此土大康元年者西晉惠帝時也草堂寺在長安矣昏聖相扣者謂佛在靈山時説一乘先且放光照于東方萬八千土爾時十方六道衆生盡得相見以表至道靈通先擁無滯大衆既覩嘉瑞皆同不測所由彌勒緣衆生有機推請文殊為決斯乃四衆為昏文殊為聖涉教歸真者謂方便品三歸於真即開示悟入是也興類潛彰者謂比興也以長者比如來引經大富長者即是如來乃以火宅喻三界三車喻三乘潛者陰也借喻也彰也顯也謂顯幽玄之理也述窮道昔者謂昔迷流道背曩緣於彼轉四生受於人天二乘大乘解廣稱為巨富棄大學小為窮子今述昔迷故云通昔也彰因進悟者謂於大通佛所得記為因爾來無量何不進悟此城非實即是彰因寶所在近是進悟也讚揚行理者謂如來通法為事若人善寶所在近亦即修行此經即是如來使命名行如來事則如來廣讚理行之人也六本迹如記不思議一者二人相對為不思議一也舉因徵果者者謂彌勒不識地踊菩薩即執釋迦近成之因徵於久遠之果佛即説壽量辨因果所由伽耶道樹始爾久遠若斯故能成就如是大菩薩衆假使塵點狹量方能測量佛壽極果也稱揚遠濟者稱謂稱歎揚謂讚揚讚揚六根清淨乃至稱歎普賢菩薩守護讚揚六根令人樂淨歎諸菩薩令人進行又讚六根令人修自行讚諸菩薩令人讚他行修經之理能為苦海之業目之為濟法王啓運非直利於當時亦乃遠傳來業故云遠也二十八品生起者未見睿公生起注家生起大理亦同故今録之夫昏聖相扣必有感異之瑞焉故首之以序品隨機筌極涉教成權故受之以方便方便之奧興類乃彰故受之以譬喻餐喻不猜因象能照故受之以信解納其解心又以象告故受之以藥草興喻既明許以體極故受之以授記而下象須繫衆譬宜廣故受之以化城鈍淺又啓取含亦同故受之以五百授記取含之中復有未悟故受之以授學無學記利鈍俱朗化道須弘故受之以法師弘經通極必以證瑞故受之以見寶塔塔踊瑞炳幽顯樂宣故受之以勸持宣故受之以勸持有範者患在律故受之以安樂引請規嘉躅潛有其人故受之以踊出人廣德懿功似非始故受之以壽量知宗悟常淺深不一故受之以分別功德聞此功德欣以相傳故受之以隨喜隨喜則四衆竟修六根必淨故受之以法師功德根淨則含柔忘我現為前範故受之以常不輕法極人高通之有本故受之以神力神奇既發對印已周故受之以屬纍崇法壽命暉光住世故受之以藥王本事負荷之懿十地同風故受之以妙音功玄應轉萬品感賴故受之以觀音凡四弘修必人鬼爭護故受之以陀羅尼執一所轉嚴父移心故受之以莊嚴王本事化傳遐劫福彰來裔故受之以普賢勸發終焉懿己利反訓美但品旨未彰者今家解釋品意難明須開章門別解品意顯者但直釋名而已若但生起故品意未彰但云因果語通何教無之故但云舉因徵果何能顯於發迹顯本也疏滿法師者宋齊録云上定林寺釋法獻方于圓國得梵本來有此一品瓦官釋法意齊永明八年十二月譯出仍自別何未安部內至梁初有滿法師如疏今引此文者恐云長安宮人請此品淹留未為隱便耳天下大同者當時秦晉根阻車書未同乃至大隋方獲寧一故曰混和即大同也約處人除北等者謂北州人及黃門不能造逆故除之疏捧華色比丘尼死者摩耶經云提婆達多既至摩竭國語守門者汝入白王道我在即入白王此時守門人即入白王王大嗔忿而作是言乃至不欲聞其名字何況而應眼見之耶敕守門者勿聽其前提婆達多心大苦惱舉手扣頭切齒罵詈時波羅比丘尼此云蓮華色從王宮出見提婆達多即呵之言汝今釋種不得熾盛於佛法中作大障礙提婆達多聞此語已極大忿恚即以手拳而打其頭比丘尼尋便命終即其事也四身者謂四屬身業一語業者破僧屬口業也從三殺下更一節分三殺謂父母羅漢三也一虗誑者出血屬方便與破僧加行同增苦增者五逆罪五倍增也八比丘分二者謂調達四為能破四清淨僧為所破即羯摩僧也若調達為佛及四比丘破清淨四九人名破法輪僧佛在四清淨比丘內矣破出殺者破僧出血殺蓮華尼三也汙母汙無學尼是殺母同類殺住定菩薩者百劫修相好菩薩是殺父母同類殺有學聖人是殺羅漢同類嘉祥三意者前三意度量之無品只是故不可也經於多劫中至國王者人中尊位奢促之極而能發願求法無退也疏一明欲滿檀那者經中無餘五度相以檀度接於六耳經委政太子者簡異餘王子以付儲君也疏次雖作下至正求法者上文總三此但頌其最為滿般若阿私仙此云無比亦云端正始從十五終二十一者盡十五盡二十一卷並明六度也文相顯著者文相兼含者今亦不録也體相可識者體謂體狀相謂行相也疏防止七支者小乘之戒防禁身口故但云七疏四禪八定者於四禪上更加四空名為八定耳疏不殺至是檀者不殺即是無畏施也不盜即是施他財也不淫即是有禮正當施禮也不妄語即是施於誠實之語也不兩舌是尸者戒謂慎也兩舌能成自他之惡為過處甚故對於戒不綺語是進者綺語一法人多喜犯此失難防故對精進不貪是禪者禪防意地之非則調直故得名禪般若是正信因果故能除邪見也疏一對治謂慳等者如淨名經云以布施接慳貪以持戒接毀禁以忍辱接嗔恚以精進接懈怠以禪定接亂意以智慧接愚癡即接持義成對治義疏根調知法界者知五陰十二入十八界界分不同故即第六識辨了三法名為般若疏壽安者禪報在長壽諸天而樂疏辨者欲知智在説也疏乃至詣道場者一一文中更有衆多讚歎之詞故云乃至疏不乏信財者以信成就名為不乏即七聖財也故云信為道源功德母一切善法由茲生也疏他不能折伏者有行解故疏隨食能消者得法喜食能消一切惡也疏如優鉢華者只是善根念念增長如優鉢羅華矣疏行慈境界者夫修慈皆依禪而發以九種大禪是慈境也疏離身心精進者若身行精進而心滯者不名精進身心俱運乃名精進耳疏禪無所住者菩薩雖行禪定而不隨禪生也疏滅惡戒者滅外道惡衆戒名滅惡戒也疏能壞煩惱者即煩惱障也疏及智障者偏真之智為中智障也疏造一切福者是檀若修身是戒忍進修心是禪修慧是般若以第一義薰修者謂以實相心於四威儀中行一一度互相融即百界三千體唯法界方名圓捨不犯二偏乃名尸等是故記云無非十度也疏不生瘡疣者於念念中不見能忍所忍故疏不捨於離者謂常觀無念曰精念念趣入曰進故云也疏於事中不放逸者謂於事即理名不放逸疏於陰不熾然者謂常觀法性不令於陰而增諸惡故也疏於界不擾濁者根境識三互相涉入動亂於心名為擾濁達界三諦不名擾濁疏於界捨因緣者如眼見色眼為因空明為緣若因若緣無非中道名之為忍六之與十開合不同者開禪出願力開般若出方便及智智謂中智方便出假智疏三十二相者且依婆娑一百七十七云問相是何義答標幟義是相義殊勝是相義祥瑞義是相義一足善住相足下平滿不凹不凸於踐躡時等柔觸地其迹分明惡心欲滅終不能滅二千輻輪相佛雙足下有文如輪千輻具足轂輞圓滿分明巧妙三指纖長傭而漸鋭節不粗現並時無隟安布得中先後圓滿四足跟圓長端嚴廣直五手足細濡如妬羅綿六手足網縵指間皆有網縵猶如鵝王指若合時網即不現而無皺緩開時便現而無率急七足趺圓厚向指寫庸兩邊圓直如紅蓮華八佛脛圓直漸下傭細如翳耶鹿王九勢峯藏密猶如馬王若爾云何所化得見有説世尊愍所化故方便示之十身分圓滿如諾瞿陀樹十一同十二身諸毛孔一一毛生如紺青色螺文右旋十三佛身諸毛孔各生一毛如吠琉璃其色紺潤宛轉右旋毛端上靡十四身真金色映奪世間一切金光令不復現十五常光一尋周匝常有光明四方各一尋晝夜恆照十六皮膚細滑塵水不著如吠琉璃及蓮華葉十七同十八佛身廣洪直不偃不僂亦不傍倿歌端雅充實十九佛胸臆分齊方廣威肅如師子王二十佛肩髆圓滿非諸捔力妹狀力士能及二十一佛平立舒持摩自膝輪二十二佛頷輪廣好如師子王骨圓如輪二十三四十齒齊二十四齒齊平密二十五牙齒鮮白有光明四十齒悉齊平中間無隟如毛髮許光明皎映如雪山王二十六得最上味舌根淨故令所食變成上味有説佛咽喉中有二乳泉若飲食時其乳流出雜諸飲食變成上味不正分耳二十七舌薄濡廣長出時覆面至耳髮際若還入口而於中無所妨礙二十八眼目修廣其色紺淨如蘇圓多青蓮華葉二十九佛眼睫安布善巧猶如牛王三十同三十一眉毫間長半尋右旋轉光明清徹三十二佛於唯藏中有妙大種能發悅意和雅梵音如頻迦鳥如帝釋鼓如是音聲具八功德一深遠二和雅三分明四悅耳五入心六發喜七易了八無厭不須各修者明圓人從初發心常觀涅槃行道至初住時三十二相任運自發不同權教別而修也已略辨之者法身之相為諸相本境智相稱具三十二又如華嚴一一相好與虗空等修發互融不得各論相體多同者藏通以真為體別圓以實相為體疏足跟者足後也疏梵身圓等相者如來報得圓回身等觀目四面皆覩故云等相疏慈等心者等取悲喜捨也疏成梵音聲者隨機屈曲巧取衆生處處調熟皆令入實故知梵聲諸相中最妙也疏道種智是別者地前緣修至十行中用於假智遍學諸法故以道種智為本也疏奇中三處好者兩𦝣中間有骨名奇骨即背下分是疏臗凡者應云尻恐字誤經十八不共者大論二十六云佛於無量阿僧祇劫來持戒清淨故身口業無失三佛一切意業隨智慧行故全無失四無異相者佛於一切衆生無分別無遠近異想是貴可為説是賤不可為説如日出普照萬物佛大悲光明一切憐愍等度五無不定心者定名一心不亂亂心中不能得見實事佛於諸法實相中定不退不失是名無不定心六無不知已捨者衆生有三種受苦受樂受不苦不樂受苦受生嗔樂受生愛不苦不樂受生愚癡是三種受苦受生苦住苦滅樂樂受生樂住樂滅苦不苦不樂受不知為苦不知為樂餘人鈍根故多覺苦受樂受於不苦不樂受中不覺不知而有捨心是為癡使所使佛於不苦不樂受中知覺生時覺住時滅時以是故言佛無不知以捨心七欲無減者佛知善法思故常欲集諸善法故欲無減修習諸善法心無厭足故説無減八精進無減者欲義即是精進欲為初行欲增長名精進如佛説一切法欲為根本欲屬意業精進屬三業欲為內精進為外九念無減者於三世諸法一切智慧相應故念滿足無減又失念名威儀俯仰如來法中失念無減名住禪定神通念過去現在世通達無礙十慧無減者佛得一切智慧故慧無減三世智慧無礙故慧無減十一解脫無減者解脫有二種有為解脫無為解脫有為解脫名無漏智慧相應解脫無為解脫為一切煩惱習都盡無餘佛於二解脫無減十二解脫知見無減者佛於諸解脫中智慧無量無邊清淨故名解脫知見無減十三十四十五一切身業一切口業一切意業隨智慧行者佛一切身口意業先知然後隨智慧行諸佛身口意業一切行無不利益衆生故名先知然後隨智慧行若先不籌量而起身口意業則有失佛先以智慧起身口意業故無失復次佛成就三種淨業三種寂靜業三不護業十六佛以智慧知過去十七知未來十八知現在通達無礙謂過去已過去等立通四教準前今唯在圓也經號曰天王者大論云食不用鉢不被袈裟如王治也故曰天王也因即返當合道果乃失類同真故曰天王如來也經廣為衆生説於妙法者通指一代俱名妙法此文具五時教意故也疏第三勸修如文者前分文云佛告下明勸信今云勸修者勸信本令修行其言雖異其義則同也疏處華臺久者此例如人中處胎十二月者為久以蓮華生者有上中下故在父膝等者等取在梵王口生臍生也安置一切於菩提心者令住三德涅槃故從別圓以釋應通前二教也亦可釋妨者妨云淨土既云蓮華為父母何故鼓音王經云彌陀佛父名月上母名殊勝妙類釋曰經言他土有父母淨土則無又經云有者説因位時云有言化生者説成佛已後云無父母故不為妨經云若生人天至妙樂者於人天中得一實益方名勝妙樂矣來時大利方生者意云去時機緣未有大益故無白去之辭菩薩讚詞者以文殊海出例地涌菩薩出已讚佛經文今文但云從蓮華下至於佛前頭面敬禮等其詞甚略引此例者用釋他疑令知經文存略故耳從所移處來者文殊縱從四百那由他外來復有何遠故云應無也二者衆海縱移者意云海衆無緣者被移龍宮有緣者不動也後變而不變處來者只是從龍宮謂不動處來名為不變處來非謂改體者謂淨穢土體本來相即故不可改如淨名中梵王見淨身子見穢即其例也此乃有往來者佛彰灼三變而移之衆故見有往來之想也化事成規者謂成於化儀也經本聲聞人等者住在今會空中述海化意故云本也經今皆修行大乘者此敘於海中已修行法華圓乘己意非謂至今釋迦會中方始修行也經文殊師利至宣説者應知文殊先亦非不施權今述化意故云唯常宣説等經善知衆生諸根行業者明龍女已得相似觀機三昧故能善知陀羅尼者得相似三陀羅尼等下去諸文者妙音觀音等皆不出此三也經於須臾頃者玉篇云俄頃也明時極促也經深達罪福者問此是讚佛為自讚耶答觀經及疏是讚自身所證以釋智積之疑又疏中但歎法應二身應以境智不二消釋若無能契之智焉有所起之應得妙法身復有能契之智方有妙應疏雖云二身經意乃三身具足經經無量劫者即三祇行行驗身子是執三藏教意難也權實義等者有權則有實故云等也從六根淨得無生者據前長行文殊答智積云智慧利根等文則是先以稟於諸部中圓得六根淨今聞圓經即入初住從六根位即往南方名起神通若從初住已上即名起應矣又若一向從權釋者即深位菩薩權引實行示同即成亦應無失此中不云別教地前菩薩者以別地前皆是法性身菩薩無有於父母生身得入初往故不論也從實得説者只是從父母生身得為實得耳何妨捨此往彼者若八相成佛要須捨身故云也釋勸持品疏二萬菩薩奉命弘經者若云弘持即屬化他若云受持即屬自行不及從初者若題云勸持即失持若單題於持即收二意以持文在前故八十似對治者佛但眼視而不發言告者將護聲聞他方疑故云也經於異國土者他方淨土也經憍曇是姓彌猶女也亦云憍答摩亦瞿曇梵音奢切耳此云滿生或云泥土又翻甘蔗種亦云日炙種以其逆賊中與滅暴釋氏唯除一娠孕者仙人觀知乃詣娠婦之所先言求其所孕之子後果遂之方至髻年釋星便現其後賊王知在山中候仙不在察令擒捉既獲而長竿穿之仙還尋得知命難濟乃降微雨令少蘇醒化現一女勸其交通遺體染泥仙乃收之以牛糞裹置甘蔗園有日使照滿足十月乃變成男又復為王繼釋種因得甘蔗及以日炙泥土之稱經皆是阿惟越致者亦云阿跋致大品云不退不轉故名阿跋致彌勒問論云云何名不退轉答此諸菩薩證得初地必定之因依般若生在佛家大悲為體善住菩薩正修行處入於平等真如法中究竟心證涅槃道故彼論約別今經在圓即初住已上位也經作師子吼者作字去聲呼訓為若入聲呼訓起也疏引證分明者以引達多及龍女明功深福重竟故也疏又將護聲聞者此諸聲聞以入初住不須將護正為護於機緣耳空生之德者須菩提若人嫌行即坐嫌坐即行等皆護物機不令起與七年失國者如四分律云㸸睒彌國憂陀延王是賓頭盧親厚知識王朝哺常往問訊受惡人語云賤人見王不起王乃報言明旦更往若故不起當奪其命如言而往賓頭盧念言王惡心來我若不起當斷我命悟王墜獄我今若起七年失位作是思惟以輕易重寧使失國即起迎王乃問之今何故起前不起耶答言起與不起悉皆為王王問云何為我具述前意王問幾日當失答言却後七日王便還國修治城塹貯備軍儀至第七日云沙門語虗與諸綵女入恆水中乘般遊戲時愍禪國七年不雨波羅殊提王往摩竭國詣於瓶沙求出水珠不獲却還聞彼水中憂陀延王綵女誤樂密放白象入水引之憂陀延王謂為野象善其調法誦術彈琴向前取之為彼得便鎖腳還國經於七年教兒調象教女彈琴後因私逸懼王罪之彼羅王子感以師德聽自莊嚴疾行捊象與女逃還食頃而到進否為王者即北齊少林寺稠禪師也為齊王所重親體所居為護王壽不起迎送王密怨內心明重試之故不起當斷其命預知其念斷命罪重寧使失壽便起迎送王亦問之昨何不起今何起耶答云不起與起悉皆為王王問知已尅時而卒而為正則者則即式也若以此名而均下出正式意意云若以小乘分之若融於大名方應今經出家之戒二脫者解脫解脫知見二也大乘則雙脫二死方名二脫並於三學名五分法身也疏餘四亦如是者無有能將妙定來必由自修正而所得餘三亦爾疏既自無香者譬上於戒不樂行亦不自聞者譬其既不樂行則無自利疏心不定者者若心不定由具煩惱我心已定煩惱已盡入無學位如何説罵故也疏如折角牛者喻斷正使已盡如牛無角也疏如殘童子者殘疾也喻正使盡猶有餘習雖有餘習而不惱人疏置之日中者日譬喻無漏也謂於無漏日中當自觀察有餘起陰雖無煩惱而於此身未免違順等惡邊定無單雙者以此二句俱但須互舉則成單雙之相不須更立故云定無也如云口善則身意惡身善則口意惡是也疏常念境界者上單善雙惡等境也三合聲者阿字合拘盧奢三字為三合也世人執覽者覽前就後故成罵也聲界有八者如下法師功德品中引大種為因者謂四大種如下釋觀我既是所罵之境者彼為能罵今反觀於能罵以為觀境皆不可得由如幻化等形顯受者謂罵形不罵顯罵顯不罵形受想行識亦如是此觀因緣者觀因成假也過於異生者羅漢身中有怖畏尚過於凡夫也未得樂受者欲得故受也已得樂受者得以保護不令失故也已生苦受者得已欲離故生苦受未生苦受者只是欲得不生故苦疏於不苦不樂不癡者慈悲為他故也經惡鬼入其身者謂三惑重以為鬼也又惑被外惡鬼人也疏僧即事理俱和者智契於境為理和由理和故方令事和故云佛即僧也經諸聚落下一行入室弘經者悉體性而為説法斯慈悲慧之至也經願佛安穩住者謂此經若住世則是三佛住世住世即坐座也釋安樂行品應委騰前四品者今騰法師品初大分四段文也文起盡耳者只依四品生起次第亦未顯於品中正意正意者何謂諸品文心即衣座室是冥資顯益者未得度者但為冥益以示入品故又為如來冥資顯被因益也上方者方便實報土弘經也進否者能於此土他土弘經為進但能他土弘經為否準而則之者令以修而則於性使全性成修修性則於三德無非著衣坐座入室等皆不逾三德故在今同異者同只是祕藏三德耳異者轉名赴物不同從所以法師下其異相也又法説名實相譬説名大車信解名付財藥草名地雨化城名寶所等又名五行三道三因等品品隨機立名不等然其理體不出三德祕藏故云無非一乘也多寶衣者多寶久已契寂故對衣也分身室者若非大慈悲故無以處處利生令入大慈之內故表室也次變表破無知者法眼若顯遍識法門應病授藥即入室義五波羅蜜衣者一一無非法界以莊嚴故故對忍衣也疏此附上品文者若準今品上寶塔達多二品皆須先附法師品釋次方依當品意以法師品衣座室三為弘經之軌故須先附彼品疏不受三昧廣大之用者大品中有不受三昧得此三昧遍法界用而體不受此用復能遍破一切空有故云不受凡夫等不受亦不受者能受亦不可得也疏生見者謂凡有見皆不受耳疏今更廣事解者前附事釋即是約俗諦以釋今約因果以釋也疏即是體法身行者謂之正宗自當體法身行也體字訓禮禮者履也謂履法身行則法身安故云著衣也餘二亦體疏因名至恩德者上歎佛恩下化衆生俱名恩德三喻具如玄文者然大經中佛為調伏匿王諸妃后等説是偈云一切江河必有回曲一切藂林必有樹木一切女人必懷諂曲文殊難曰是義有餘㸸耶尼州有河端直名娑婆耶猶如直繩入於西海疏云金沙文出大論種種金銀琉璃寶樹是亦名林亦有女人善持禁戒功德成就有大慈悲此三喻皆非盡理故名有餘疏彼呼為無餘義者彼經三喻接一切法門盡此外若更有法者皆名有餘之説疏此呼為無上道者經云晝夜常説無上道教也疏大經明親附國王等者諸優婆塞等不受五戒不修威儀應持刀箭摧伏惡人護説法者等云云聖行座者有慧故對座也或出或沒者或但用折或但用攝故耳二釋並三皆四悉者廣略二釋不出三德四悉故云三法異即世界復以三德離對三悉故云皆四也疏一緒者應作此敘敘謂次第也此緒訓於絲端亦無大失若取訓業訓事訓餘並非文意疏一假實二空者假即生空實即法空也而濫向三行者不知為是何等慈悲為身為口意耶故云也疏恩德者法身德也無緣普覆故得其名疏資成者即是法身資發智德也疏何能宣説是經者為用何方法而流通此經也疏三總明行成之相者此指四行文後偈頌之文從我滅度後求佛道者已下文是經當安住四法者但總標四行而不別出四相便即先釋身行處矣疏或云內凡初行者從十住初心已去也疏若久習純熟者位在回向後心也疏引前品近果之行者法師品云聞已諦思惟當知此人等近於佛智慧文是也疏七住已上者瑤師案瓔珞經云入無生畢竟空界心心當行無相無願名不退住即第七住也疏行始者雖過分段未侵變易俱名行始並是別教內凡初心也疏或云行處約因者因應通等覺約果應在妙覺如此判者凡夫絶分故不用也後釋通因果者次家約智約境之言通於因果亦不知為是何教因果故不可依也行近兩處俱得名行者俱有進趣漸近於理之能故云也立理破者立道理破也並深俱淺等者初家及第二家行處俱淺近處俱深瑤師則行深而近淺故云互也而永異古師者今家行近雖俱在淺二行同時及通於後故不同古分於行近深淺放不等故及以定判也其意則別者以淺通深不同古人淺定局淺深定局深故云意別下去約二忍四忍釋即當約位也疏內懷至理者接起理行也附事必依理者攬事以徹理觀理以達事又經由也達也故云事理不可條然也非無所詣者説真之時亦詣於理説俗之時亦詣於理真俗不二詣理是同約行準説者説既真俗相即行必事理無偏通遍前導者謂慈悲通身口意復以慈悲導身口意上止觀令入深位止觀從淺至深皆是慈悲之力正當於身者應知身業之文具於口意何者不與小女處女共語口意業也柔和善順亦口業也心亦不驚及所畏心不悕望等意業也雖此互兼而各一業為主餘之二業但為資成而已以能從所者中道三智從於所觀境故但云一法也總釋功德所由者得中道地故所以在剛能柔能順能治能安故也見諸法實者經中但云如實相者始行未證但得云而觀諸法如實相即是因緣法如果地之法今言見者約所證説疏人法二空者大論問曰小乘但得人空何得具於二空答曰如來滅後四百年內諸師説小具二空四百年外諸師所説乃云小乘但得人空無法空耳此違阿含經彼云小乘具二空疏約真俗假實者真俗約諦是所詮故假實約所破是故不同為對所破者性相是所破也名同義異者通教以真為體圓教以中道實相為體故云也若更開為四十二忍者前開為四五六則通別教從若作四十二忍者唯在於圓但從無生寂滅二忍開故增減可知者若作四忍伏順在住前若作五忍三忍在住前如信忍故若作六忍在住前加和從忍故云增減也為二者生法二忍也二復為一者前約一法即一實諦忍辱地是仍離二空者生空為伏順法空為無生寂滅也則經中二句者從住忍辱地至不驚為初句從又復下為次句也初地依法得忍者依真如法得忍也疏後心亦窮二空理者後心二空理方窮也疏大經云發心至不別者指名字位為初發心也亦通於五品初心也善消柔和至竟者意云前文釋文釋柔和善順對當二忍已通初後則是生忍竟即知不率暴等亦是生忍行相功德而已由得地故故有此德前則準知者只是亦可互為其德故前柔和等準不率暴等其相可見何者由得忍辱地故柔和由得忍辱地善順即知柔和等是不率不驚等德故云也疏聞佛常與無常者是大小相對二乘作佛等即偏圓相對生死涅槃即真俗相對佛道長等謂實長實難權短權易此即從事故分約理不二故云非長等疏觀行即非行非不行者以般若蕩二邊之相故也疏合上衣座室者止行合衣法身德觀行合座般若德慈悲行合室解脫德今明能行對所離法者三行是能行能離之法十惱亂等是所離之法也所附為助者以三學通附此三淺法助於正觀深法故云助也須指梵網者以菩薩輕重等持一支一境無非法界方稱具足戒也三行兼理者戒等三行皆悉正助合行故云兼理於三門中非遠非近以觀諸法空等而復最得兼名故云對事設觀以助照理之正觀也向云助真似者此取意通問耳以前正觀文通深淺以釋故今以約真似問之不同古德者如前三師釋行處文是疏修定心者經云修攝其心修定處者經云在於間處修定門者經云常好坐禪經云國王者小者曰大者曰國王者以一貫三三表三才一表三通三才謂天地人故易云天得一以清地得一寧君王得一以治天下君國之王故云國王王之所生故云王子臣中大者名曰大臣官長謂五等諸侯也經及造世俗文筆等者即勒沙婆外道所造經名其經有十萬偈頌路伽耶陀者正梵音云路伽也氏迦此云順世外道之論梵志者事於梵天志在梵天故云也設筋力戲者令他設此戲也經諸惡律儀者如大經明十六惡律儀如造一惡時皆有無表惡起即是惡法則也不男壞亂菩提志者不男無志以自無志壞人志故疏九遠譏嫌者大寶積經云若諸女人減二十衆不為説法餘有男女終不往詣比丘尼僧論法會處不應也此當因緣約教者附事當因緣諸教俱離則成約教今弘圓經須屬圓教欲想者止觀第八中明一念欲覺初起甚微不即遮止遂漸增長為欲事故貪引無道乃至四重五逆乃至因欲生十法界亦如偈中記引薄拘羅緣並是明其欲想之相何所可離者十惱即法界故無可離即空也何所不離者以法界體遍離一切即假也雙非即中也一切俗境者於俗諦境不可藥病等名為譏嫌遠離魔外者畜養者如淨名用魔為侍也如病將身者大論問云菩薩以度人為事云何深山自靜棄捨衆生遠於慈悲利他之行答云如衆藥將身體康修業身雖遠離心不遠離準此今令住間處之意也隨要列二者五緣中間居靜處一調五事中調心一故云二也結成智境者只經中一空字對二法者表智境不二也空字隨位判者須約六即判也疏二邊三諦者中對二邊故名三諦也疏非七方便者謂非此等人所觀之境也即表中道者無常等四二乘四倒常樂等四菩薩四倒如來證中入祕密藏故以雙非枯榮以表之若不立雙非者若不對出假菩薩更立雙非者常樂我淨四德皆是雙非中道四德故所以界外但有無常等四倒遠於八倒即畢竟空故應約真妄者真如為自無明為他等今真如理正當無因者此即立也故異外人橫計無因也又云十境者謂陰入等十境耳疏非解非惑者亦是重舉中境即是而解而惑故云而從惑因緣生等騰以因緣一句者只是前於因緣一句開為涅槃生死二境也顛倒即是説由者由顛倒説生死由顛倒説涅槃也常樂無別釋者無如前因緣顛倒二句作二邊等二重釋也由本有境説上諸觀者上經云觀一切法空如實相是境也亦由第二説用觀者上經從不顛倒下諸句是第三從但以因緣有下是結文也初釋由顛倒故説者從非解非惑下文是以解惑因緣皆由顛倒所以偏受顛倒之名即結前妙境一切法空文也次釋由二邊者從又因緣有下文是即結前第二用觀文也第三釋由不思議者從又但以因緣有從顛倒已下文是通上下文者上謂如實相句下謂從以因緣下有二句經是並於中間成十九句也觀方有體者能觀觀以實相空為體也無出是不出者法體不屬三世所以不從現出墮於過去故云不出出只是入耳只是一大空者謂十八空不出能觀一畢竟空名為大空也故次文云中道正慧者應云最後文云中道正慧今從語便但云次耳如不無斷者此十八句能破不出此四字即舉諸句初如字也餘三字在經可見及以離合者彼止觀記中問云前六空已明二空何須更説次空耶答以向性相重歷諸法故更明七問內空至畢竟破諸法盡何須後五答大論云十三破盡後五重説耳是則從一大空離為性相二空及大論十八空大經十一空楞伽七空等合成一不思議圓妙境也疏不顛倒即內空者須約八倒以釋我我所及六塵等皆須三惑二邊以釋也疏即內外空者內根外境俱空也疏諸法是所破者二邊之法名諸法也疏執方計破者執空為有有即屬方破之執故故云計破疏無名出離法空者謂無為是小乘法空中道無名出離於此故云也疏無名性空可解者無四性執故名性空大乘進退者勸弘經者觀於前機宜大須大不宜於大而為説小以助於大結成大車者十乘是法大車約譬也一切破遍者觀一切法空而已十八道品者中道雙非以修念處由念處生正勤等故以十八空對於道品也表後三者夢入諸位即第八知次第九安忍從五品䇿入六根十無法愛即從十信離相似三法入於初住位即如品末經文説也四總十別者須以四行總於十法則使一一行皆具十乘復以十乘別於四行令一一乘皆具四行故也俱通橫竪者十乘為竪四行為橫四行入十乘無橫而不竪十乘入四行無竪而不橫則成橫竪皆至於極也十法導理者理謂不思議境境為十法所依所以十乘得能導名以廣顯略者近三助行行略近廣也各遍消故者今騰上行處三釋一一皆遍消行處經文也人空行處者只是頌上戒門合行處中生空意也頌雙標行近者意云偈後既結行近所應雙標二章也亦當生空柔和等者應云十惱亂與行處柔和等俱是生空故亦云當也經云無怖畏心者申依行近二法故無怖畏也疏初應入行下十四行者就此為九初頌離憍慢緣次凶險下頌上第三離散亂緣三旃陀羅下頌上第四離惡業緣四外道梵志下頌上第二離邪見緣五亦不親近下頌上第五離小乘緣六寡女下頌上第六欲想第七不男無志操緣七亦莫親近下重頌上第四八凶險下重頌第三九諸淫女下頌上第九遠譏謙兼得八遠危害十遠畜養也疏一陰謀王命者謂比丘教詔故疏三典藏亡寶者謂比丘通引故疏即謗法者比丘是行法人謂佛命爾耶疏摩橙加經者彼經上卷云有旃陀羅名帝勝伽求婆羅門女以為子婦諸婆羅門悉皆毀呰旃陀羅姓帝勝伽言汝婆羅門姓若因韋陀名婆羅門者如昔梵天修學禪道有大智見造韋陀論流布教化其後有仙名曰白淨造四韋陀如疏一一韋陀各四萬偈偈各有三十二字言各三十二萬偈者恐誤次拂沙等如疏當知韋陀分散之時婆羅門種亦應分散若韋陀壞時婆羅門不散壞者如何得言婆羅門種因於韋陀疏讚誦韋陀者如此土文選之類疏並諸雜語者只是諸讚誦等耳疏優留僧佉者此云鵂鶹仙其人晝藏山谷以造經書夜則遊行説法教化此伏夜遊行如彼鳥因得此名在佛前八百年出世説最勝論有十萬偈以六諦為宗一陀驃諦此云主諦謂五大及時方神意此九法為萬物所依故名為主二求那諦此云依諦謂色等五塵一異離合數量好醜愚智愛憎苦樂勤墮此二十一依前九法故名為依三羯磨諦此云作諦謂俯仰屈伸出入去來故名為作四摩若諦此云總相諦謂總取萬法為一大有故名總想五毗尸沙諦此云別想諦謂森羅萬像各各不同故名別想六摩婆夜諦此云不與計塵成執不相妨礙故名不與計恆水滅罪故須三洗又曰爾供養火謂火為天口天因此食雨時燒香蘇等令氣上天以為供養謂能滅罪及生福利疏迦毗羅者以其頭如金色因此立名得神通前後各知八萬劫事造無頂論十萬偈明因中有果計一為宗用二十五諦一者從冥初生覺過八萬前冥然不知但見最初中陰初起以宿命力恆憶想之名為冥諦亦云世性謂世間衆生由冥初而有即世間本性也亦曰自然無所從故從此生覺亦名為大即是中陰識也次從覺生我心者此是我慢之我非神我也即第三諦從我心生色聲香味觸從五塵生五大謂四大及空塵細大粗合塵成大故云從塵生大從五大生十一根謂眼等根能覺知故故名為根名五知根手足口大小遺根能有用故名五業根心平等根合十一根心能遍緣名平等根此二十四諦即是我所皆依神我名為主諦經破戒比丘者大經云不與犯重禁同共一處住呵謗方等者得生不動國波羅夷此云退沒墮落無道果分也經名字羅漢者但有羅漢名字無羅漢義如金剛三昧經云有名菩薩有義菩薩今亦爾雖口自云我是羅漢其實未殺煩惱等實是羅漢尚不親近況名字者耶更有別事何不問耶者意云有解脫涅槃何以不問而問此鄙惡事耶經求現滅度者所著既深隨之而死不能捨離故云現滅經小女者十五已下處女者十五已上未嫡者疏第二八行頌非遠非近理遠近者非遠非近專明以觀契理得名然此八行今應先分二行半頌上又復於法無所行等文初頌非行次不得下頌非不行與長行雅合從一切諸法下正頌非遠非近初一行半頌上觀一切法空如實相是總句也經不得諸法者不得二邊法也經不知不見者應以中道佛眼見佛智知不墮二邊知見也從顛倒下頌前中八句餘十句闕初二行頌不顛倒之相在於下正約止行頌不顛倒觀一切下半行頌無所有性句猶如下半行頌如虗空一句不生下半行頌不生等四句常住一相頌實相句疏得人無我者人謂數趣也起惑造業類取五趣之果謂之為人而於其問執有生宰自在之用謂之為我安樂行人隨於行近以正憶念中道之觀而觀實相之法故能止於二邊過惡也疏得法無我者於二邊法中執有勝實自性自在之用謂之法我安樂行人了達偏小之法即是實相故離二邊之取著也疏文殊下第三一行一句總結成者上長行身安樂行初開章為二一釋行方法二結成結成即指此文也今應云大段第二一行一句總結成身安樂行也第二口安樂行亦具三業以口為主餘二業助以油塗身等身業也除懶墯意等意業也問經讚小善者大經云見人小善便讚歎之如涅槃中二乘者先取小果助於圓極也尚不令順法而違物情者若順大法而違物機尚不可也疏行門也者若不棲心至境則安樂之旨未明故云觀諸法空等疏王者語者自在如王使他從己不順而罰故云誅之第三意安樂行亦以餘二業助意經亦勿輕罵學佛道者等口業也恭敬禮拜等身業也經於諸如來起慈父想者以覆陰長養菩提心故起大師亦爾疏理論三乘等者約化意説約開權説故云汝等所行是菩薩道即其義也經得好同學者五種法師也故各釋妨者只拔苦必與樂與樂必拔苦也疏此等亦須與樂但其下釋不堪意疏降伏諸國者今用小教破所化陰入即是涅槃故疏是三毒至四千者是佛所對治法謂貪嗔等十種隨眠只是十使隨逐有情眠伏不起名為隨眠若約起邊名十思惟此十隨眠一一皆餘有九隨眠為其方便足成一百前分一百謂過去也後分謂未起也並現在一百合成三百置本一百就前後分二百之中一一皆以九為方便足成二千並本一百成二千一百起及未起各有二千一百足成四千二百約多貪多嗔多癡著我思覺此之五人一一各有四千二百合成二萬一千更就三毒及以等分四人分之一一各有二萬一千遂成八萬四千此是小乘論一數若依玄文第一所引即約大乘中數也疏衣服即慚忍善法者始從五停終至羅漢位皆具慚忍莊嚴也經得法國土者謂寂光土也從法身地起應三界故云王也經引導其心等者説化意也然有壞義者意云發心即壞天子魔故也爾後時長者在方等時被彈不退故歡喜在般若時被加故歡喜故云通也疏兼得人一者行從人立既其有行豈可無人故經云能令衆生至一切智也疏上總明行成者上長行有總有別前總中皆有行成及無過失今但頌行成不頌其無過失疏初三行頌不與珠者上文有六合但頌三初半行頌第一輪王譬次一句頌第四有功歡喜譬三兩行一句頌第五隨功賞賜譬次合不與珠譬中但頌其四初一行半頌合第一輪王譬次半行頌合第二小王不順譬三半行超頌合第四有功歡喜譬四一行追頌合第三起兵往罰譬經以大方便者用同體之權説法名大方便疏三行頌合與珠者初半行頌合大功勳譬次二行半頌合正與珠譬經於家出家者於家出頌上慈境及非菩薩頌上悲境也經如法化世者只是先權後實耳疏其中細開者上合與珠文具四一今頌亦四既知衆生二句頌人一末後乃為下二句頌教一如王解髻下二句頌理一此經下一行半頌行一故云細開也疏得現生後勝報者現謂現在受報生當生而受後謂隔跨當來一生二生無量生而方受也與初地等者亦是且借別地對住也疏正見無癡者正見無見惑無癡無思惑也疏信根者等者應約圓釋即無作道品以消經中深入佛道等文也疏定根得四禪者得四如意足定也疏是沙門道者因也疏是沙門法者修行法也疏是沙門義者沙門此云勤息息謂息諸煩惱今云煩惱盡即息義無嗔即慈悲義也疏又是所更者更謂經也疏答此非願智等者謂願智頂禪能知三世之事經既但明夢之所見不論禪之所見故云非也疏佛起現前者起謂覺也佛常以覺智現前故
