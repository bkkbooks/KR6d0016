body:
  text: 吳興永定寺釋沙門道暹述將釋疏文略分為四一先略解題目二從佛出世下釋章安注文三委釋下指廣四序者下依文解釋初文具如玄文五重略廣二釋已辨其相餘三段如記次第解釋可見又今疏文用於玄文廣義成今略義是故今文時時引用良由此也言為二所依者謂文字為名句所依也故婆娑論云一字為名二字為名身三字已去為眾多名身又一句為名二句為句身三句已去為眾多句身是則名句為能依文字為所依又毛詩注云宮商角等上下相應謂之文句者曲謂隨遂經文曲細分別句逗者逗留也說文云逗止也方言逗住也即以句止之處名為逗也名詮至差別者若於今經具通別二義始從如是終乎而退同於諸經無不詮於自性及以差別別而言之一一名一一句並異諸經故云已今當說最為第一也不論至等體者與論辯異也今意但以句逗分一部經文及隨文解釋不同諸論或以色為教體或以意地所思行蘊所得為句教體如唯識法相宗具以聲名為教體彼論云聲屬十二處中聲所接五蘊之中色蘊所接四辨之中屬辭為礙境也名句文十二處中法處所收五蘊之中行蘊所得以名句文是聲上屈曲意地所緣故屬行蘊及法無礙境今家明教具如玄文今此實相一乘之經詮於所證實相之理永異眾典即其相也今但以句者對論故云今也又今一部之文分為序正流通名為三句二十八品等名為小句問今文何以不云身等乎答但云其句一部之文任運成身何者但是諸法聚集名之為身以一部經文無非聚集故不別云也成若干章者目約序正流通及大小章為若干也疏者通意之辭者謂以言辭而通文意也亦記也者謂稟受前人記其所受以為疏也又及率己胷襟也鏤者如檀體雖香必假工人彫刻顯出檀之妙像古人亦爾經體雖妙必假巧辭鏤出文旨今大小文義有序也二難之中者於聞法難中開出傳譯及自開悟於能聽難中開出聞師及一遍記其義相當矣正在時會者此敘靈山當機之眾故云然等也言及以阿難者謂若不因阿難親承梵音如來滅後處眾誦出有可傳譯此土方聞若不因此像末無猶得聞故別指之故經多劫者若以賢劫第九劫內四佛相次而興不得云多今通望過去三佛及以中間不覩佛興故云多耳聞者尚難者歎此土聞者尚已為難況大師親自修行復於道場妙悟為眾解說章安所記流通後代豈不難耶於中初二至斥己者前文通釋從此下別釋斥者指斥也故三雙相望名為一一則六義傳傳漸漸後挍於前輙記者謂謙己專輙一遍記於大師言旨故若魔若外者以佛力加於結集之眾使魔不得其便千大羅漢皆是無礙解脫降伏外歒則令外道不能得便添削者既云記大師之言何故專輙添削耶從添謂下釋所以也謂斥非以顯是者謂章安助破古師以顯大師之正也破古至我己者明章安破古並用大師義勢以破古人非全用已自任胸臆也加彼異見者加謂添足即章安更引古人異解之文助成大師也破文丹丘者赤城山也在國清南門據時添削處實國清丹丘名佳故以標地今國清寺屬丹丘里須開三教等者前二教一句須開別教教權理實由存教道是故別教果頭之理須廢故名開也故玄文云別登地已上須廢高歸下即其事也言大小者通別為大三藏為小也初心之人者謂法華前圓修之人在名字位雖信一色一香無非中道而於方等般若座席猶屬同聽異聞以隨喜等位觀道未成猶謂偏圓相隔如此之人須聞今教開顯之說故淨名疏釋菩薩品云圓人失意尚須彈片即其相也隨喜已去不須云開若入初住已上但論增進故也權人至此者謂權到法華一向須聞不論圓也疏云經題者題者頭也故字從是脚裏作頁頁訓頭故以經首名之為題若言經第未善字義疏云委釋者委屬也曲也謂屬對妙題曲細陳釋已如玄文十卷釋總三法者以題名是總三軌是別故玄記云以總總於別以別別於總此之謂也超過諸說者一則超於前十四品二則超於一代教門即三之一者謂覽體宗用三以立名故本地亦爾不與他同者不與他人解釋同也體非因果者譬如虗空之體非彼非此而遊之者還遊於非彼非此之虗空因果取體亦如是還依非果非因之體而成從因至果之宗若不先了能開者以法華圓乘妙體宗用為能開三麤即妙為所開故但分文句者此明單用文句消經不當應須疏中隨文解釋以顯理唯談下明單用玄義不可若相帶下明全用玄文入疏全用文句入玄相間雜說不可何者則使聽者不識經文起盡復令玄文大義不彰故云無歸寄行約教者迹門約行次第以明五義本門約教次第以明五義玄文第一卷具辯其相又觀其文勢安樂行經約行等固蔽理觀者便斥世人不用止觀文意消經成無觀行所以今家一一文下皆以觀心釋之而但下明世人不肯用玄義消經但用諸論事相而已今問弘經者令問弘教人心也自行暗於妙宗者約行因果以片故妙宗具足應以三法斥之教行至相攝者即以迹中四一自互相收何者由稟開權妙教則成一乘之人行於實相之行以顯一乘之理餘三例爾又以本中四一攝於迹中四一故也不可恒爾者不可句句之下皆列名體宗用衣坐室三也廣略適時者序品方便品迹門之廣餘品是略壽量普門是本門中廣餘品是略何者只是廣略釋於妙法名體宗用若曉廣已略無異途故圓乘大車開權寶所與方便品諸法實相無二無別故云根源等今家隨釋者今師隨品解釋則成生起故云通有四意等也又慈恩每於一品皆作四釋今家不爾須四則四不必一槩二十八品一一皆四若一槩者未為全當釋妨者如方便之名與大小乘同故須釋出今經即是體內方便不同於權諸皆例爾釋文者即是正釋也或釋名中即帶來意者如釋安樂行品具有此相及下流通分中多有此意至文可見又釋名至互有無者如譬喻化城授記等並於題中俱釋其名義皆未備序品方便普門陀羅尼等題中及以品內名義皆足所以疏文而於題中解釋名義委悉皆盡以此二類名互相無言義者三車大車皆是名下之義化城中說化及以寶所授記中別劫國並是名下之義餘品准此或於義前別釋者如釋序品先約字訓次釋字義方便品約方法釋名則先從字訓門及祕妙方便名從義譬喻化城等皆有先釋其名次方釋義或帶名以釋義者如序品云序者即是其名階位等則是其義方便品普門品陀羅尼等品於題中解釋悉之故云帶名以釋義也此彼淆混者若不曉今家釋意還成將於昔教以混法華故也復似從義者只階位等言似從義也學舍養宮者禮記王制云夏后氏養國老於東庠養庶老於西庠此以國家東西兩學為庠序今此品於正宗如東西之學故言序也別內外者此指東西廂為墻對於堂屋以別內外也此可借用者疏中既無異內外之言故今申於文意亦可借用別內外之言以消二序故也又庠者詳也謂之諦審序者敘也舒也於正宗前所列由致皆諦並審方敘而舒之通序異外者此借下文對治悉中阿漚二字對破外道不同別序專異諸經亦可兼用者謂通序非但異外正是序於圓妙故得同而別序方異諸經即是別於內外之相也亦二序共有者只是通序亦具階位安庠之義若從義立通序亦具申述二義何者如因阿泥樓豆令阿難問佛如來滅後一切經初安何等言佛答皆安如是等五因此五事得為別序作由義當由序也述者阿難述佛滅後經初先安如是等五義當述序也是則二序皆具三義也必先證信等者此從現文以說諸經皆爾必先發起等者此從佛在世當時以說佛在世時但有別序如來滅後方有通序故也二序各有前後者謂二序各具五義自為前後又前云必先證信亦是各有前後也即賓主者若以文殊是遊方大士則彌勒是舊住為主文殊為賓若據發問則彌勒為賓文殊為主矣冠即是首者不同餘文冠與身異今文冠全是首故云即也瑞疑由也等者謂由光所見故疑問述昔所聞故述答也疏云胤者繼也謂眾物之子如烏養子羽翊方成母以低飛而哢之意在令成而峻飛教飛助以飛興喻於述序義可知者謂覺正體以之為序即當序中唱於異名之意故云哢亦得名引故字義則通者謂序品義則通下諸品題稱序品此則從別故出其人者先出佛及以譯人則是能聚之人若言聚者謂物體已聚名之為聚可去聲呼今文即以上聲呼之如心地品者梵網經有六十品心地等二品是佛自唱如云持戒心地法門而去故云佛自唱餘皆譯人及結集者所置人如樓那者以人類等非一故皆云如也以無聞品益故者此有文外之疑疑云既云諸品皆結集所置何故無結聞品得益人耶答只是闕略益人非無如三周得記其數非一人何須置疑二者以無聞品益故品後無結耳以通從別者品是通序名從別品從序皆具四釋下二十七品皆以方便等名從別品一字是通通別相從皆具四釋下去准此故不重述或闕於一兩者迹門約教定不可闕本門談遠亦不可闕因緣觀心或存或沒亦無大妨也通皆除疑者但見無阿傴二字即知是佛經故云除疑餘三及別序者此明妙經通序即約教也久遠今日即本迹也五義悉具觀心釋也別序具四例此可見得失者處中方名為得至安公來者自安公高悟料節或興懸符地論之文佛地論科判佛地經云要唯三分初教起因緣分此與安公序分同二聖教所說分與正說分同三依教奉行分與流通分同疏云案說傳之者謂結集之家結散為長行結貫為偈頌以傳像末故云也總別起盡者亦可云大章為總小章為別也阿難說經者佛去世後阿難登高座誦出亦得名為說經契經者契理契機名為契貫穿縫綴名經佛地論云貫穿攝持所應說義長多瓔珞者經中廣破外道竟說多譬喻莊嚴佛法故云也疏云增一者以一加故云增一累法增之故也言明人天因果者從多分說但云明其苦集非不說於道滅今從略邊故但云耳破邪亦爾二中阿含者准祗律說謂阿難誦取文中之義故即是專明道滅矣三雜阿含者或文義雜或句義雜根力覺道皆說故即是明世間禪無色定等四長阿含者謂明擴劫長遠之事見論云集眾法之最長者故名長含肇法師長含序云所以通稱阿含者此譯為法歸謂萬善之淵府總持之圍苑眾法之所歸故云也疏云律開五部者內善調伏名律外禁身口名戒舉果望因名婆羅提木叉此翻處處解脫五部者大經云佛告憍陳如我涅槃後有諸弟子顛倒解義宣說名曇摩毱多此云法上為合法相易凡所說法先果後因故云顛倒一曇無德部法名四分二薩婆多部法名十誦三彌沙塞部法名五分四婆麤富羅部律本未來五迦葉遺部法名解脫僧祗為本部分出餘五八十誦等者優婆離一夏八十度昇座誦之故得名也文中自引阿含六度者謂毗曇是通名文中正引六度為分章也逮度無極者古翻經論六度一一皆云度無極也鏡中者戒檀嚴也未必全然者記家意云鏡中亦不須此破以廣攝略有何不可根大見雜者根謂根性大謂四大又加空識二大成六大見謂見惑雜謂七種之餘名為雜佛在無出者謂佛在出諸法法具足無有失滅以佛入滅法皆隨去恐法失滅故會論師結集諸法一者序成就者從如是我聞至崛山是論自釋云如王城耆山勝餘一切城山故二者眾成就者從與大比丘至供養恭敬尊重讚歎是第三成就如記四從佛說是經已論釋云依何等說法依三種法者一者三昧即初文是二者器世間即雨華動地是三者眾生世間即爾時會中已下文是依止說因者謂依中道智光令見他土說論釋云大眾見異相不可思議事如來應為我說渴仰欲聞名依止說云云六大眾欲聞法者從爾時於彌勒菩薩作是念已下文是以現瑞故是說妙經由故以問現瑞由為欲聞法成就七爾時文殊師利語彌勒已下文是一歎法勝妙分者論云一者示現所說法因果相謂佛曾親近諸佛盡行道法為因相成就甚深未曾有法等為果相此經說佛所得之法故以佛因果相為所說法二歎法師功德分者論云二者示現如來法師功德成就謂能種種方便引導眾生知見深遠禪定解脫巧說諸法悅可眾心等為功德三智眾定疑分者論云三者依三種義示現一者決定義有諸聲聞方便得證作決定心如經我等亦得此法到於涅槃等二者疑義謂諸聲聞辟支佛所不能知是故生疑如經而今不知是義所趣三依何事疑義謂如來數數說甚深境界而前後不同是故生疑如經爾時舍利弗知四眾心疑等從爾時大眾中有諸聲聞已下是四定記分者從爾時世尊告舍利弗汝已慇懃已下是論云四者示現依四事說一者決定心已生驚怖者令不驚怖故如來有決定心故二者因受記如經爾時佛告舍利弗止止不須復說等以說妙法必令二乘得受記故因欲說此而先止之令生尊重故名因受記三者取受記如經汝已慇懃三請豈得不說等此謂因舍利弗等靳固欲聞故佛許說即以欲聞名取受記四者與受記如經舍利弗如是妙法諸佛如來時乃說之等謂決定為諸聲聞等開權顯實五佛咸爾故云定記五斷疑分者論云示現斷四種疑一者何時說諸佛於何時等起種種方便說法為斷此疑故如經舍利弗出於五濁惡世等二者云何知增上慢如來不為彼人說法云何知彼是增上慢為斷此疑故如經若有比丘實得阿羅漢不信此法無有是處等三者云何堪說從佛聞法而起謗心云何如來不成不堪說法人為斷此疑如經除佛滅度後等四者不成妄語如來先說法異今說法異云何如來不成妄語為斷此疑故如經舍利弗汝等當一心信解受持佛語諸佛如來言無虗妄無有餘乘等疏云其餘品各有處分者論云法力者五種法門示現一證二信三供養四聞法五讀誦持說三法如彌勒品示現分別功德品也聞法如隨喜品說讀誦如常精進菩薩品示現法師功德品是說力者有三種法門神力品中示現一出廣長舌二謦欬聲三彈指苦行力者藥王菩薩品示現教化眾生行苦行者妙音菩薩品示現凡此等是唯以者以對他故餘人非不亦美唯光宅最得獨擅之名故云唯也吾鑽仰者東安鑽仰也逵者九達曰逵進退俱失者進如光宅退如古師疏云二十七品者達多品未入也疏云理一說三者謂於一佛乘分別三故但依權實本迹者權實即迹門本迹謂本門也果在本門者今家若以本迹二門相對則迹門因正而果傍本門果正而因傍若不相對各有因果不同古人二門偏立所以破之良由此也但合二三為正者於四段中合二三兩段為正與今家從前三段消經其意不別故云甚符經文以氣為臭者西方以氣為香故云等香不等香平等香此土易云其不得意者其臭如蘭故也天台名如止觀記等者古老所傳以其山絕嶺之形似三台星布列之狀因號天台有云本名天梯謂其高可登而昇天也後人訛轉為台字耳智者因為晉王授菩薩戒王曰大師傳佛法燈當加尊號故稱智者舉處顯人故云天台天台分文為三者若但為三段分節消經則通別二序俱通本迹故於序中二文義皆具四釋若本迹各分三段序中只得密有本迹之意所以疏中或時但約體用本迹消文良由此也疏云約本開權顯實者謂權迹實本久近雖殊開顯同故故云不思議一也若分二別者本門約身迹門約法權實之稱唯在迹門問後何妨者此助申問詞意文中既存兩節分文但後段分文問起亦應無妨不專後釋者申於疏中何不依第二節分文消經由本門正說之前立於流通非須大途且是一往從前三段消經不從於後處會如釋籤者舊經七處八會新經更加普光明殿一會一摩竭提阿蘭若菩提場會舊經云寂滅道場二摩竭凞連河曲普光明殿會舊經云普光明法堂三忉利天四夜摩天五兜率天六他化自在天七重會普光明殿八三會普光明殿九逝多林會住處莊嚴者彼經每一會處皆先說於住處莊嚴以為序分方始王說然須至之妨者應先出妨云阿含同一經何故多通序從阿含兼別下釋阿含妨也疏云今怙文者怙謂消怙也此之四意是消經之方軌也尚異諸見者明今師通途消一切經尚異諸師之見預為四重等者謂例數等四也消釋四意者以四重消釋因緣等四也疏云而今略書者書者記也意云大師釋經一一皆具四釋章安存略故云而今也答中一文者我今處中說是也一者總明四義所以者只此四義正是處中故也不失不差者四釋無過名為不失皆契機理名為不差疏云廣則令智退者則令中下退耳如十妙等者引例也彼具十妙尚得名中何況今四而非處中故彼一妙皆具四釋謂先分別次判三開四觀心亦入四者謂不思議因緣所顯之妙境一乘能詮之妙境久遠所證之妙境一心三觀所契之妙境餘九入四准此可知尚不殊外計者意云若無三藏因緣尚不異於外計況圓妙四悉永異諸經故云尚也中間頓漸者謂十法界皆須頓漸之化故云佛慧等也人理至准說者依一乘教行成一乘行成一乘人顯一乘理故云可知以此至始末者因緣具四為始乃至觀心具四為末約教等三者開顯之教一道無外開顯感應非餘四悉開顯之本諸經所無開顯之觀一觀遍收所談身土者如壽量品云我淨土不毀及常在靈鷲山等文信宿者二宿也先愚密教者謂迷於顯密之密猶為權覆故名為愚守株尚昧者若更守於法華前教則昧今經本迹二門今弘教者多有此執能詮教功者約教也久成行本者本迹也小及鈍根者兩教二乘名小三教菩薩名鈍也理是而迷者眾生陰界入全是真如實相故云也又理是近而迷故慈亘始末者下種為始得脫為末也事理不同者眾生在理諸佛在事感應未交故名為遠無謀而會者非但諸佛無謀而會眾生修行亦是無謀而會也淺深差別者權淺實深故也若兼謂華嚴若獨謂三藏盈即方等縮謂般若也明時不差者謂契教行根理也相通事別者以無緣神通遍被一切故名相通機緣不等故名事別如止觀第六者彼明中觀修無緣慈不住法相及眾生相乃至十二因緣七覺八正道十力無畏諸佛神通無不皆以慈為根本非諸聲聞緣覺所知又如提婆達多教阿闍王殺害如來我於王舍大城乞食時王即放護財醉象令害於我及諸弟子爾時蹈殺無量眾生象聞血氣狂醉倍常見我翼從被服赤色謂呼是血而復奔趣我弟子中未離欲者四散馳走王舍城中一切人民同時舉聲號哭流淚作如是言恠哉如來今日終沒如何正定一旦散懷是時調達心生歡喜我於爾時為降伏故即入慈定舒手示之即於五指出師子是象見已其心怖畏舉身投地敬禮我足我時手指實無師子乃是慈善根力令彼調伏乃至舉石空中力士驚怖現作莊嚴降諸外道令狂女人見如己子患瘡女人得藥平復一切善法慈為根本一切應現皆慈所為慈即如來慈即佛性慈即三寶普遍諸法無非是慈云云九界等者等取七方便故又復讓佛界為尊故但云九耳故事廣等者神通之事則廣神通之體是中故也通於地住者依瓔珞華嚴二經判位也義非廣略者中道神通非廣非略只此雙非體本中故疏若十方至廣者應例餘三皆對十方為廣何者是略耶答若娑婆土中不及此不思議妙感應四悉不及此聲教乃至觀心者皆名為略若及此者則名處中是故四義廣略處中悉皆備足權實理定者偏圓之理也定不可互為故也淺深義通者圓則行位階降不同權則諸教不等故云義通若以信行為乘下舉解迹問也及知下舉解本門也華嚴經偈者彼經云譬如貧窮人日夜數他寶自無半錢分多聞亦如是譬如盲瞽人本習故能𦘕悅彼不自見多聞亦如是彼為斥偏聞之人亦與今意不別以理攝故者謂若以心性真如實相之理遍攝一切則達心性萬法具足無非法界故名為迹也觀成入位者別入初住通具六即以論其入後後為中者因緣事廣遍彼十方妙教方中唯在聲故教被仍廣但點久成餘皆迹化方名中本高迹廣尋者疲勞但觀己心方名中耳故云扣無窮之聖應也後後轉入前前者由觀心故見久遠本由證久本能施妙教由稟妙教得妙四益故云後後轉入前前也猶覆久成者法華迹門尚覆久成何況前教況復一一至攝者若非開顯大觀何能證於本若非證得久本豈能設在開顯妙教若非稟於妙教為感不思議應餘三相攝亦復如是又但本一法即攝餘三亦應可見從機則機親者謂若機親名為感應若應親名為應機正為顯實者縱未知本由自了耳既得云大等者大只是廣深只是高諸教果德者三教果位為果德即約行也權實者三教為權別妙覺別理為實以約教道故云皆為筌蹄即約教也大經中闍王說偈云諸佛常軟語為眾故說麤麤說及軟言皆歸第一義下文顯己者若顯本已方得方便品文顯露證於久本事論只是至義當者然文相但約事而說故今先約事論後方詑成觀相境本至施開者謂由境發觀名為垂迹由觀顯本又境發觀名為施迹由觀契本名為會本又境即觀故觀即境故名為開迹顯本云云唯約今經者其意如何即是示今經不思議開權圓妙因緣開權顯實之教相專示久成之本迹圓妙之觀心但文勢者示後人消釋之勢不必一向盡用四釋云云又序中約教者如消如是等文或直約於圓或對諸教以辯云云但點遠本者借使本時用於三教助顯於實以是本成無非真實故也三段大文者序正流通過未因果者過去為因現在為果現在為因未來為果聞無所從者若不約於序等三段以明其益汝於何處得此種熟脫別序通過現者說法瑞謝在過去又序燈明五瑞等故云說是經已入定等五在於現也如說無量至等三者聞於從一出多之經密得從多歸一之益法諸教因緣長短者唯圓實益為長餘三教因緣皆短故今文但久遠蒙佛善巧乃至未來永永等近從七地者七地以前但是自行七地已後方乃與物結緣修淨土因又無未來之化故云短也此文四節者專為眾生作長遠之益三世不窮故云有以也今不云是者唯地涌菩薩云是本眷屬耳若未得佛智者若未聞開近顯遠之說則未能知久種若聞已則知如來久遠為我作種熟脫三也今出其意耳者此明疏文為後人略出開權顯實開近顯遠種熟脫三意耳本因果種者此即如來行菩薩道時為化下種證果之時復為下種故名本因果種果後方熟者成果已第一番施化名為果後取化儀意者約一代化儀皆先權後實故爾次約三世九世者華嚴第三十一云佛子有十種三世謂過去說過去過去說未來過去說現在未來說過去未來說現在未來說無盡現在說過去現在說未來現在說平等現在說三世平等彼經為成十句故於九外更加平等又大瓔珞俱翼天子問佛三世皆有諸佛不佛言汝問何等三世過去耶現在耶未來耶故今通約三世九世明種熟脫念念三世九者於一念中互相形待以為三九何者如一念為現在復是過去之未來又是未來之過去是則九世但在一念心中任運為未來過去過去為過去過去為未來未來等又如來有不可思議延促之力三段等法在一剎那中云云念念逆順者序等三段益物為順示九界身說所宜法為逆又示穢土同事之身為逆大體三世者謂一期三世也會會者今經總有三會或三周亦名三會言世世者既成味味則有三世之化故世世又味者於念念中得五味益此即約行論五味又通五和合者五義俱時故云和合又人法相應乃至眾相應故云也末法至冥利者謂至末法時顯益雖無冥利則有也今教別有至功者迹門顯實為相本門顯本為相也且通作一種三段者只是且約一部大為三段示種等相耳況觀心至因緣者即是因緣家之教相本迹觀心也令遠見故者意云光雖不及於遠而能遠見於中期心遠故者地前雖不及登地聖明而亦期心於果不能起住等者經云善男子云何名為嬰兒行善男子不能起住來去語言是名嬰兒不起譬常不起邊中諸法之相不住譬淨不著生死涅槃不來譬我不從淺至深動搖彼此不語譬樂寂滅涅槃不可言說此圓嬰兒從初發心常觀涅槃四德行道故言不能起住來去語言又嬰兒者能說大字如來亦爾說於大字所謂婆和和者有為婆者無為是名嬰兒又和者名為無常婆者名為有常如來說常眾生聞已為常法故斷於無常是名嬰兒行彼疏釋云正取和字而為大字即是六度菩薩嬰兒此菩薩三僧祇劫百劫種相志求作佛此佛是有為半字無常之佛故知是和字嬰兒又嬰兒者不知苦樂晝夜父母無苦樂是不取捨無晝夜是無憎愛是通教菩薩嬰兒達願化相苦樂平等恐親不二又嬰兒不能造作大小諸事菩薩摩訶薩亦復如是不造生死作業心菩薩終不退菩提心而作聲聞辟支佛乘彼疏云無五逆二乘心即是非生死非涅槃行於中道菩薩之行即別教嬰兒也又嬰兒者如彼嬰兒啼哭之時父母即以楊樹黃葉而語之言莫啼莫啼我與汝金嬰兒見已生真金想便止不啼然此黃葉實非金也木牛木馬木男木女嬰兒見已生男女等想即止不啼如來亦爾若有眾生欲造眾惡如來為說三十三天常樂我淨端正自姿於妙宮殿受欲樂六根所對無非是樂眾生聞有如是樂故心生貪樂止不為惡勳作三十三天善業實是生死無常無樂無我無淨為度眾生方便說言常樂我淨彼疏釋云揚樹譬妄常黃葉譬妄淨木牛木馬譬妄樂木男木女譬妄我此人天嬰兒也又嬰兒者若有眾生厭生死時如來則為說於二乘然實無有二乘之實以二乘故知生死過見涅槃樂以是見故則能自知有斷不斷有真不真有修不修有得不得如彼嬰兒於非金中而生金想如來亦爾於不淨中而說為淨等彼疏釋云知生死過是識苦集見涅槃樂是識道滅有斷不斷此約集諦正使有斷習氣無斷有真不真此約苦諦生死中無涅槃則不真離生死有涅槃此則有真有修不修此約道諦四倒惑等是不修四念處等是修有得不得此約滅諦利使鈍使名不得見道修道名得此名欣厭嬰兒也故圓因位者等覺已下俱名小善以讓佛故也而無邪法者無橫計自他共無因法依義不依語者但依字之義不依字之語也故下三文者從中間行行已下乃至未來永永文皆以初文為本今欲論諸佛者意云我論於最初為得不耶若許有窮等者今非有窮故無斯過何者釋尊非不稟先佛教今日受化且窮釋尊增其觀解為獲實利有何過耶內薰自悟者意云有教外薰勝於內薰故斥有教之日何得守迷者斥今人也何不稟教求真而云自思悟耶嗅香者具如淨名食此飯者得心解脫等覺觸者以天衣觸身皆能悟理也瞪視者普賢世界直視一物以為所觀即得悟入也行必先戒等者戒者慎也以防非為義心源本淨性離著非等即戒義定者安也寂也止也以不動為義心性本寂不可動搖即定義慧者解也才智也以了別為義心性之體寂而常照了因即慧性也故遺教經云依因此戒生諸禪定及滅苦智慧單白已前皆方便者如律中八種調理九種往來等准部至義立者若於迹門釋義若不義立久遠本迹須義立體用本迹以消迹門隨喜不輕等者隨喜初心信一念之心橫竪該深等即是觀境不輕等例然三昧所依者藥王妙音也諸行所陀者觀音下諸品也化功若成者此約新入初住人受二種稱若化功未成但名當機而已若自行分滿成分證觀能十界化故云化功若成等文語稍倒耳覩異文識一觀者今經一部文異以一開權顯實圓妙大觀觀之無不必契亦識至觀異者如云佛以一音演說法眾生隨類各得解即觀異之相也及文觀俱異者稟於經修觀各異故也亦識當教者四教文觀自同也此中四句唯初句屬今經後三句屬昔教也分今昔者且如今經三車敘昔大車唯今化城寶所三草二木一地一雨等准例可知亦可云通諸部者約味判也問經與教何別答成部帙者名之為經經中被機多小不等名為教又亦是二名互立其義大同也而談律頌者文中則說禪師之德頌中乃談律師之德也通序無起由阿泥樓逗者大經云佛告阿難汝當精懃以善教誡諸眷屬世間苦痛早求出離一失人身難可追復畢此一形常須驚覺無常大鬼難求難脫善惡之報如影隨形三世因果循環不失此生空過後悔無追涅槃時至示教如是阿難聞已深沒憂海投如來前猶如死人阿泥樓逗安慰阿難輕其愁心而語之言如來涅槃時至汝依我語諮啟如來滅後六群比丘行汙他寂惡性車匿云何共住而用得教示世尊滅後以何為師依何而住結集法藏一切經初安何等語阿難具陳上問而以白佛佛告阿難善哉善哉汝致四問為最後問能大利益一切世間車匿比丘其性制惡我弟難陀具極重欲如來為說十二因緣彌滿三千大千苦根本汝當依我教法正觀教示六群車匿深心依此不久自當得證上果尸波羅戒是汝大師依之修行能得出世甚深定慧依四念處嚴心而住一切經初當安如是我聞一時佛住某方某處與諸四眾而說是經既云一切經初當安故名通序雖通而別如文具簡云云疏云能持之人者謂聞通而持別故加能持以簡異於伴也縱有兼釋等者意云通釋義已顯著下去廣釋但是附傍通釋而已言兼釋者只是兼於四教釋耳雖兼四釋須附略文義通兩句者非但阿難得和合稱由眾機會復名和合故云由機也疏云不與世諍者大經云我終不與世間共諍世間智者所謂諸佛菩薩一切聖人世智所說五陰無常苦空無我我亦如是世智所說五陰無有常樂我淨我亦如是諍論不與古今同喜故屬世界又應知此世不同世間之世若未開權則名為諍若開顯已方名無諍又應更云開近顯遠方名不諍以異顯同者諸佛雖異如是皆同故引諸佛顯於今佛如是道同阿漚者百論云外道謂梵王昔以七十二字教化世間梵王後時貪恡情起退失神通是故世間敬心微薄梵王忿恨還取七十二字吞之唯阿漚兩字從口兩邊遺落世人收得將為字王故以阿字置廣主經初漚字置四圍陀經首詺此為吉汝今先惡止惡在初故云不吉以汝吉法無自等者此即但點能破觀法所計自祛故論云諸法從緣生尚不可等故但云無自等也有無中攝者只是計有為自然計無為自然耳但四計義通者外人則依正起計佛弟子則於境智起計如止觀第三破境不自境中說或且通方者但是前三悉相即名第一義也晉王者別傳中云晉王者疏請大師著淨名疏云先已戒定今欲伏膺智斷王意云若得此法增智斷煩惱故也四教通塞者以此四八如是用則為通而不用為塞如華嚴用二乃至般若用三等即其相也權實遠近者昔教權實相帶為近今經明於久遠權實為遠具知進否者一時四八為進不盡用者為否安得以諸師至眾戶者今家則先以八匙開於八戶次以一匙而蕩眾教咸同一實初立法通者只是且通途立一能詮所詮之法也疏云二文不異者只是一文由有能傳故得二文之號二如是下者只應合云佛及阿難二如下所詮為是今能所雙舉以成文勢故云如是於所聞時具能所者以初聞時具聞能所是故今文約於觀諦以釋法體疏云動俗入如者約真俗二諦辯也疏云動如入如者別人破空入中文中語略應云破空入假破假入中圓人即次第而不次第故云對所詮三諦也以四例四者謂頓等四例約教四亦具能所故也故彼文理相稱之法者以阿難傳佛文理相稱之法故云彼也應更以是對向四文者應云文中但云動俗入如未云動俗入如不異為是故須更以四是對於四如以釋其相故秘密所用者明四教若在於佛所用則成秘密若阿難傳所用秘密則成顯露又秘密教者如法華玄文第一云如來於法得最自在三密四門無妨之用或此說漸則彼說頓與不定或彼說漸則此說頓與不定而互不相知名秘密不定十方齊說等云云不定教者通約法華前四時座席說教之時或正說大而有聞小獲小益者或正說小而有聞大獲大益者故大般若經云佛在鹿野轉四諦法輪無量眾生發聲聞心無量眾生發緣覺心無量菩薩行六度行無量菩薩得無生法忍住於初地乃至十地無量一生補處菩薩一時成佛約教互相知故名不定教廣如玄文記天人機具眾教者天人是受教之器須以四八而熟脫之故云漉至究竟涅槃三途非器故不論之義各含四者但舉不定等即攝藏等四也證信義通至前說者如前釋五義中云餘皆義立文是各具諸義者前三釋中四悉八教體用等總入一心而為觀境故云等取第一義雖理者意云雖以契理為第一義由屬因緣故名為事便成四釋者謂因緣觀約教觀本迹觀故上句云咸成境故且判屬通者一者屬於通教二者屬於通途之通今言且者通屬通教也空假成別者一者別在地前與諸教共二者別在當教為入地方便亦通亦別者亦具兩句故云九通前教聖局證中專在於別空假至所照者以空假是中道所非所照故也對他通別者空假通他故名為通中對空假故中名別是故兩句皆兩句釋覺心如應者夫觀心義皆於自一念心中以論機應更不他求但信心成則見自心覺智明淨義當於應則妙教為迹等者且約體用本迹一切聲聞咸然者今論權示故云一切此則權中一切也我聞下我聞離釋者我謂宰主聞謂所聞故以離釋即闕空緣者耳具四緣不假於明眼一具五疏中但三根塵識故若大乘宗耳等具七緣眼具九緣云云經初盡合改聞者斥世人也以世人不許色為教體但云色是體家之用若如此者一切經初應合改云如是我思思屬行蘊故如天台涅槃疏記約諸行無常四字辯其教體如云初說諸字率爾耳識同時率爾意識但聞諸聲聲薰識成種尋求心中緣聲字名三相聲薰識成種名等假故不薰成種聞餘字亦爾通前十二相若不散亂決定心生方能解義四率爾四尋求並決定心九心四聲四字四名一句一義為十四相總九心十四相是無記若不散亂染淨心生方成教體見身篋者如來以四大為四蛇以見四大生滅無常互相殘害故捨入涅槃也諸滅結眾者諸阿羅漢三界結盡名滅結眾雖非外計者鈍使凡夫但計己身以立宰主不同邪見外道故也思惟未盡者阿難是三果人由斷欲惑未盡並伏上二界修惑故云未盡凡聖共者如一物實青眾共云黃共有此說故不為過實長言短方圓等一切皆然故名世流布也自然能解了者此文即是雙非常無常以顯中道常樂我淨無我等亦爾不二登地者登地為能雙非故疏云知我無我而不二無我等即為所非也雙照亦爾以勝攝劣者疏云以自在音聲傳權傳實既云自在即是以實而攝於權也以大擬小者大對小小既具四大豈不然故名為雜者一入空二出假被接故也不云空王劫數者只是體用本迹耳已當約教者既云觀因緣所生即空等故當約教也真妙望餘者餘謂三教皆屬迹故檀行十事者言是法師清淨佛德行一謂足食已捨威儀不作餘食法得二相妙食食二足食已不作餘食法往村中間得食三在寺內得別眾羯磨四得在界內別眾羯磨已聽可五此事已言是本來所作不依經論律作而言有教六足食已捨威儀得以蘇油蜜生蘇石蜜酪和一處得食七得共宿鹽著中食八得飲闍樓羅酒根子等樂酒九得畜不割截坐具十得受金銀於布薩日檀越布施金銀而共分之新舊兩聞者重聞二十年前為新二十年後為舊何者以侍佛時所聞之法謝在前故也問於釋種被殺者唯除見流離太子殺諸釋氏壞迦毗羅城來至佛所作如是言我與如來俱生此城同一釋種我今親戚悉皆殞滅云何如來顏色光顯佛言汝見城有我修空定故乃如是云云問五百釋種何因緣故被殺佛廣答如經說六知佛所入定者人問佛入何定阿難皆知所入也疏云況餘處者應是從華嚴至方等諸時為餘處也然大經顯圓者大經中四句專明自行智斷及化他能所唯在於圓又彼經中生不生句在初顯自行智德不生不生句在第二顯自行智斷滿也不生生句在第三顯自行斷德也又是化他能生生句在第四顯化他所也聞聞等四亦爾不同餘文者餘文前三悉先寄昔教後方論開今文乃是大機運動與顯實時會合矣寄示相者今經二悉應生理善破理惡今且寄論示二悉之相假時實時者大論中有一外道問佛真諦無時何故判時佛因辯云從明相現已後至于前為實時從此已去至明相未現前為假時又鈔中引毗羅三昧經平旦諸天食午時諸佛食午後食生食夜鬼食故須破邪者內弟子非不無時但不如外人計時為因是故須破也假時破外者若說實時增彼邪見故說假時以破其惡所發善根等者今經則發一乘開顯圓妙之善也權人理等者等取權行權教人理等並須開顯也疏云若見諦已上至初住者此且約位當於初住須約六即明其淺深化他不定等者此約大分而說若於方便等淨土施化亦不必盡用八也記一末七日月年止者人壽三十飢饉經七年二十歲疾經七月十歲刀經七日也保樂保常者以樂定故保樂以壽定故保常也六四二者拘留孫等三佛次第配之並在第九減劫中出也截指為刑者闍王得罪人但截其指祖王得賊以灰圍之為獄父王得罪人但駈出國或本云云此前皆謂實動者得三悉益人皆謂佛有動出故云則前二教等也覺他通初後者始從初心訖至後心皆化他故疏云總別相者於世間苦集通途總作無常之觀別作四念處觀等出世間總者悉是無常苦空無我故別則修四念處觀乃至道亦別別而觀故三界繫者思惑也四聖諦者四諦智即別別皆作身受心法觀也從後異故者後老異初少故斷伏不同具如止觀第三等者婆娑論明三藏菩薩因時已斷下八地修惑唯非想一地修惑在所以但用九無礙九解脫斷此一地惑耳大論文意既未斷見有漏心斷但名為伏故云不斷所以坐道場時通用一九斷三界修惑良由此也第十地者通教第十地也染汙無知者八智隨諸煩惱唯起煩惱此智更不能了於煩惱名為染汙無智非謂全無智也不染污無智者即羅漢心中世俗智以不了八種境故名劣也一味者約舌根所取五味甜苦等又大小乘法義味也二勢者上如天子有大勢力亦如宰相乃至下類皆有勢力不同又如諸藥各有治病勢分也三熟者不知眾生及無情等善惡熟也四德者以三界內物各自有一種德故五數者八萬劫下至三二一千歲數故六時者不知何時成何時壞等七量者即器量等有多種釋欠一境具如玄文者彼釋雖廣亦不出於四種修證故指因果二妙中明不出二教者他人釋佛亦云斷習氣故屬通佛也若奪而言之只得三藏佛耳三世諸佛皆色究竟者起信疏問他受用身何故在色究竟天耶答一顯十王寄別十地故以十地菩薩攝報果當彼天故華嚴疏云初地菩薩作閻浮提王乃至第四禪中色究竟天對第十地菩薩矣二餘義別說者為引二乘人彼小乘不信界外有佛故指在彼天是實報佛令知王宮菩提樹下成道是化接引門中且作是說若一乘宗佛身周遍法界乃至微塵毛端重重無盡非一方化報四階成道者婆娑云第一階三祇修四波羅蜜除禪及智第二階百劫修相好第三階從兜率下最後身出家用六行斷惑第四階菩提樹三十四心斷結故開權顯本者開權在迹門顯本在本門也亦無印述者菩薩與佛身土皆融所說理等又被佛加故不須印述也大論所破者行三教為能破藏為所破也不許他經者講唯識人云涅槃經中明一切眾生皆有佛性者不了教耳他受用報者唯識宗中即以平等性智示現微妙淨功德身由昔所引修利他功德居純淨土為化十地菩薩神通說法令彼受用大乘法樂其身大小不定大圓鏡智亦此身所攝合二種名他受用身此則正當別教義也具如玄文至科簡者玄第七卷明本十妙對迹判釋總有六重謂事理理教教行體用權實已今體謂圓教法身用即報應二身及於三教將久本望今迹門迹門權示體用俱迹最初實成體用俱本廣如彼釋疏云唯本地四佛者一佛為本三佛為迹俱久成故若望前三者覽前三釋對於觀心即因緣義疏云住者者初約佛身住土從十善道下約佛心住法以釋持戒善心者十善戒也注云前從果者從入三三昧下從果布施下約修因也從廣之狹者始忍土終楞嚴也所滅不異者斷見思盡得有餘斷苦果得無餘若約理判如向者如前約涅槃文說也即應入滅者三藏佛三十四心斷結已即應入滅住世五十年者由慈悲故此佛報生者只名父母生身以為報生此從因說者以通菩薩不即取果誓抉餘習為菩薩身利益故也於理實無者非但實理無住亦真諦理亦無有住何以故由俗生滅真亦無住便成絕待者開顯入圓無能無所皆法界故疏云訛言者訛謬言義當戲言耳能兼諸國者兼只是併諸國耳食肉餘習者賢愚經第十一云佛告王曰善聽過去久遠阿僧祇劫此閻浮提有一大國名波羅捺於時國王名波羅摩達爾時國王將四種兵入山林中行獦戲王到澤上馳遂禽將單侯一乘獨到深林王時疲極下馬小伏爾時林中有𮪃師子懷欲心盛行求其偶困不能得值於林間見王獨坐婬意轉隆思欲從至近到其邊舉尾背住王知其意而自思惟此是獨𤞲力能殺我若不從意儻見危害王以怖故即從師子成欲事已師子還去諸兵群從已復王即還宮爾時師子從是懷胎日月滿足便生一子形盡似人唯足班駮師子憶識知是王有便銜來著於王前王亦思惟自憶前事知是己兒即收養之漸大雄戈志猛父王崩已班足繼治王有二夫人一王者種二婆羅門種時駮足王一日出城遊觀勅二夫人隨我後往誰先到者當與一日極相娛樂其隨後者吾不見之其二夫人莊飾駕乘一時俱往到於道中見於天祠梵志種者下車作禮猶此後至使王見薄於是夫人令人打壞天祠令平如地宋天祠神悲苦懊惱往至宮中欲思傷害王宮天神遮不聽入有一仙人住仙山中時駮足王恒常供養日月食時飛來入宮不食肴饌粗食麤供偶值一日仙人不來天神知之化作其形欲來入宮宮神猶識不聽前入白王永通王聞仙人在外勅令聽入入已坐於仙人常坐之處辦如常食以用供養時化仙人不肯就食即語王言此食麤惡又無肉魚云何可食王白大仙自來恒食清素故合不辦化仙人告自今已後莫辦麤供明日舊仙飛來設種種魚肉仙人嗔恚怨責於王王言大仙昨日勅如是作仙人言昨日有患斷食一日不來是誰語故相輕誡合王是後十二年中食人肉作是語已飛還山中後厨監妄不辦肉臨時無計出外不見肉見死小兒肥自在地念且死急劫頭足至厨中加諸美藥作食與王等如疏乃至由仙人立誓十二年滿更不噉人故具經文合疏文可解四非常偈者大論中名須陀王仁王名普明王經云為班足王而捉將去從其乞願一日行施食沙門頂禮三寶班足許已還國依七佛法請百法師一日二時講仁王般若第一法師為王說偈言劫燒終訖乾坤洞燃須彌巨海都為灰颺天龍福盡於中凋喪二義尚爾國有何常神識無主假乘四蛇無明寶象以為樂事神無常主形無常家形神尚離豈有國耶有本自無因緣成諸盛者必衰實者必虗眾生蠢蠢都如幻居三界皆爾國土亦如生老病死輪轉無際事與願違憂悲為害欲深禍重瘡疣無外三界皆爾國有何賴偈意勸王捨國及身小即初果者通教聲聞若通菩薩於乾慧地即得空平等之名與大教梵行意同者彼梵行文末云菩薩捨心時則得空平等地如須菩提菩薩住於是地不見父母兄弟姉妹親怨中人乃至陰界諸入眾生壽命如彼虗空疏崛山者大寶積經云其山高峻嚴灑可視眾華卉木悉皆茂盛夜夜興雲輕雷細雨水陸兼備天龍八部常在遊止復有異類諸獸師子虎狼熊羆之屬復有百千眾鳥孔鸚鵡鳥鷹鴛鴦是諸眾類以佛威力不為貪欲嗔癡所惱不相食噉而共親愛疏云總有三事者文中三又是二鷲一靈也廣普山者能容諸佛菩薩羅漢支佛鬼神及屍陀林故負重山者諸重德人居故仙人崛山者佛是大仙故令此土淨者只無支佛即是土淨十乘十境者止觀十卷前四卷教人生解第五卷去明於正行約陰入煩惱病患業相魔事禪定諸見增上慢二乘菩薩十境之上一一用十觀觀之一觀不思議境二發菩提心三巧安止觀四破法遍五識通塞六知道品七對治助開八識次位九能安忍十無法愛十法之觀觀一一境令成大乘譬於大車法華圓觀若得彼意方了此文故指彼也疏云因滅是色等者大經云佛告憍陳如色是無常因滅是色獲得解脫常住之色受想行識亦復如是色是苦因滅是色獲得解脫安樂之色四陰亦然色是無我因滅是色獲得解脫真我四陰亦然色是不淨因滅是色獲得解脫清淨之色四陰亦然疏云三陰如鷲者則來去不絕以喻三陰取境不絕也方便正修者方便以偏圓解導二十五法為正修前方便如止觀第四卷廣明正修者依於妙解以立正行謂端坐觀陰界入等如止觀第五去廣明簡境者謂先簡思議不思議境心者謂一心異心以為能觀並如止觀第五初廣明云昇中天等者為生人善故居天上及以人間中夜入滅者眾生不能生難想之想故以中夜入滅而對治之具二中者即空斷中常在前二教即中實相中在後二教純無雜故者純大無小雖有諸阿神等皆是入地菩薩疏云遂形迹者迹謂事迹也疏云處季孟之間者孟長也季小也仲中也菩薩居二眾之間類於四時之仲月也疎者破惡者示諸惡身令當眾惡破既似三諦者人天俗二乘真菩薩中即三諦也唯詣實理者一各詣當教理二四教菩薩無不皆詣圓實之理此約施開以說注家云者彼云聲聞之學於理猶疎故敦之於內菩薩之位於道已親故忘之於外既察敦忘之旨故立先後之次意云疎者常令隨逐世尊此但得事者於四悉中似得對治悉堪通別記者通記如法師不輕等別記如三周也語通者謂內秘外現及薩埵語通通於人天二乘雜眾意兼者只是內秘外現及以薩埵互相兼耳菩薩濫本者意云舉菩薩之名已近於本是故文中不云菩薩皆大薩埵故不論也除尊貴慢者阿闍世王是國之尊除王慢故故在前列又王非得法究竟故第二義入餘七者如云一為顯親聞迴心入大故下六若在法華一一皆令迴心入大是故全成今文八義欲別記故者此約人別開權故者約教約行等不殊昔教者以今三意形於論文則使七意全同昔教唯第二意與今不殊又異前後者方等般若異前乳酪異後法華等得醍醐故一男尊女卑故前僧後尼二僧先入道尼後入道三僧為和上尼為弟子四僧能傳持法藏二十四人皆是僧故尼則不能五僧能結集大小三藏尼則不能六僧與佛同住尼與佛異住七僧眾多尼眾少問尼何故少答大論云女人知短涅槃難見故八僧得佛稱歎尼則不然大論云若讚比丘尼外道譏謗故後文全無者後文全無眾所知識之言耳五字者與大比丘眾五字字雖有五義但有四以比丘二合釋也豈唯異於下眾者意云豈唯異於尼眾在前列耶三脫者慧俱無礙三也又是於門門中空無相無願三也通智者通謂目連智即身子辯即樓那空即須菩提若准前三者只是前三教也七名一一者只是七同在一人身上耳同得究竟戒者第十究竟戒也實者得記知有所從者明實人得記知從小乘中來是故仍本而歎也須通始終者始鹿苑中應一味終即法華也或是轉入者三教傳傳入也同為一例者文中但云二七不云兼於別圓故准通含別者若准通教含中則別教亦有聲聞當別自位無含別者則別接通人也二種聲聞者藏通二乘也難轉藏也易轉通二乘也疏云真明兩意者只是藏通七中分為三異四同故云兩也別教同異者別教約次第三諦三諦皆須辯四同三異及以不異及在後故者後於涅槃會中及四依邊得記故遠近相望者遠即方便云得近即現世得住果變異者論中名為別異善根有於二種謂發心已更退大取小住於小果又於此果變為通教二乘故云應化從身者同於二乘身故化為餘三者應為前三身引實三故後二教七一觀者以證同故且共為一觀貴人非論者只是貴人非非謂論非地地者別教地位住住者圓教住也以此位皆能起應同前二教引實行者又行向之言通於別圓若屬別教行向但能起神通示同藏通二乘不得云應也圓人從初住已上俱名應化上慢所濫者地住已上示同上慢引前二教中凡夫為上慢之人故云復同前教也開合者但在三藏聲聞開即出於通教聲聞也應化佛道亦爾應共人七者有七之人也義兼時等者取餘六一也疏云九十五種外道者准九十六道經九十六中一是佛道餘皆外道摩騰對諮錄云西域梵志泛同此土道士而實其專修行者多有現復成仙及當來得生三界諸天則勝於此土雖九十五種其稍增勝者但唯八道一者博通外典事魔醯首羅天以為天尊求生空處乃至非非想處二者事大梵王以為天尊求生諸禪三者事忉利天以為天尊求生欲界諸天四者奉事六師以為尊師求馮空滅絕於有無五者志於仙學善於禁呪事阿私陀仙以為仙尊求五神丹服之若得仙道會假風角之力得昇霄漢六者志在醫學善於符事阿羅陀仙以為仙尊求五芝草服之若得仙道會修禹步力得陰形影七者事吉波頭仙以為仙尊求入火聚火不能損八者事夷剎羅水仙以為仙尊求入江海水不能溺此八種道常修清淨之行其不修者或事日月神社稷神仙神火神江神海神等不能備述義兼能所者阿難為能興萬二千為所與大字唯在所者以萬二千是阿難所與之大人也大即世界者對小明大即是大小異故云世界應具明三念至所以者具如疏中以釋相狀三種念處大論二十一三十七廣明性謂破愛見四倒名性念處共謂事理俱得事謂滅盡定理謂無漏緣理斷惑緣謂當教四門文字教法皆以所詮為境境即所念之處謂身受心法故云境法通教則以自他等四句觀破愛見四倒皆如幻化名性念亦以九想等一切事禪名共見生無生等四諦一切佛法名緣別教別則十住為性十行名共十向名緣通則位位具三登地三種分分而發性顯法身共顯般若緣顯解脫圓教性謂觀十界色一色一切色一切色一色了達色中非淨非不淨性餘三亦然觀十界色非垢非淨雙照淨不淨其性不二不二之性即是實性餘三亦爾名共念觀身受心法起無緣慈悲寂而常照不動而運普覆法界名緣念三念不一心中具以智慧觀名性定慧均等名共所有慈悲緣九念處名緣念藏三人諦緣度異為三通三人同觀幻化為一別人十住入空用折體三十行入假用無量一登地真實為一圓人始終唯用一一切智外道者彼之外道各於所計生一種見解心明利將此智通一切法名一切智如黃頭外道造僧佉論計一為宗如下釋二神通外道者彼諸外道散得五通能變城為鹵轉釋為羊停河在耳捫摸日月等如涅槃經說三韋陀外道者韋陀即是外人典籍外道仙名曰白淨造四韋陀一名讚誦二名祭祀三名歌詠四名攘灾一一韋陀各四萬偈偈有三十二字如後釋昔則從初者藏通為教首也咨者嗟也說文云謀事也謀度也謂上欲歎下皆先謀而後歎故云嗟也空假各三者畢竟空體具含一切名大一空一切空名多過諸偏小為勝假三者不思議假其性廣博苞含一切名大廣知藥病等為多勝出偏假為勝也三千總別者一者一念為總三千為別二者於三千中但舉一法為總餘二千九百九十九法為別三千互舉總別皆然文意正在一念為總三千為別在淨名疏者名注淨名經為疏耳疏云釋論者大論又有三義一比名怖丘名魔能怖魔王及魔人故又比名破丘名煩惱能破煩惱故又比名乞丘名士常能乞食清淨活命故今之學者者意云怖魔不通初心但在後心者今時學人安能即令魔怖得出魔境耶是故怖魔應通初後五繫者大經四依品云四依菩薩駈遂魔云天魔波旬若更來者當以五繫繫縛於汝章安云繫有二種一者五屍繫二者繫五處五屍者謂狗蛇猪人四屍狗頭豿骨為五如不淨觀治於愛魔五屍俱得名為不淨五處者謂縛其頭及二手二足如理治於見魔觀五處空故云如理故首楞嚴云世尊放眉間光見一切魔皆被五繫身子白佛是誰所作佛言是首楞嚴三昧之力但有說是三昧之處魔欲為障自見五繫佛滅度後說三昧處亦復如是怖魔即世界者此持戒彼魔怖故屬世界又以魔怖令一切人歡喜故屬世界義必通初者聲聞怖魔破惡乞士等義須通初心若為當教證信必在極果羅漢若為今經證信從得記已方堪為同聞人不同藏通必在後心故也疏云八魔者大論第六問何處說陰為魔答佛在莫𤘽羅山教羅陀云色是魔乃至識是魔二煩惱三死病是死因四魔事即天子欲界主也無常等四倒即界外煩惱魔即有無等等色即界外陰魔陰魔即有變易生死赤色三昧未究竟名天子此並義立常樂等四倒即屬界內煩惱魔依涅槃經第二十文也華嚴新經離世間品云菩薩摩訶薩有十種魔一陰魔生諸取故二煩惱魔生雜染故三業魔能障礙故四心魔起憍慢故五死魔捨生處故六天魔自慢縱故七善根魔恒執取故八三昧魔久躭味故九善知識魔起著心故十菩提法智魔常不捨故初一五六屬界內三魔二三四合為界內煩惱魔餘四通界內外也疏云觀五住煩惱者勝鬘經云謂見住地即三界見惑也欲愛住地色愛住地有愛住地已上即三界思惑也無明住地前四是人執後一是法執四中前一名分別惑後三名俱生惑此五並以現行依於種子云住種子生於現行云地諸阿羅漢及辟支佛能斷前三四種煩惱不斷無明無明住地其力最大亦令前四而得久住佛菩提智之所能斷令云觀五住者不同勝鬘次第之惑即達同體五住即是菩提故也疏云法和無別理者問今時初心即得名與法和為後心方得耶答初心念念唯為解脫即得名與法和降此之外皆未可見須約四教諦理以明和也僧界法者謂羯磨等法也三明至第七者婆娑中問云六通之中何故餘三不立明名答身通但是巧而已天耳但是聲聞而已他心緣他別想而已是故不立餘三立者宿命知過去苦生大厭離天眼知未來苦生大厭離漏盡能作正觀斷諸煩惱一切羅漢皆悉得之大論中問通明何別答直知過去名通知過去因緣行業名明直見未來死此生彼名通知因緣際會差別名明直知漏盡名通知漏盡不復生名明大羅漢所得廣知當教文字四門之法故名無礙解脫也淨命者正命也起四邪等名破正命故大論云舍利弗乞食有一女人問舍利弗汝方口食耶乃至下口食耶舍利弗皆言不也女云於何食舍利弗次第解釋四種食竟我唯乞食自活四邪者一方邪謂通國使命二維邪謂醫方卜相三仰邪謂仰觀星宿四下邪謂種植根裁五糓等五邪者一為利養現奇特相二為利養自說功德三卜相吉凶為人說法四高聲現威令人畏敬五說所得供養以動人心此等皆是高流上輩所慎具如玄文七重二諦者如玄第三約別圓接通及圓接別並四教各有權實即七重二諦一一復約隨情隨智及隨上智二十一番三諦以明若教若味出其教意教意所謂為實施權開權顯實又明諸聲聞等至方等時轉成通人至般若會又成別人及以當方等般若座席時得藏通益即聞彈呵即聞淘汰等即是明其教意歷前二諦等者二諦前事法和文是十戒前釋論明四種僧是約四教即前約教文是疏云即前兩僧者謂前二教未見中理皆名破戒等聞數生善者此從結集已後云聞耳若在佛邊只萬二千自生己善兼生他善不得云聞教殊者藏人觀雖和合次第生滅通人觀數和合如幻別人觀此和合次第且恒沙佛法圓人無非法界若過等者咸五千皆存五千大數故若准論意今經亦合云萬二千分矣均用四義者謂一一尊者皆作四釋遍明權實本迹也若已入圓者一於法華前已得無生忍者及聞法華得無生忍者然有本次降斯下約通途釋並取發心已後名為有本三從元住小者下約佛化意釋只此小法本是於大是故指此名之為本具眾多義故須約本迹釋又將數入理者觀萬二千即空假中無非一念心性故成於境即是理也明位以成初教者只攬因緣即藏通之義不復別出約教之文三義如後釋者無著不生應供從無明下次第釋也所從是對治者破因破果故也因果即煩惱五陰身也疏云以果對因者令獲下果也前即因文不賊不殺者實是不賊即不殺也疏云不賊者涅槃是者小乘涅槃也不生於生者應云非但不生於生亦不生不生不生於生三界生也亦不生不生變易生也非但不生分段亦不生變易故云無漏是不生供應者阿含中有譬喻經云昔波羅奈去城五十里山中有比丘居平旦入城乞食中後還山日暮及至疲極不堪安禪歷年如此勞而無獲佛化為一道人往至其所而安慰之答曰四大之身去城道遠有何樂耶止念畢命而已化沙門言夫道者以戒為本攝心為行賤形貴道朽棄軀命食以支形守意正定內學止觀意得道養身縱情何得免苦願諸道人明莫乞食吾當供養一日之粮明佛送食五人食果得羅漢食為道緣此之謂也即供應義能殺法異者折體智異也不賊亦殊者別人次第破不賊圓人一心中破前三教能所也有翻家以三為名者但云無著不生應供不云三德也歎本據後者謂雖本是別圓地住已上菩薩爾前由為迹覆是故今從得記以歎故云據後也寄迹名者不生等三名從小乘已立也申本者從本得等三是也申迹者從方便度下是本名以通至迹者本是法身等是本名三句皆云迹示也故明名通義別者欲令無生殺賊應供三名通至於大故以名通義別者小名三義大名三德故云義別也從用以明體者不生等三為用以有用故必具三德之體故本得不受等從體以立用者體即三德不生等三用四俱申迹者四教俱是迹又是判名義體用四義可通觀者謂若約性德俱是境若約修德則法身是境般若解脫是觀故云通引方等如止觀第二記者方者廣也等者平也謂實理也修此理故心有階降若能修行得全分寶但能讀誦得中分寶種種供養得下分寶若人積寶滿四天下上至梵天供養於我不如與持經者一食充軀命實相觀即當持義故別供養顯觀功能歎德上上起門至前者論云諸漏已盡故名為羅漢以心得自在故名諸漏已盡以無煩惱故名心得自在已得善心解脫善得慧解脫故名心得自在論雖不次第配應須第五釋第四第四釋第三第三釋第二第二釋第一二總別門者論云皆是阿羅漢等十六句初句總餘句別故皆是阿羅漢者彼羅漢有十五種義應知一一句釋出羅漢十五種義然不配經但依妙經五句者正法華句數復與論句不同故標妙經攝取事者此十五句攝取十種功德示現可說果不可說果云云從初別者以諸聲聞既從小乘中來是故歎德且依於昔故云從初也一律者十誦律也失道等三者謂由失道故造業故漏落生死故云相由失道者失無漏菩提道也無明流者欲界五部下皆以癡是無明當體三界則有十五無明也纏八無慚愧等皆是十惡為根本則是無明支流也無慚愧者若有德人無慚愧從貪起若博地無慚愧從無明起餘九隨類對貪嗔癡可見忿覆者小煩惱地法有十一忿二覆也五蓋者一貪欲二嗔恚三睡眠四掉悔五疑蓋覆纏綿心神昏睡定慧不發非今所歎者有盡之人生界外故今不歎邊際定者第四禪定也四禪之極即色究竟天定也此斥新疏彼將邊際四禪天定持於分段報身而入變易破十二品無明捨變易身即成妙覺云云四大羅漢等者四大如第二記引十六羅漢者難提記云第一賓度羅䟦羅墮闍與眷屬一千羅漢多分住於西瞿陀洲二迦諾代蹉此名金撌子與眷屬五百羅漢多分住於此方迦濕彌國舊云罽賓三迦諾迦跂梨此名妙種多分住於東勝身洲與自眷屬六百羅漢四者蘇頻陀此云善明與自眷屬七百羅漢多分住於北俱盧洲五諾矩羅漢此名鼠即與眷屬八百羅漢多分住於南瞻部洲六䟦羅此云賢善與自眷屬九百羅漢多分住於躭沒羅傳云師子國七迦理迦此名振旦與眷屬一千羅漢多分住於僧伽荼正是師子國八我闍羅弗多此名金剛子與自眷屬一千一百羅漢多分住於利拏此名恭敬九成博迦此名純熟與眷屬九百羅漢多分住於香醉山十半詑迦此名為疏與眷屬一千三百羅漢多分住於三十三天十一羅怙羅此名執捉與眷屬一千一百羅漢多分住於畢利颺瞿此名栗糓十二那伽犀那此名多龍闡與眷屬一千二百羅漢多分住於半度波山此在南印度界十三因揭羅陀此云機點與自眷屬一千三百羅漢多分住於廣脇山舊名毗富羅山十四伐婆斯此名住林與自眷屬一千四百羅漢多分住於可住山傳云在蜀地十五阿伐多此名無勝與自眷屬一千五百羅漢多分住在靈鷲山第十六注荼半詑迦此云小路與自眷屬一千六百羅漢多分住在持軸山梵云遊乾陀山若此國國王乃至人民發心設會度經像等上妙臥具奉施眾僧十六羅漢及諸眷屬分散往赴同常凡眾密受供養令諸施主得上妙果報至南洲人壽減十歲刀兵劫起佛法蹔滅從此漸增至百歲時人厭刀兵復樂修善十六羅漢還來人中顯揚正法度人出家小增至六萬歲時正法流行熾燃無息增至七萬歲時正法永滅十六羅漢與諸眷屬集會此洲以神通力造七寶塔釋迦貴身皆集塔內十六羅漢與諸眷屬供養繞旋百千迊已俱昇虗空向塔說偈敬禮等正覺受教持正法利益於人天法藏已沒緣既周今辭釋尊歸滅度說已俱入無餘涅槃定願力火起焚身骸骨無遺寶塔入地住金剛際釋尊之法於茲永滅七萬獨覺一時出世人壽八萬獨覺又滅彌勒方興自爾已前法住於世並是十六大羅漢所持力也法只是一者只是無生一法指二乘五句等者以此五句若在二乘即是迹也上二句雖總等者前文已將不生不生名大涅槃二句已對不生德竟只前涅槃即是法身等故云涅槃是己之利過患即賊等三者謂未是不生殺賊應供皆是過患以玄文四義與今德義同故引之也八自在我者大論名八神變一能小令自他身及世界極如微塵二能大三能輕四能自在謂大小長短五能有主現為大人心無所下六能遠至有四一飛到二此沒彼出三不往而到四一念遍到十方七能地動六動及十八動謂動遍動等遍動直動為動四天下動為遍動大千動為等遍動八能謂隨意所作一身多身壁直過腹水火蹈虗空四大互為等大經二十云一者能示一身多數如微塵二以微塵身滿大千空界三以大千身輕舉遠到四現無量類常居一國土五諸根互用六得一切法而無法想七說一偈經無量劫八身如虗空存沒隨宜不可窮覈今從開顯已說疏云雖有煩惱者引涅槃經意體達煩惱即是菩提故云如無不斷煩惱即引淨名經意亦是圓人初心體斷故疏云從德立號者名以召體為切響須人天曰號今釋名皆談其德既名由得布釋名敘德理無不通為調伏故者為調伏外道故耳為導者示為同行也為主者示為師也一陳如破暗因滅者以煩惱因果滅後智斷三德成也疏云了本見者見本真諦知即智知真也疏云前者太子者謂牒於宿緣所以故云前者云何此法自知證者問云如法云何知汝所證法也四智具足者我生已盡等四二仙已終者只是先總標二人亦無別意卿欲坐者五語佛也及知說法不空者知佛三轉法輪不空轉也疏云初見佛道相者滅諦前相初聞法皷者道諦前相也欲令聞名者阿若是名也識行者阿若以無生為行也列人知心者阿若以無生智為心餘二十尊者皆爾如和合成業者由身口助意方成於業故云合也不見如不取者觀見無常生滅故云不見不取疏云若閇眼如盲者應云若閇眼對鏡如盲但文略耳義帶總別者謂由五陰別別居初復當於別五皆不淨等復名為總此中想行等者應云想行乃至識色受受應乃於想行識色識應乃於色受至於想行也本在衍門者婆娑譬喻師幻化譬通於三藏用又鏡譬雖同鏡中之像譬於十界及六道別故通四教今且在藏故云通用如止觀第五因緣各從因緣生故者如現世無明為因父母為緣又由過去貪愛為因造業為緣又現在不取境起貪恚癡為因造業為緣如此因緣並皆是實尚不可得況幻因緣耶如巾如藥等者謂巾藥於㝹巾藥名實兔於巾藥兔如於幻此但名舉一邊謂實因實緣尚不可得況幻因緣寧有實耶鏡像亦然者以鏡像合巾藥者鏡及六分為實像如兔矣具有二空者如列文云幻師自也幻物他也餘句可知四句求性不可得即往空四句求名不可得即相空止觀文中又約三假等復惟重責自他等不生即破因成非滅生無生等即破相續性本無生無橫竪待即破相待假等推三世者如文云煩惱業苦即以三道為三世也即十二支者並前文無明體性即無明支故成十二十住未免者此但通舉別教十住位耳以別七住已過分段故疏云一一不實者金光明經云從諸因緣和合而有無明竪實妄相故起業力機關假為空聚地水火風合集成立隨時增長共相殘害等明鏡體量者以真如為體覆理無明為九界因出生九界名為量也通以迷悟者迷即六界悟即四聖事理者界內外各有事理又佛界為理九法界為事又四聖法界為理次第證三諦理故六法界為事全在迷故始末者無明為始佛界為末又地獄界為末自他者別人自行論竪化他在十行論橫也真如在迷者如起信云真如不守自性忽然念起名為無明乃至六塵以為能迷也緣了具足者別人地前但名緣了之因至初地時方乃分受緣了之稱至等覺方名具足疏云一因果生者破九界因果顯妙覺佛界因果也故自他斷者自行化他皆先斷九界因果耳以九界皆屬因緣所生故須斷也別修緣了者皆先修空假以顯法身故能覆所覆者別人以九為能覆但理為所覆先却能覆入初地時所覆方顯圓人即能覆無能無所唯一法界依此分別二教自殊也俱名無住者別人由無明無住所能覆佛法界出生九法界真如無住處猶了真如故能破九界顯一佛法界此即別教無住之相圓人以無明住處全法性是理性三德具足故法性無住處全無明是以同體變造十法界生死具足故鏡內外一者像內外又修性一也離於三教者只三教是分別是情想耳雙非像無像者像即三千無像即畢竟空以中道法界不當空假故也疏云觀煩惱業生者若不將生字為苦道即見苦字也於中初總明立觀者對下陰入故云總也故妙體滅等者體謂體達即用妙觀體陰入界其性本虗只虗名滅滅即法界何除之有又體達一念三千即空假中名總體達先達苦即法身次達煩惱即般若次達業即解脫為別體達也複疎總結者只是結成三諦複疎上三德耳從是三下三諦次第復疎可見今仍約底下三道者十界各具三道不無優劣地獄最劣故云底下應約諸三法者道識性般若涅槃三寶等十具如玄文若於阿若至不迷者為眾生下種為始引至法華為終又復諸聖若是權人則先實後權何者以先自稟實教後方示同權故若是實人先權後實何者須先稟權教後方入圓即法華入者是若顯若晦者顯謂實行在小在外之人又至法華得記為顯晦者權人示為惡身乃在小故為主為伴者如身子四大弟子是主餘皆是伴又自化為主輔佛為伴又佛為主陳如為伴又陳如為主所化為伴示訥者如槃特等示辯者如樓那等有屈有申者被訶為屈得歎為申又能呵為申忻內者先入鹿苑為內也背大向小者本是於大示入於小而成就之先後悟入者至法華會由有三周本迹流通悟入不同也皆成化儀者謂成約教本迹二釋悉可為觀者即觀心釋聞名起行者即今家觀心釋意也稟教即約教釋意也思迹等即本迹釋意也尋其因緣即因緣釋也知其經歷得益不同可以為上求境者阿若已成法身法門具足若聞阿若一句故可堪為上求之境行等理殊者無生行同四教理別故一事者諸佛化迹也比而思之者以彼比此彼雖以香為佛事若思香時則成化儀先大後小先小後大八教具足無不入實又淨土之中教亦增減不一或用三教或唯用圓故也二摩訶迦葉疏云父母樹神者付法藏傳云摩竭國中有婆羅門名尼俱律陀高才博達巨富無量此摩竭王千倍為勝而無子息於其舍側有樹林神彼婆羅門為求子故即往所請經歷歲年了無微應時俱律陀大生嗔忿語樹神曰我事汝來已經年歲都無福應今當七日志心事汝若復無驗必相燒剪樹神愁怖向四天王具陳上事四王與之往白帝釋帝釋往白梵王時有梵天臨當命終梵王告曰汝宜生彼婆羅門家吾相擁護梵天曰諾於是帝釋即報樹神樹神尋詣其家語婆羅門却後七日當滿卿願至七日已婦便有娠足滿十月生一男子顏貌端正身真金色光明赫奕照一由旬䟦耆子生聚落至為號有十二字應移看釋受大文中疏云畏勝王者傳云時瓶沙王金犁千具彼婆羅門恐與王齊招諸罪咎乃少其一疏云約金色婦者傳云迦葉年十五父母欲為娉妻白父母言若能為我得金色女恣容超世乃當納之父母即召諸婆羅門遊諸聚落遍而求之時有一女顏容瓖㻲身紫金色即是往日金珠女色諸婆羅門即為娉之遂相然可許其成婚雖為夫妻了無欲意共立要曰今此室中唯有一床我若眠息汝當經行汝若睡臥我當經行後於中夜其妻眠垂手床前時有毒蛇欲螫其手迦葉以衣裹手舉置床上妻尋驚覺而責之曰本共立誓要不相近今復何緣竊舉我手迦葉具陳上事仍以蛇示之妻意仍悟也疏云佛弟子中多名迦葉至故標大迦葉也有三十二字應移向後位大者下即是次也故今約教極在涅槃者四教皆以涅槃為極疏云宗極等者明真理絕於言教賢聖下明聖人證於諦理虗融寂然也玄指下明施三覺意疏云而迦葉穩密者傳云迦葉將入涅槃即飛虗空到於大海娑伽羅宮禮敬佛至于忉利天禮如來髮釋提桓因自取佛髮敬授迦葉迦葉受已志心禮敬牛頭栴檀以用供養供養已語諸天曰如疏頭陀既爾者頭陀勝行尚生諸使況餘劣行而不生使耶疏云我能乞食等者如論中釋五利者身見謂有我者計我如麻豆及母指或計遍身計我不妄名我見計我斷常名邊見用計斷常不信因果復計此我以為自然冥初世性即二十五諦計從父母微塵梵天等皆名邪見執邪為道名非因非因名戒取因此見通至非想信此非餘名為見取苦諦依身此見依身故名身見依身見而起邊見餘三非身故無此見戒取依苦多計行苦行望實因故集滅如道不生戒取集滅無身見又戒取在苦道者本是內道見苦能斷本外道者見道能斷故唯在二今文十使約乞食而出其相修得亦然者依性而修故云亦然三三迦葉疏迦葉如前釋者族姓如大迦葉中釋也佛入迦葉窟者初欲降迦葉先就彼不見於住處迦葉即安置佛於龍窟中云云夜有光明者四天王身光也疏云汝非羅漢者以外道亦自謂於己為羅漢故佛非之汝是盲等者謂汝不識世出世因果不見無漏涅槃故云無所覩一轉法輪者降迦葉時已是轉法輪竟疏云委業領教者委業在般若領教在法華也疏林即般若者般若以分別為義如眾樹成林雖是眾樹只是一林雖遍分別只一種智耳水即解脫者水能注下如解脫之現說法下被眾機云云六舍利弗疏云胎者者舍利弗在胎時也疏云自身知陳故者國師自思惟言我今年朽雖國師所學不廣或復癡妄故疏云兼則相不詳者國師出城往論義所眾見二牛鬪指一為彼指一為自自果不如餘相亦爾疏云盡墮諸幢者以論宗為幢也疏云於道見頞者大論云身子因見頞威儀庠序就問之汝師是誰答曰悉達太子捨生老病死出家修道得三菩提是吾師也身子乃問師說何法答我年尚幼稚學戒日初淺豈能宣至真廣說如來義身子曰請略說之頞即為說諸法從緣生等但說三而不說道以根利故若廣說者返增邪見然其聞果必由於因因果忘者復由於道故但說三疏云又云十五日後者此是引大論文疏云身子至母者身子為五百說法五百歸伏如所生目連手擎將還佛所歎如所養疏云身子問賢乃至如是者此即通途問答也從又問為戒下一一歷別問亦一一歷別答也從又問向言如是下却牒通答以難別答也答為無餘者答意云為無餘涅槃故修戒等非專為求戒求定等名修梵行若只為求此七但名有餘耳由此答通從又問下更別別問起疏云此喻問可知者由七車故至婆鷄帝非七車即是亦不離七車即是戒淨等亦爾由七淨和合方至無餘涅槃非七淨即是也疏云得甘露幢者滅理涅槃勝出生死故名幢也疏云與轉法輪等者如下文佛說一句為本等即是其相故云復也疏云衣繩者裙要中繩也六界法者地水火風空識此六法名狹體廣攝十八界由長空界也識攝七識半地水火風四攝十色半矣
